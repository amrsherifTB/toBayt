// Lucide UMD exposes window.lucide. We build React wrappers from icon data.
// Different lucide versions expose icons differently — we try several paths.
function getLucideIcon(kebabName) {
  if (!window.lucide) return null;
  const pascal = kebabToPascal(kebabName);
  // Try multiple known shapes: lucide.icons[Pascal], lucide[Pascal], lucide.icons[kebab]
  return (window.lucide.icons && (window.lucide.icons[pascal] || window.lucide.icons[kebabName]))
      || window.lucide[pascal]
      || null;
}

function makeIcon(kebabName) {
  return function LucideIcon({ size = 24, color = "currentColor", fill = "none", strokeWidth = 2, className = "", style = {}, ...rest }) {
    const data = getLucideIcon(kebabName);
    if (!data) {
      return React.createElement("svg", {
        width: size, height: size, viewBox: "0 0 24 24",
        fill: "none", stroke: color, strokeWidth, strokeLinecap: "round", strokeLinejoin: "round",
        className, style, ...rest
      });
    }
    // Lucide icon data shape: array of [tagName, attrs] pairs (the children of the svg)
    // Either data === [["path", {...}], ...] (just children)
    // Or     data === ["svg", svgAttrs, [["path", {...}], ...]]  (full element)
    let children;
    if (Array.isArray(data) && Array.isArray(data[0])) {
      // shape: [["tag", attrs], ...]
      children = data;
    } else if (Array.isArray(data) && data.length === 3 && Array.isArray(data[2])) {
      // shape: ["svg", attrs, [["tag", attrs], ...]]
      children = data[2];
    } else {
      children = [];
    }
    return React.createElement("svg", {
      xmlns: "http://www.w3.org/2000/svg",
      width: size, height: size, viewBox: "0 0 24 24",
      fill, stroke: color, strokeWidth, strokeLinecap: "round", strokeLinejoin: "round",
      className, style, ...rest
    }, children.map((child, i) => {
      const [tag, attrs] = child;
      return React.createElement(tag, { key: i, ...attrs });
    }));
  };
}

function kebabToPascal(s) {
  return s.split("-").map(w => w[0].toUpperCase() + w.slice(1)).join("");
}

const fmtDateKey = (d) => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
const fmtDateShort = (d) => `${DAY_NAMES[d.getDay()].slice(0,3)} ${MONTH_NAMES[d.getMonth()].slice(0,3)} ${d.getDate()}`;
const fmtDateLong = (d) => `${DAY_NAMES[d.getDay()]}, ${MONTH_NAMES[d.getMonth()]} ${d.getDate()}`;
const addDays = (d, n) => { const x = new Date(d); x.setDate(x.getDate()+n); return x; };
const startOfMonth = (d) => new Date(d.getFullYear(), d.getMonth(), 1);
const isSameDate = (a, b) => a && b && a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate();

// Get available slots for a given provider on a given date, taking into account
// working hours, blackouts, existing bookings (ids), and the current time.
function getAvailableSlots(providerId, date, takenSlots = []) {
  const av = seedAvailability[providerId];
  if (!av) return [];
  const key = fmtDateKey(date);
  if (av.blackouts.includes(key)) return [];
  const dow = date.getDay();
  const hours = av.hours[dow] || [];
  // If today, hide past slots
  const isToday = isSameDate(date, TODAY);
  const nowHHMM = `${String(TODAY.getHours()).padStart(2,"0")}:${String(TODAY.getMinutes()).padStart(2,"0")}`;
  return hours.filter(h => !takenSlots.includes(`${key}T${h}`)).filter(h => !isToday || h > nowHHMM);
}

function hasAnyAvailability(providerId, date, takenSlots = []) {
  return getAvailableSlots(providerId, date, takenSlots).length > 0;
}

// TOAST SYSTEM (simple module-level event bus)
// =====================================================
const _toastListeners = new Set();
const showToast = (text, kind = "info") => {
  _toastListeners.forEach(fn => fn({ id: Date.now() + Math.random(), text, kind }));
};

const ToastHost = () => {
  const [toasts, setToasts] = useState([]);
  useEffect(() => {
    const onToast = (toast) => {
      setToasts(prev => [...prev, toast]);
      setTimeout(() => {
        setToasts(prev => prev.filter(t => t.id !== toast.id));
      }, 2800);
    };
    _toastListeners.add(onToast);
    return () => _toastListeners.delete(onToast);
  }, []);
  if (toasts.length === 0) return null;
  return (
    <div className="fixed top-20 left-1/2 -translate-x-1/2 z-[100] flex flex-col gap-2 pointer-events-none" style={{ width: 320, maxWidth: "90vw" }}>
      {toasts.map(t => {
        const palette = t.kind === "success"
          ? { bg: tokens.success, fg: "#fff" }
          : t.kind === "error"
          ? { bg: tokens.danger, fg: "#fff" }
          : { bg: tokens.ink900, fg: "#fff" };
        return (
          <div key={t.id} className="rounded-xl px-4 py-3 text-sm font-medium flex items-center gap-2 shadow-lg"
            style={{ background: palette.bg, color: palette.fg, animation: "toastIn 0.2s ease-out" }}>
            {t.kind === "success" && <Check size={14} />}
            {t.kind === "error" && <AlertCircle size={14} />}
            <span>{t.text}</span>
          </div>
        );
      })}
      <style>{`@keyframes toastIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }`}</style>
    </div>
  );
};

const ExploreScreen = ({ providers, onProvider }) => {
  const [cat, setCat] = useState("all");
  const [query, setQuery] = useState("");
  const [filterOpen, setFilterOpen] = useState(false);
  const [sort, setSort] = useState("recommended");
  const [maxPrice, setMaxPrice] = useState(700);
  const [maxDistance, setMaxDistance] = useState(10);
  const [verifiedOnly, setVerifiedOnly] = useState(false);
  const [minRating, setMinRating] = useState(0);

  const activeFilterCount =
    (sort !== "recommended" ? 1 : 0) +
    (maxPrice < 700 ? 1 : 0) +
    (maxDistance < 10 ? 1 : 0) +
    (verifiedOnly ? 1 : 0) +
    (minRating > 0 ? 1 : 0);

  const filtered = providers
    .filter(p =>
      (cat === "all" || p.cat === cat) &&
      (query === "" || p.name.toLowerCase().includes(query.toLowerCase()) || p.specialty.toLowerCase().includes(query.toLowerCase())) &&
      p.priceFrom <= maxPrice &&
      p.distance <= maxDistance &&
      (!verifiedOnly || p.verified) &&
      p.rating >= minRating
    )
    .sort((a, b) => {
      if (sort === "price_asc") return a.priceFrom - b.priceFrom;
      if (sort === "price_desc") return b.priceFrom - a.priceFrom;
      if (sort === "rating") return b.rating - a.rating;
      if (sort === "distance") return a.distance - b.distance;
      if (sort === "popular") return b.reviews - a.reviews;
      return 0;
    });

  const resetFilters = () => {
    setSort("recommended");
    setMaxPrice(700);
    setMaxDistance(10);
    setVerifiedOnly(false);
    setMinRating(0);
  };

  const sortLabels = {
    recommended: "Recommended",
    price_asc: "Price: low to high",
    price_desc: "Price: high to low",
    rating: "Highest rated",
    distance: "Nearest first",
    popular: "Most popular",
  };

  return (
    <div className="min-h-full relative" style={{ background: tokens.bgBase }}>
      <div className="sticky top-0 z-40 px-5 pt-12 pb-3" style={{ background: tokens.bgBase }}>
        <div className="text-xs uppercase tracking-wider mb-1" style={{ color: tokens.ink500 }}>Categories</div>

          Browse by what you need.

        <div className="flex gap-2">
          <div className="flex-1 relative flex items-center">
            <Search size={16} className="absolute left-3" style={{ color: tokens.ink500 }} />
            <input value={query} onChange={(e) => setQuery(e.target.value)} placeholder="Search providers, services…"
              className="w-full pl-10 pr-3 py-2.5 rounded-xl text-sm outline-none"
              style={{ background: tokens.bgSurface, border: `1px solid ${tokens.border}`, color: tokens.ink900 }} />
          </div>
          <button onClick={() => setFilterOpen(true)} className="relative w-11 h-11 rounded-xl flex items-center justify-center"
            style={{
              background: activeFilterCount > 0 ? tokens.primary : tokens.bgSurface,
              border: `1px solid ${activeFilterCount > 0 ? tokens.primary : tokens.border}`,
            }}>
            <SlidersHorizontal size={16} color={activeFilterCount > 0 ? "#fff" : tokens.ink700} />
            {activeFilterCount > 0 && (
              <div className="absolute -top-1 -right-1 w-4 h-4 rounded-full flex items-center justify-center text-[9px] font-bold text-white"
                style={{ background: tokens.accent }}>
                {activeFilterCount}
              </div>
            )}
          </button>
        </div>
      </div>

      <div className="overflow-x-auto pb-1" style={{ scrollbarWidth: "none" }}>
        <div className="flex gap-2 px-5 py-1">
          <button onClick={() => setCat("all")} className="px-3.5 py-1.5 rounded-full text-xs font-medium whitespace-nowrap"
            style={{
              background: cat === "all" ? tokens.primary : tokens.bgSurface,
              color: cat === "all" ? "#fff" : tokens.ink700,
              border: `1px solid ${cat === "all" ? tokens.primary : tokens.border}`,
            }}>All</button>
          {categories.map(c => (
            <button key={c.id} onClick={() => setCat(c.id)} className="px-3.5 py-1.5 rounded-full text-xs font-medium whitespace-nowrap inline-flex items-center gap-1.5"
              style={{
                background: cat === c.id ? tokens.primary : tokens.bgSurface,
                color: cat === c.id ? "#fff" : tokens.ink700,
                border: `1px solid ${cat === c.id ? tokens.primary : tokens.border}`,
              }}>
              <c.icon size={12} />
              {c.label}
            </button>
          ))}
        </div>
      </div>

      {sort !== "recommended" && (
        <div className="px-5 pt-1">
          <button onClick={() => setFilterOpen(true)} className="inline-flex items-center gap-1.5 text-xs font-medium px-3 py-1.5 rounded-full"
            style={{ background: tokens.primary100, color: tokens.primary }}>
            <span>Sorted by: {sortLabels[sort]}</span>
            <X size={12} onClick={(e) => { e.stopPropagation(); setSort("recommended"); }} />
          </button>
        </div>
      )}

      <div className="px-5 mt-3 pb-4">
        <div className="text-xs mb-2" style={{ color: tokens.ink500 }}>{filtered.length} experts near you</div>
        <div className="grid grid-cols-2 gap-3">
          {filtered.map(p => <ProviderCard key={p.id} provider={p} onClick={() => onProvider(p.id)} />)}
        </div>
        {filtered.length === 0 && (
          <div className="text-center py-12">
            <div className="w-14 h-14 rounded-full mx-auto flex items-center justify-center mb-3" style={{ background: tokens.bgMuted }}>
              <Search size={20} color={tokens.ink500} />
            </div>
            <div className="text-sm font-medium" style={{ color: tokens.ink900 }}>No experts match your filters.</div>
            <button onClick={resetFilters} className="mt-3 text-xs font-medium" style={{ color: tokens.primary }}>
              Reset filters
            </button>
          </div>
        )}
      </div>

      {/* Filter bottom sheet */}
      {filterOpen && (
        <>
          <div onClick={() => setFilterOpen(false)} className="fixed inset-0 z-50" style={{ background: "rgba(26,31,44,0.5)" }} />

              <div className="w-10 h-1 rounded-full mx-auto mb-3" style={{ background: tokens.border }} />

                <h2 className="text-lg font-medium" style={{ fontFamily: "Fraunces, serif", color: tokens.ink900 }}>
                  Filter & sort

                <button onClick={() => setFilterOpen(false)} className="w-8 h-8 rounded-full flex items-center justify-center"
                  style={{ background: tokens.bgMuted }}>
                  <X size={14} color={tokens.ink700} />
                </button>
              </div>
            </div>

            <div className="px-5 py-4">
              {/* Sort */}
              <div className="mb-6">
                <div className="text-xs uppercase tracking-wider font-medium mb-3" style={{ color: tokens.ink500 }}>Sort by</div>
                <div className="flex flex-col gap-1.5">
                  {Object.entries(sortLabels).map(([key, label]) => (
                    <button key={key} onClick={() => setSort(key)}
                      className="flex items-center justify-between px-3 py-2.5 rounded-lg text-left"
                      style={{
                        background: sort === key ? tokens.primary100 : tokens.bgBase,
                        border: `1px solid ${sort === key ? tokens.primary : tokens.border}`,
                      }}>
                      <span className="text-sm font-medium" style={{ color: sort === key ? tokens.primary : tokens.ink900 }}>{label}</span>
                      {sort === key && <Check size={14} color={tokens.primary} />}
                    </button>
                  ))}
                </div>
              </div>

              {/* Price range */}
              <div className="mb-6">
                <div className="flex items-center justify-between mb-2">
                  <div className="text-xs uppercase tracking-wider font-medium" style={{ color: tokens.ink500 }}>Max price</div>

                </div>
                <input type="range" min="1" max="10" step="0.5" value={maxDistance} onChange={(e) => setMaxDistance(Number(e.target.value))}
                  className="w-full" style={{ accentColor: tokens.primary }} />
              </div>

              {/* Min rating */}
              <div className="mb-6">
                <div className="text-xs uppercase tracking-wider font-medium mb-2" style={{ color: tokens.ink500 }}>Minimum rating</div>

// Real calendar — shows 60 days from TODAY, navigable by month, with availability
const RealCalendar = ({ providerId, takenSlots = [], selectedDate, onSelect, monthOffset = 0 }) => {
  const [offset, setOffset] = useState(monthOffset);
  const viewMonth = new Date(TODAY.getFullYear(), TODAY.getMonth() + offset, 1);
  const daysInMonth = new Date(viewMonth.getFullYear(), viewMonth.getMonth() + 1, 0).getDate();
  const firstDayOfWeek = viewMonth.getDay(); // 0 = Sunday
  const cells = firstDayOfWeek + daysInMonth;
  const rows = Math.ceil(cells / 7);
  const totalCells = rows * 7;

  // 60-day booking window
  const windowEnd = addDays(TODAY, 60);
  const canPrev = offset > 0;
  const canNext = addDays(viewMonth, 32) < windowEnd;

  return (
    <div className="rounded-xl p-4" style={{ background: tokens.bgSurface, border: `1px solid ${tokens.border}` }}>
      <div className="flex items-center justify-between mb-3">
        <span className="text-sm font-semibold" style={{ color: tokens.ink900 }}>
          {MONTH_NAMES[viewMonth.getMonth()]} {viewMonth.getFullYear()}
        </span>
        <div className="flex gap-1">
          <button onClick={() => canPrev && setOffset(offset - 1)} disabled={!canPrev}
            className="w-7 h-7 rounded-md flex items-center justify-center disabled:opacity-30"
            style={{ border: `1px solid ${tokens.border}` }}><ArrowLeft size={12}/></button>
          <button onClick={() => canNext && setOffset(offset + 1)} disabled={!canNext}
            className="w-7 h-7 rounded-md flex items-center justify-center disabled:opacity-30"
            style={{ border: `1px solid ${tokens.border}` }}><ArrowRight size={12}/></button>
        </div>
      </div>
      <div className="grid grid-cols-7 gap-1 mb-1">
        {DAY_INITIALS.map((d, i) => (
          <div key={i} className="text-center text-[10px] font-medium py-1" style={{ color: tokens.ink500 }}>{d}</div>
        ))}
      </div>
      <div className="grid grid-cols-7 gap-1">
        {[...Array(totalCells)].map((_, i) => {
          const dnum = i - firstDayOfWeek + 1;
          const inMonth = dnum >= 1 && dnum <= daysInMonth;
          if (!inMonth) return <div key={i} />;
          const date = new Date(viewMonth.getFullYear(), viewMonth.getMonth(), dnum);
          const isPast = date < TODAY && !isSameDate(date, TODAY);
          const inWindow = !isPast && date <= windowEnd;
          const available = inWindow && hasAnyAvailability(providerId, date, takenSlots);
          const selected = isSameDate(selectedDate, date);
          const isTodayCell = isSameDate(date, TODAY);
          return (
            <button key={i} disabled={!available} onClick={() => onSelect(date)}
              className="aspect-square rounded-md text-xs font-medium relative"
              style={{
                background: selected ? tokens.primary : isTodayCell ? tokens.primary100 : "transparent",
                color: selected ? "#fff" : !available ? tokens.ink300 : tokens.ink900,
                fontWeight: isTodayCell && !selected ? 700 : 500,
              }}>
              {dnum}
              {available && !selected && (
                <div className="absolute bottom-1 left-1/2 -translate-x-1/2 w-1 h-1 rounded-full" style={{ background: tokens.primary }} />
              )}
            </button>
          );
        })}
      </div>
    </div>
  );
};

// Cancellation policy: free >24h, 50% refund 2-24h, no refund <2h
function getCancellationPolicy(booking) {
  if (!booking || !booking.date) return { refundPct: 100, label: "Full refund", reason: "No date set." };
  const bookingTime = new Date(booking.date);
  const [h, m] = (booking.slot || "00:00").split(":").map(Number);
  bookingTime.setHours(h || 0, m || 0, 0, 0);
  const hoursUntil = (bookingTime - TODAY) / (1000 * 60 * 60);
  if (booking.status === "pending") {
    return { refundPct: 100, label: "Full refund", reason: "Provider hasn't accepted yet, so nothing has been charged." };
  }
  if (hoursUntil >= 24) {
    return { refundPct: 100, label: "Full refund", reason: `More than 24 hours until your session (${Math.floor(hoursUntil)}h). You'll get the full amount back within 3 business days.` };
  }
  if (hoursUntil >= 2) {
    return { refundPct: 50, label: "50% refund", reason: `Less than 24 hours until your session (${Math.floor(hoursUntil)}h). The provider has reserved time and likely turned other clients away.` };
  }
  return { refundPct: 0, label: "No refund", reason: "Less than 2 hours until your session — too late to release the provider's slot." };
}

  const suggestedIds = me.id === "p2" ? ["p7", "p1", "p5"] : []; // trainer → nutritionist, chef, beauty

    ? others.filter(p =>
        p.name.toLowerCase().includes(query.toLowerCase()) ||
        p.specialty.toLowerCase().includes(query.toLowerCase()))
    : null;

    selected &&
    title.trim().length > 3 &&
    description.trim().length > 5 &&
    regularPrice && bundlePrice &&
    Number(bundlePrice) < Number(regularPrice) &&
    mySharePct >= 1 && mySharePct <= 99;

  const myShareAmount = bundlePrice ? Math.round((Number(bundlePrice) * mySharePct) / 100) : 0;
  const partnerShareAmount = bundlePrice ? Number(bundlePrice) - myShareAmount : 0;

    if (selected && selected.id === "p7") {

                <div className="flex items-center justify-center text-white text-[10px] font-semibold"
                  style={{ background: tokens.accent, width: `${100 - mySharePct}%` }}>
                  {(100 - mySharePct) >= 15 && `${100 - mySharePct}%`}
                </div>
              </div>
              <div className="flex items-center justify-between text-xs">
                <div>
                  <span className="font-medium" style={{ color: tokens.primary }}>{me.name}</span>
                  <span style={{ color: tokens.ink500 }}> takes </span>
                  <span className="font-mono font-semibold" style={{ color: tokens.ink900 }}>QAR {myShareAmount}</span>
                </div>
                <div className="text-right">
                  <span className="font-medium" style={{ color: tokens.accent600 }}>{selected.name}</span>
                  <span style={{ color: tokens.ink500 }}> takes </span>
                  <span className="font-mono font-semibold" style={{ color: tokens.ink900 }}>QAR {partnerShareAmount}</span>
                </div>
              </div>
            </div>

            <div className="rounded-xl p-3 flex items-start gap-2.5"
              style={{ background: tokens.bgMuted }}>
              <AlertCircle size={14} style={{ color: tokens.ink500, marginTop: 2, flexShrink: 0 }} />
              <p className="text-xs" style={{ color: tokens.ink700 }}>
                {selected.name} will receive an invitation showing this {mySharePct}/{100 - mySharePct} split and must approve it before the collab goes live. Clients can then book it from your feed posts.
              </p>
            </div>
          </div>
        )}

        {/* Footer actions */}
        <div className="sticky bottom-0 px-5 pt-3 pb-2 flex gap-2"
          style={{ background: tokens.bgSurface, borderTop: `1px solid ${tokens.border}` }}>
          {step > 1 && (
            <Btn variant="outline" size="md" onClick={() => setStep(step - 1)} className="flex-1">Back</Btn>
          )}
          {step < 3 && (
            <Btn size="md" onClick={() => setStep(step + 1)} className="flex-1"
              disabled={(step === 1 && !selected) || (step === 2 && !valid)}>
              Continue
            </Btn>
          )}
          {step === 3 && (
            <Btn size="md" className="flex-1" leadingIcon={Sparkles}
              onClick={() => onCreate({
                partnerId: selected.id, title, description,
                regularPrice: Number(regularPrice), bundlePrice: Number(bundlePrice),
                mySharePct, partnerSharePct: 100 - mySharePct,
                myShareAmount, partnerShareAmount,
              })}>
              Send invitation to {selected.name}
            </Btn>
          )}
        </div>
      </div>
    </>
  );
};

// Client's Following list — shows providers they follow
const FollowingScreen = ({ providers, onBack, onProvider }) => {
  // Curate which providers Sara follows + a recency hint
  const followed = [
    { providerId: "p1", since: "Following since Jan", lastPost: "2h ago" },
    { providerId: "p2", since: "Following since Feb", lastPost: "5h ago" },
    { providerId: "p3", since: "Following since Feb", lastPost: "1d ago" },
    { providerId: "p5", since: "Following since Mar", lastPost: "3d ago" },
    { providerId: "p6", since: "Following since Mar", lastPost: "1w ago" },
  ].map(f => ({ ...f, provider: providers.find(p => p.id === f.providerId) })).filter(f => f.provider);

  const [unfollowed, setUnfollowed] = useState(new Set());
  const [query, setQuery] = useState("");

  const visible = followed.filter(f =>
    query === "" ||
    f.provider.name.toLowerCase().includes(query.toLowerCase()) ||
    f.provider.specialty.toLowerCase().includes(query.toLowerCase())
  );

  const toggleUnfollow = (id) => {
    setUnfollowed(prev => {
      const next = new Set(prev);
      if (next.has(id)) next.delete(id);
      else next.add(id);
      return next;
    });
  };

  const activeCount = followed.length - unfollowed.size;

  return (
    <div className="min-h-full" style={{ background: tokens.bgBase }}>
      <TopBar onBack={onBack} title="Following" />

      <div className="px-5">
        <div className="text-xs" style={{ color: tokens.ink500 }}>
          You're following <span style={{ color: tokens.ink900, fontWeight: 600 }}>{activeCount}</span> {activeCount === 1 ? "provider" : "providers"}. Their latest posts show in your feed.
        </div>

        <div className="mt-4 relative flex items-center">
          <Search size={16} className="absolute left-3" style={{ color: tokens.ink500 }} />
          <input value={query} onChange={(e) => setQuery(e.target.value)} placeholder="Search the providers you follow"
            className="w-full pl-10 pr-3 py-2.5 rounded-xl text-sm outline-none"
            style={{ background: tokens.bgSurface, border: `1px solid ${tokens.border}`, color: tokens.ink900 }} />
        </div>
      </div>

      <div className="px-5 mt-4 flex flex-col gap-2 pb-6">
        {visible.length === 0 && (
          <div className="text-center py-12">
            <div className="w-14 h-14 rounded-full mx-auto flex items-center justify-center mb-3" style={{ background: tokens.bgMuted }}>
              <Users size={20} color={tokens.ink500} />
            </div>
            <div className="text-sm font-medium" style={{ color: tokens.ink900 }}>
              {followed.length === 0 ? "You're not following anyone yet" : "No matches"}
            </div>
            {followed.length === 0 && (
              <div className="text-xs mt-1" style={{ color: tokens.ink500 }}>Find experts in Explore and tap Follow.</div>
            )}
          </div>
        )}
        {visible.map(f => {
          const isUnfollowed = unfollowed.has(f.providerId);
          return (
            <div key={f.providerId} className="rounded-xl p-3 flex items-center gap-3"
              style={{ background: tokens.bgSurface, border: `1px solid ${tokens.border}`, opacity: isUnfollowed ? 0.55 : 1 }}>
              <button onClick={() => onProvider(f.providerId)} className="flex-shrink-0">
                <CoverArt tone={f.provider.cover} className="w-12 h-12 rounded-full" />
              </button>
              <button onClick={() => onProvider(f.providerId)} className="flex-1 text-left min-w-0">
                <div className="flex items-center gap-1">
                  <span className="text-sm font-semibold truncate" style={{ color: tokens.ink900 }}>{f.provider.name}</span>
                  {f.provider.verified && <ShieldCheck size={12} style={{ color: tokens.primary, flexShrink: 0 }} />}
                </div>
                <div className="text-xs mt-0.5 truncate" style={{ color: tokens.ink500 }}>
                  {f.provider.specialty} · Last post {f.lastPost}
                </div>
              </button>
              <button onClick={() => toggleUnfollow(f.providerId)}
                className="px-3 py-1.5 rounded-full text-xs font-medium flex-shrink-0 transition-colors"
                style={{
                  background: isUnfollowed ? tokens.primary : tokens.bgBase,
                  color: isUnfollowed ? "#fff" : tokens.ink700,
                  border: `1px solid ${isUnfollowed ? tokens.primary : tokens.border}`,
                }}>
                {isUnfollowed ? "Follow" : "Following"}
              </button>
            </div>
          );
        })}
      </div>
    </div>
  );
};

              <div className="mt-3 flex items-center justify-between">
                <StatusBadge status="confirmed" />

            )}
            {tab === "completed" && (
              <div className="mt-3"><StatusBadge status="completed" /></div>
            )}
          </div>
        ))}
      </div>

      {composerOpen && (
        <CustomBookingComposer onClose={() => setComposerOpen(false)} onCreate={addCustomBooking} />

    </div>
  );
};

                            <span>{f}</span>
                          </div>
                        ))}
                      </div>
                    )}

                    <div className="mt-2 flex items-center gap-1.5 text-[11px]" style={{ color: tokens.ink500 }}>
                      <FileText size={11} /> {a.docs.length} documents · {a.docs.join(", ")}
                    </div>
                    <div className="mt-3 flex gap-2">
                      <Btn size="sm" leadingIcon={Check} disabled={a.flags.length > 0} onClick={() => approveApp(a)}>Approve</Btn>
                      <Btn size="sm" variant="outline" leadingIcon={X} onClick={() => rejectApp(a)}>Reject</Btn>
                      <Btn size="sm" variant="ghost" onClick={() => reviewApp(a)}>Review</Btn>
                    </div>
                  </div>
                </div>
              </div>
            ))}
          </div>
        </>
      )}

      {tab === "compliance" && (
        <>
          <div className="px-5">
            <div className="rounded-xl p-3 flex items-start gap-2.5"
              style={{ background: tokens.primary100, border: `1px solid ${tokens.primary + "33"}` }}>
              <ShieldCheck size={14} style={{ color: tokens.primary, marginTop: 2, flexShrink: 0 }} />
              <div className="text-[11px]" style={{ color: tokens.ink900 }}>
                <span style={{ fontWeight: 600 }}>Provider classification:</span> toBayt operates as a marketplace, not the employer of providers. Each provider is responsible for their own commercial registration, sponsor permissions, and tax status under Qatari law. Items below are the platform's quarterly review.
              </div>
            </div>
          </div>

          <div className="px-5 mt-3 grid grid-cols-3 gap-2">
            {[
              { label: "Compliant", value: compliance.filter(c => c.risk === "low").length, color: tokens.success },
              { label: "Action needed", value: compliance.filter(c => c.risk === "medium").length, color: tokens.accent600 },
              { label: "At risk", value: compliance.filter(c => c.risk === "high").length, color: tokens.danger },
            ].map((s, i) => (
              <div key={i} className="rounded-xl p-3" style={{ background: tokens.bgSurface, border: `1px solid ${tokens.border}` }}>
                <div className="text-[10px] uppercase tracking-wider font-medium" style={{ color: tokens.ink500 }}>{s.label}</div>
                <div className="text-xl font-semibold font-mono mt-1" style={{ color: s.color }}>{s.value}</div>
              </div>
            ))}
          </div>

          <div className="px-5 mt-4 flex flex-col gap-3 pb-6">
            {compliance.map((c, i) => (
              <div key={i} className="rounded-xl p-4" style={{ background: tokens.bgSurface, border: `1px solid ${tokens.border}` }}>
                <div className="flex items-start gap-3">
                  <div className="w-10 h-10 rounded-full flex items-center justify-center text-white font-semibold flex-shrink-0"
                    style={{ background: tokens.primary, fontFamily: "Fraunces, serif" }}>{c.name[0]}</div>
                  <div className="flex-1">
                    <div className="flex items-start justify-between">
                      <div>
                        <div className="text-sm font-semibold" style={{ color: tokens.ink900 }}>{c.name}</div>
                        <div className="text-xs mt-0.5" style={{ color: tokens.ink500 }}>{c.spec} · Last review {c.lastReview}</div>
                      </div>
                      <Pill bg={riskColor[c.risk] + "22"} color={riskColor[c.risk]}>
                        {c.risk === "low" ? "Compliant" : c.risk === "medium" ? "Action needed" : "At risk"}
                      </Pill>
                    </div>
                    <div className="mt-3 grid grid-cols-1 gap-1.5 text-[11px]">
                      <div className="flex items-baseline gap-2">
                        <span className="uppercase tracking-wider" style={{ color: tokens.ink500, fontSize: 9, minWidth: 70 }}>Residency</span>
                        <span style={{ color: tokens.ink900 }}>{c.residency}</span>
                      </div>
                      <div className="flex items-baseline gap-2">
                        <span className="uppercase tracking-wider" style={{ color: tokens.ink500, fontSize: 9, minWidth: 70 }}>CR / NOC</span>
                        <span style={{ color: c.crStatus.includes("overdue") ? tokens.danger : tokens.ink900 }}>{c.crStatus}</span>
                      </div>
                      <div className="flex items-baseline gap-2">
                        <span className="uppercase tracking-wider" style={{ color: tokens.ink500, fontSize: 9, minWidth: 70 }}>Insurance</span>
                        <span style={{ color: c.insuranceStatus === "Renewal due" ? tokens.accent600 : tokens.ink900 }}>{c.insuranceStatus}</span>
                      </div>
                    </div>
                    {c.risk !== "low" && (
                      <div className="mt-3 flex gap-2">
                        <Btn size="sm" variant="outline" onClick={() => showToast(`Reminder sent to ${c.name}`, "success")}>Send reminder</Btn>
                        {c.risk === "high" && <Btn size="sm" variant="danger" onClick={() => showToast(`${c.name} suspended pending review`)}>Suspend</Btn>}
                      </div>
                    )}
                  </div>
                </div>
              </div>
            ))}
          </div>
        </>
      )}
    </div>
  );
};

// =====================================================
// ROOT APP
// =====================================================
function App() {
  const [providers] = useState(seedProviders);
  const [posts] = useState(seedPosts);
  const [route, setRoute] = useState({ name: "landing" });
  const [tab, setTab] = useState("feed");
  const [providerTab, setProviderTab] = useState("dashboard");
  const [role, setRole] = useState("client");
  const [bookings, setBookings] = useState([
    {
      id: "b1", providerId: "p1",
      providerName: "Layla", providerCover: "warm-orange",
      serviceTitle: "Cooking Class — Mezze", serviceId: "s2",
      date: addDays(TODAY, 5).toISOString(), slot: "18:00",
      when: `${fmtDateShort(addDays(TODAY, 5))} · 18:00`,
      locType: "client_home",
      total: 292, status: "confirmed",
    },
    {
      id: "b2", providerId: "p2",
      providerName: "Khalid", providerCover: "deep-teal",
      serviceTitle: "1-on-1 Strength Session", serviceId: "s4",
      date: addDays(TODAY, 8).toISOString(), slot: "07:00",
      when: `${fmtDateShort(addDays(TODAY, 8))} · 07:00`,
      locType: "provider_location",
      total: 192, status: "approved",
    },
    {
      id: "b3", providerId: "p3",
      providerName: "Aisha", providerCover: "soft-saffron",
      serviceTitle: "Conversational Arabic", serviceId: "s6",
      date: addDays(TODAY, -7).toISOString(), slot: "17:00",
      when: `${fmtDateShort(addDays(TODAY, -7))} · 17:00`,
      locType: "client_home",
      total: 132, status: "completed",
    },
  ]);

  const [threads, setThreads] = useState({
    b1: [
      { system: true, icon: "calendar", text: "Booking confirmed by Layla", time: "3 days ago" },
      { from: "provider", text: "Looking forward to it. Any allergies or strong preferences I should plan around?", time: "3 days ago", read: true },
      { from: "client", text: "Nothing serious — my husband doesn't love eggplant but everyone else is fine. Aim for 6 people.", time: "3 days ago" },
      { from: "provider", text: "Got it. I'll plan a mezze spread, no eggplant. I'll arrive 90 min before with everything I need.", time: "2 days ago", read: true },
      { from: "provider", text: "Quick check — is parking available at The Pearl? And is there an oven I can use?", time: "12 min ago", read: false },
    ],
    b2: [
      { system: true, icon: "calendar", text: "Booking sent to Khalid · waiting for acceptance", time: "1 hour ago" },
      { system: true, icon: "check", text: "Khalid accepted your booking", time: "30 min ago" },
      { from: "provider", text: "Confirmed for Thursday morning at the West Bay studio. Bring water and trainers, that's it.", time: "30 min ago", read: false },
    ],
    b3: [
      { system: true, icon: "check", text: "Session completed", time: "1 week ago" },
      { from: "provider", text: "Worksheets I mentioned — I emailed them too. See you next time.", time: "1 week ago", read: true },
      { from: "client", text: "Got them, thank you Aisha!", time: "1 week ago" },
    ],
  });

  const goto = (name, params = {}) => setRoute({ name, ...params });

  const provider = useMemo(() => providers.find(p => p.id === route.providerId), [route.providerId, providers]);

  const handleBook = (data) => {
    const newBooking = {
      id: `b${bookings.length + 1}`,
      providerId: provider.id,
      providerName: provider.name, providerCover: provider.cover,
      serviceTitle: data.service.title,
      serviceId: data.service.id,
      serviceDescription: data.service.description || null,
      isCustomService: !!data.isCustom,
      date: data.date.toISOString(),
      slot: data.slot,
      when: `${fmtDateShort(data.date)} · ${data.slot}`,
      locType: data.locType,
      total: data.service.price + 12,
      status: "pending",
    };
    setBookings([newBooking, ...bookings]);
    goto("bookingPending");
  };

  const handleTab = (t) => {
    setTab(t);
    goto(t);
  };

  const handlePay = (id) => {
    const b = bookings.find(x => x.id === id);
    goto("payment", { booking: b });
  };

  const handlePaymentSuccess = (method) => {
    setBookings(bookings.map(b => b.status === "approved" ? { ...b, status: "confirmed", paymentMethod: method } : b));
    goto("bookings");
    setTab("bookings");
  };

  const handleBookCollab = (data) => {
    const { post, date, slotA, slotB, provider: prov, partner } = data;
    const newBooking = {
      id: `b${bookings.length + 1}`,
      providerId: prov.id,
      partnerId: partner.id,
      providerName: `${prov.name} × ${partner.name}`,
      providerCover: post.coverTone,
      serviceTitle: post.collab.title,
      date: date.toISOString(),
      slot: `${slotA} & ${slotB}`,
      slotA, slotB,
      when: `${fmtDateShort(date)} · ${slotA} & ${slotB}`,
      locType: "client_home",
      total: post.collab.bundlePrice,
      status: "pending",
      isCollab: true,
    };
    setBookings([newBooking, ...bookings]);
    goto("bookingPending");
  };

  const handleOpenBooking = (id) => {
    goto("bookingDetail", { bookingId: id });
  };

  const handleCancelBooking = (id, refundAmount) => {
    setBookings(bookings.map(b => b.id === id ? { ...b, status: "cancelled", refundedAmount: refundAmount } : b));
    goto("bookings");
  };

  const handleReschedule = (booking) => {
    goto("reschedule", { bookingId: booking.id });
  };

  const handleRescheduleComplete = (id, newDate, newSlot) => {
    setBookings(bookings.map(b => b.id === id ? {
      ...b,
      date: newDate.toISOString(),
      slot: newSlot,
      when: `${fmtDateShort(newDate)} · ${newSlot}`,
      // Going back through provider acceptance is the safe default
      status: b.status === "pending" ? "pending" : "confirmed",
      rescheduled: true,
    } : b));
    goto("bookingDetail", { bookingId: id });
  };

  const handleMessage = (booking) => {
    goto("chat", { bookingId: booking.id });
    // Mark all provider messages in this thread as read
    setThreads(prev => ({
      ...prev,
      [booking.id]: (prev[booking.id] || []).map(m => m.from === "provider" ? { ...m, read: true } : m),
    }));
  };

  const handleProviderInquiry = (prov) => {
    const inquiryId = `inquiry-${prov.id}`;
    // Create a virtual "booking" to satisfy the ChatScreen interface
    const inquiryBooking = {
      id: inquiryId,
      providerId: prov.id,
      providerName: prov.name,
      providerCover: prov.cover,
      serviceTitle: "Inquiry · no booking yet",
      when: "Pre-booking message",
      isInquiry: true,
    };
    // Persist the synthetic booking so other screens (ChatScreen) can find it via id lookup
    if (!bookings.find(b => b.id === inquiryId)) {
      setBookings(prev => [inquiryBooking, ...prev]);
    }
    // Seed thread with a system intro if empty
    setThreads(prev => prev[inquiryId] ? prev : {
      ...prev,
      [inquiryId]: [
        { system: true, icon: "alert", text: `New inquiry · ${prov.name} hasn't been booked yet`, time: "Just now" },
      ],
    });
    goto("chat", { bookingId: inquiryId });
  };

  const handleSendMessage = (bookingId, text) => {
    setThreads(prev => ({
      ...prev,
      [bookingId]: [...(prev[bookingId] || []), { from: "client", text, time: "Just now" }],
    }));
  };

  const handleShareLocation = (bookingId) => {
    setThreads(prev => ({
      ...prev,
      [bookingId]: [...(prev[bookingId] || []), { system: true, icon: "alert", text: "You shared your live location for this session", time: "Just now" }],
    }));
  };

  const handleReportIssue = (bookingId) => {
    setThreads(prev => ({
      ...prev,
      [bookingId]: [...(prev[bookingId] || []), { system: true, icon: "alert", text: "Issue reported to toBayt support · we'll reach out within 1 hour", time: "Just now" }],
    }));
  };

  // Render
  let screen;
  if (role === "provider") {
    if (providerTab === "profile") screen = <ProviderProfileScreen providers={providers} />;
    else if (providerTab === "bookings") screen = <ProviderBookingsScreen />;
    else if (providerTab === "wallet") screen = <ProviderWalletScreen />;
    else screen = <ProviderDashboard onSwitch={() => showToast("3 new notifications · feature coming soon")} />;
  } else if (role === "admin") {
    screen = <AdminScreen onSwitch={() => showToast("Sign out · use the role toggle above")} />;
  } else {
    switch (route.name) {
      case "landing":
        screen = <LandingScreen onContinue={(s) => goto(s)} />;
        break;
      case "login":
        screen = <LoginScreen onContinue={(s) => goto(s)} onBack={() => goto("landing")} />;
        break;
      case "otp":
        screen = <OtpScreen onContinue={(s) => { goto(s); setTab("feed"); }} onBack={() => goto("login")} />;
        break;
      case "feed":
        screen = <FeedScreen providers={providers} posts={posts} onTab={handleTab} onProvider={(id) => goto("provider", { providerId: id })} onBookCollab={(p) => goto("bookCollab", { post: p })} onBookService={(pid, sid) => goto("booking", { providerId: pid, serviceId: sid })} />;
        break;
      case "explore":
        screen = <ExploreScreen providers={providers} onProvider={(id) => goto("provider", { providerId: id })} />;
        break;
      case "provider":
        screen = <ProviderDetailScreen provider={provider} onBack={() => goto(tab)} onBook={() => goto("booking", { providerId: route.providerId })} onMessage={handleProviderInquiry} />;
        break;
      case "booking":
        screen = <BookingFlow provider={provider} initialServiceId={route.serviceId} onBack={() => goto("provider", { providerId: route.providerId })} onComplete={handleBook} />;
        break;
      case "bookCollab":
        screen = <CollabBookScreen post={route.post} providers={providers} onBack={() => goto("feed")} onComplete={handleBookCollab} />;
        break;
      case "bookingPending":
        screen = <BookingPendingScreen onView={() => { setTab("bookings"); goto("bookings"); }} />;
        break;
      case "bookings":
        screen = <BookingsScreen bookings={bookings} onTab={handleTab} onPay={handlePay} onOpen={handleOpenBooking} onProvider={(id) => goto("provider", { providerId: id })} />;
        break;
      case "bookingDetail": {
        const b = bookings.find(x => x.id === route.bookingId);
        screen = <BookingDetailScreen booking={b} providers={providers}
          onBack={() => goto("bookings")} onPay={handlePay}
          onCancel={handleCancelBooking} onReschedule={handleReschedule} onMessage={handleMessage}
          onProvider={(id) => goto("provider", { providerId: id })} />;
        break;
      }
      case "reschedule": {
        const b = bookings.find(x => x.id === route.bookingId);
        screen = <RescheduleFlow booking={b} providers={providers}
          onBack={() => goto("bookingDetail", { bookingId: route.bookingId })}
          onComplete={handleRescheduleComplete} />;
        break;
      }
      case "payment":
        screen = <PaymentScreen booking={route.booking} onBack={() => goto("bookings")} onSuccess={handlePaymentSuccess} />;
        break;
      case "messages":
        screen = <InboxScreen bookings={bookings} threads={threads} providers={providers}
          onOpenChat={(id) => handleMessage(bookings.find(b => b.id === id))} />;
        break;
      case "chat": {
        const b = bookings.find(x => x.id === route.bookingId);
        screen = <ChatScreen booking={b} providers={providers} thread={threads[route.bookingId]}
          onBack={() => goto("messages")}
          onSend={handleSendMessage}
          onShareLocation={handleShareLocation}
          onRequestReschedule={handleReschedule}
          onReportIssue={handleReportIssue} />;
        break;
      }
      case "profile":
        screen = <ProfileScreen onTab={handleTab} onFollowing={() => goto("following")} onTerms={() => goto("terms")} />;
        break;
      case "following":
        screen = <FollowingScreen providers={providers} onBack={() => goto("profile")} onProvider={(id) => goto("provider", { providerId: id })} />;
        break;
      case "terms":
        screen = <TermsScreen onBack={() => goto("profile")} />;
        break;
      default:
        screen = <FeedScreen providers={providers} posts={posts} onTab={handleTab} onProvider={(id) => goto("provider", { providerId: id })} onBookCollab={(p) => goto("bookCollab", { post: p })} onBookService={(pid, sid) => goto("booking", { providerId: pid, serviceId: sid })} />;
    }
  }

  const showTabs = role === "client" && ["feed", "explore", "bookings", "messages", "profile"].includes(route.name);
  const showProviderTabs = role === "provider";

  const ProviderTabBar = () => {
    const ptabs = [
      { id: "dashboard", label: "Dashboard", icon: LayoutDashboard },
      { id: "bookings", label: "Bookings", icon: CalendarIcon },
      { id: "wallet", label: "Wallet", icon: Wallet },
      { id: "profile", label: "You", icon: User },
    ];
    return (
      <div className="sticky bottom-0 z-40 grid grid-cols-4 px-2 pt-2 pb-6"
        style={{ background: tokens.bgSurface, borderTop: `1px solid ${tokens.border}` }}>
        {ptabs.map(t => {
          const Icon = t.icon;
          const isActive = providerTab === t.id;
          return (
            <button key={t.id} onClick={() => setProviderTab(t.id)} className="flex flex-col items-center gap-1 py-1">
              <div className="relative">
                <Icon size={22} style={{ color: isActive ? tokens.primary : tokens.ink500 }} fill={isActive ? tokens.primary100 : "none"} />
                {isActive && <div className="absolute -bottom-1 left-1/2 -translate-x-1/2 w-1 h-1 rounded-full" style={{ background: tokens.primary }} />}
              </div>
              <span className="text-[10px] font-medium" style={{ color: isActive ? tokens.primary : tokens.ink500 }}>{t.label}</span>
            </button>
          );
        })}
      </div>
    );
  };

  return (
    <div className="min-h-screen w-full p-4 sm:p-8 flex flex-col items-center gap-6"
      style={{
        background: `radial-gradient(at 0% 0%, ${tokens.primary100} 0%, transparent 40%), radial-gradient(at 100% 100%, ${tokens.accent100} 0%, transparent 40%), ${tokens.bgBase}`,
        fontFamily: "system-ui, -apple-system, sans-serif",
      }}>
      {/* Google Fonts */}
      <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

      {/* Header / role switcher */}
      <div className="w-full max-w-2xl flex flex-col items-center gap-3">
        <div className="flex items-center gap-3">
          <Logo size={28} />
          <Pill bg={tokens.accent100} color={tokens.accent600}>Prototype</Pill>
        </div>
        <div className="flex items-center gap-1 p-1 rounded-xl" style={{ background: tokens.bgSurface, border: `1px solid ${tokens.border}` }}>
          {[
            { id: "client", label: "Client", icon: User },
            { id: "provider", label: "Provider", icon: Briefcase },
            { id: "admin", label: "Admin", icon: ShieldCheck },
          ].map(r => (
            <button key={r.id} onClick={() => { setRole(r.id); if (r.id === "client") { goto("feed"); setTab("feed"); } }}
              className="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-medium transition-all"
              style={{
                background: role === r.id ? tokens.primary : "transparent",
                color: role === r.id ? "#fff" : tokens.ink700,
              }}>
              <r.icon size={12} />
              {r.label}
            </button>
          ))}
        </div>
        <p className="text-xs text-center max-w-md" style={{ color: tokens.ink500 }}>
          Click around — book a session, accept a request, review applications. Tap the role switcher above to swap perspectives.
        </p>
      </div>

      {/* Phone */}
      <PhoneFrame>
        <div className="flex flex-col h-full">
          <div className="flex-1">{screen}</div>
          {showTabs && <TabBar active={tab} onChange={handleTab} />}
          {showProviderTabs && <ProviderTabBar />}
        </div>
      </PhoneFrame>

      <ToastHost />

      <div className="text-xs text-center" style={{ color: tokens.ink500 }}>
        toBayt · Doha · Qatar — A working prototype
      </div>
    </div>
  );
}

// =====================================================
// MOUNT
// =====================================================
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
document.getElementById("loading").style.display = "none";
</script>

</body>
</html>
