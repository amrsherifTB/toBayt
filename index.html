const ProviderProfilePage = ({ user, providers, onProviderUpdate, onNavigate }) => {
  // Decide which provider record to display:
  // 1. Real logged-in user → look up by their auth.uid() in Supabase
  // 2. Admin viewing as provider → no demo data, just show an empty state
  const isAdminViewer = user?.id === 'admin-shortcut' || user?.role === 'admin';
  const lookupId = isAdminViewer ? null : user?.id;
  const [fetched, setFetched] = useState(null);
  const [fetchError, setFetchError] = useState(false);
  const [editing, setEditing] = useState(false);
  const [draft, setDraft] = useState({});
  const [uploadingAvatar, setUploadingAvatar] = useState(false);
  const [applyOpen, setApplyOpen] = useState(false);

  // Try the in-memory list first (covers both seed providers and approved real providers)
  const cached = lookupId
    ? providers.find(p => p.id === lookupId || p.userId === lookupId)
    : null;
  const me = cached || fetched;

  // If not in the cached list, fetch directly (handles pending providers + admin seed lookups)
  useEffect(() => {
    if (cached || !lookupId) return;
    setFetchError(false);
    // Real users: lookup by user_id. (Admin viewer is short-circuited to null lookupId.)
    const lookup = sb.from('providers').select('*').eq('user_id', lookupId).maybeSingle();
    lookup.then(({ data, error }) => {
      if (error || !data) setFetchError(true);
      else setFetched(mapProvider(data));
    });
  }, [lookupId, cached?.id, isAdminViewer]);

  useEffect(() => { if (me) setDraft({ name: me.name, specialty: me.specialty, bio: me.bio, priceFrom: me.priceFrom, city: me.city }); }, [me?.id]);

  const save = async () => {
    if (!me) return;
    try {
      const updated = await updateProviderRecord(me.id, { ...draft, priceFrom: Number(draft.priceFrom) });
      onProviderUpdate(updated);
      setFetched(updated);
      showToast('Profile updated', 'success');
      setEditing(false);
    } catch (e) { showToast('Failed to save: ' + e.message, 'error'); }
  };
  const handleAvatarChange = async (file) => {
    if (!file || !user?.id || user.id === 'admin-shortcut' || !me) return;
    setUploadingAvatar(true);
    try {
      const url = await uploadToBucket('provider-avatars', file, user.id);
      const updated = await updateProviderRecord(me.id, { avatarUrl: url });
      onProviderUpdate(updated);
      setFetched(updated);
      try { await sb.auth.updateUser({ data: { avatarUrl: url } }); } catch (e) {}
      showToast('Photo updated', 'success');
    } catch (e) { showToast('Upload failed: ' + e.message, 'error'); }
    setUploadingAvatar(false);
  };

  // ===== Empty state: no provider record found =====
  if (!me) {
    if (lookupId && !fetchError) {
      // still loading
      return <div className="max-w-4xl mx-auto px-4 sm:px-6 py-12 text-center text-sm" style={{ color: T.ink500 }}>Loading provider profile…</div>;
    }
    return (
      <div className="max-w-2xl mx-auto px-4 sm:px-6 py-12">
        <BecomeProviderModal
          open={applyOpen}
          onClose={() => setApplyOpen(false)}
          user={user}
          onDone={({ created }) => {
            if (created) {
              setFetched(created);
              onProviderUpdate(created);
            }
          }}
        />
        <div className="rounded-2xl p-8 text-center" style={{ background:T.bgSurface, border:`1px solid ${T.border}` }}>
          <Briefcase size={28} className="mx-auto mb-3" style={{ color:T.accent }}/>
          <h2 className="text-lg font-semibold mb-1" style={{ fontFamily:'Fraunces,serif', color:T.ink900 }}>No provider profile yet</h2>
          {isAdminViewer ? (
            <p className="text-sm mb-5" style={{ color:T.ink500 }}>You're signed in as admin. The provider view is empty because admins don't have provider profiles — switch back via the role toggle to see the admin panel.</p>
          ) : (
            <>
              <p className="text-sm mb-5" style={{ color:T.ink500 }}>You're signed in as <strong>{user?.name}</strong> ({user?.email}). Submit a short application to list services on toBayt — admin will review it within 48h.</p>
              <Btn leadingIcon={Sparkles} variant="secondary" onClick={() => setApplyOpen(true)}>Submit provider application</Btn>
              <p className="text-xs mt-4" style={{ color:T.ink500 }}>Takes 1–2 minutes. You'll appear in Browse once approved.</p>
            </>
          )}
        </div>
      </div>
    );
  }
  return (
    <div className="max-w-4xl mx-auto px-4 sm:px-6 py-8">
      <div className="rounded-2xl p-6 mb-6" style={{ background:T.bgSurface, border:`1px solid ${T.border}` }}>
        <div className="flex items-start gap-5">
          <div className="relative">
            {me.avatarUrl ? (
              <img src={me.avatarUrl} alt={me.name} className="w-20 h-20 rounded-full object-cover" style={{ border:`2px solid ${T.border}` }}/>
            ) : (
              <div className="w-20 h-20 rounded-full flex items-center justify-center text-white text-2xl font-semibold" style={{ background:`linear-gradient(135deg,${T.primary},${T.accent})`, fontFamily:'Fraunces,serif' }}>{me.name[0]}</div>
            )}
            {me.verified && <div className="absolute -bottom-1 -right-1 w-7 h-7 rounded-full flex items-center justify-center" style={{ background:T.bgSurface, border:`2px solid ${T.bgBase}` }}><ShieldCheck size={14} style={{ color:T.primary }}/></div>}
            <label className="absolute -bottom-1 -left-1 w-7 h-7 rounded-full flex items-center justify-center cursor-pointer" style={{ background:T.primary, color:'#fff', border:`2px solid ${T.bgBase}` }} title="Change photo">
              {uploadingAvatar ? <Clock size={12}/> : <Camera size={12}/>}
              <input type="file" accept="image/*" className="hidden" onChange={e => handleAvatarChange(e.target.files?.[0])}/>
            </label>
          </div>
          <div className="flex-1">
            {!editing ? (
              <>
                <h1 className="text-2xl font-semibold" style={{ fontFamily:'Fraunces,serif', color:T.ink900 }}>{me.name}</h1>
                <div className="text-sm mt-0.5" style={{ color:T.accent600 }}>{me.specialty}{me.verified ? ' · Verified' : me.status === 'pending' ? ' · Pending review' : ''}</div>
                <p className="mt-2 text-sm leading-relaxed" style={{ color:T.ink700 }}>{me.bio}</p>
                <div className="mt-3 text-sm" style={{ color:T.ink500 }}>From <strong style={{ color:T.ink900 }}>QAR {me.priceFrom}</strong> · {me.city}</div>
              </>
            ) : (
              <div className="flex flex-col gap-3">
                {[{label:'Name',key:'name'},{label:'Specialty',key:'specialty'},{label:'City',key:'city'}].map(f => (
                  <div key={f.key}><label className="text-xs uppercase font-medium block mb-1" style={{ color:T.ink500 }}>{f.label}</label><input value={draft[f.key] || ''} onChange={e => setDraft(d => ({...d, [f.key]: e.target.value}))} className="w-full py-2 px-3 rounded-lg text-sm outline-none" style={{ background:T.bgMuted, border:`1px solid ${T.border}`, color:T.ink900 }}/></div>
                ))}
                <div><label className="text-xs uppercase font-medium block mb-1" style={{ color:T.ink500 }}>Bio</label><textarea value={draft.bio || ''} onChange={e => setDraft(d => ({...d, bio: e.target.value}))} rows={4} className="w-full py-2 px-3 rounded-lg text-sm outline-none resize-none" style={{ background:T.bgMuted, border:`1px solid ${T.border}`, color:T.ink900 }}/></div>
                <div><label className="text-xs uppercase font-medium block mb-1" style={{ color:T.ink500 }}>Price from (QAR)</label><input value={draft.priceFrom || ''} onChange={e => setDraft(d => ({...d, priceFrom: e.target.value.replace(/\D/g,'')}))} className="w-full py-2 px-3 rounded-lg text-sm outline-none" style={{ background:T.bgMuted, border:`1px solid ${T.border}`, color:T.ink900 }}/></div>
              </div>
            )}
          </div>
          <div className="flex gap-2">
            {!editing ? <Btn size="sm" variant="outline" onClick={() => setEditing(true)}>Edit</Btn>
              : <><Btn size="sm" variant="outline" onClick={() => setEditing(false)}>Cancel</Btn><Btn size="sm" onClick={save}>Save</Btn></>}
          </div>
        </div>
      </div>
      <ProviderProfileTabs me={me} user={user} onProviderUpdate={updated => { onProviderUpdate(updated); setFetched(updated); }} onNavigate={onNavigate}/>
    </div>
  );
};

// AVAILABILITY PICKER (calendar pop-up for per-service hours)
// ============================================================
const AvailabilityPickerModal = ({ open, onClose, initialHours, onSave }) => {
  const blank = { 0:[], 1:[], 2:[], 3:[], 4:[], 5:[], 6:[] };
  const [hours, setHours] = useState(initialHours || blank);
  const [selectedDay, setSelectedDay] = useState(1);
  useEffect(() => { if (open) setHours(initialHours || blank); }, [open, initialHours]);

  const DAY_SHORT = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  // 06:00 → 22:00 hourly grid (extend if needed)
  const HOUR_SLOTS = Array.from({ length: 17 }, (_, i) => `${String(i + 6).padStart(2,'0')}:00`);

  const dayHours = hours[selectedDay] || [];
  const totalSlots = Object.values(hours).reduce((s, h) => s + h.length, 0);

  const toggleHour = (h) => {
    setHours(p => {
      const day = p[selectedDay] || [];
      if (day.includes(h)) return { ...p, [selectedDay]: day.filter(x => x !== h) };
      return { ...p, [selectedDay]: [...day, h].sort() };
    });
  };
  const setRange = (start, end) => {
    const slots = HOUR_SLOTS.filter(h => {
      const hr = Number(h.split(':')[0]);
      return hr >= start && hr <= end;
    });
    setHours(p => ({ ...p, [selectedDay]: slots }));
  };
  const copyToDays = (targetDays) => {
    const day = hours[selectedDay] || [];
    setHours(p => {
      const next = { ...p };
      targetDays.forEach(d => { next[d] = [...day]; });
      return next;
    });
    showToast(`Copied to ${targetDays.length} day${targetDays.length === 1 ? '' : 's'}`, 'success');
  };
  const clearDay = () => setHours(p => ({ ...p, [selectedDay]: [] }));
  const clearAll = () => setHours(blank);

  return (
    <Modal open={open} onClose={onClose} title="Set service availability" maxWidth={580}>
      <div className="p-6 flex flex-col gap-4">
        <p className="text-xs" style={{ color: T.ink500 }}>Pick which days &amp; hours this service is bookable. Tap any time slot to toggle it on or off.</p>

        {/* Day-of-week picker */}
        <div>
          <div className="text-[10px] uppercase font-medium mb-2 tracking-wider" style={{ color: T.ink500 }}>Day</div>
          <div className="grid grid-cols-7 gap-1.5">
            {DAY_SHORT.map((d, i) => {
              const isSelected = selectedDay === i;
              const count = (hours[i] || []).length;
              return (
                <button key={i} onClick={() => setSelectedDay(i)} className="flex flex-col items-center py-2 rounded-lg transition-colors" style={{ background: isSelected ? T.primary : count > 0 ? T.primary100 : T.bgMuted, color: isSelected ? '#fff' : count > 0 ? T.primary : T.ink500 }}>
                  <span className="text-xs font-semibold">{d}</span>
                  <span className="text-[10px] mt-0.5 opacity-90">{count > 0 ? `${count}h` : '—'}</span>
                </button>
              );
            })}
          </div>
        </div>

        {/* Hour toggle grid */}
        <div>
          <div className="flex items-center justify-between mb-2">
            <div className="text-[10px] uppercase font-medium tracking-wider" style={{ color: T.ink500 }}>{DAY_NAMES[selectedDay]} · time slots</div>
            <button onClick={clearDay} className="text-[11px]" style={{ color: T.danger }}>Clear day</button>
          </div>
          <div className="grid grid-cols-6 gap-1.5">
            {HOUR_SLOTS.map(h => {
              const isOn = dayHours.includes(h);
              return (
                <button key={h} onClick={() => toggleHour(h)} className="py-2 rounded-lg text-xs font-medium font-mono" style={{ background: isOn ? T.primary : T.bgSurface, color: isOn ? '#fff' : T.ink700, border: `1px solid ${isOn ? T.primary : T.border}` }}>
                  {h}
                </button>
              );
            })}
          </div>
          <div className="flex gap-1.5 mt-2 flex-wrap">
            <button onClick={() => setRange(9, 12)} className="text-[11px] font-medium px-2.5 py-1 rounded-full" style={{ background: T.bgMuted, color: T.ink700 }}>Morning</button>
            <button onClick={() => setRange(13, 17)} className="text-[11px] font-medium px-2.5 py-1 rounded-full" style={{ background: T.bgMuted, color: T.ink700 }}>Afternoon</button>
            <button onClick={() => setRange(18, 22)} className="text-[11px] font-medium px-2.5 py-1 rounded-full" style={{ background: T.bgMuted, color: T.ink700 }}>Evening</button>
            <button onClick={() => setRange(6, 22)} className="text-[11px] font-medium px-2.5 py-1 rounded-full" style={{ background: T.bgMuted, color: T.ink700 }}>Full day</button>
          </div>
        </div>

        {/* Copy buttons */}
        <div>
          <div className="text-[10px] uppercase font-medium mb-2 tracking-wider" style={{ color: T.ink500 }}>Copy {DAY_NAMES[selectedDay]} to…</div>
          <div className="flex gap-2 flex-wrap">
            <button onClick={() => copyToDays([0,1,2,3,4])} className="text-xs font-medium px-3 py-1.5 rounded-lg" style={{ background: T.primary100, color: T.primary }}>All weekdays</button>
            <button onClick={() => copyToDays([5,6])} className="text-xs font-medium px-3 py-1.5 rounded-lg" style={{ background: T.primary100, color: T.primary }}>Weekend (Fri-Sat)</button>
            <button onClick={() => copyToDays([0,1,2,3,4,5,6])} className="text-xs font-medium px-3 py-1.5 rounded-lg" style={{ background: T.primary100, color: T.primary }}>Every day</button>
            <button onClick={clearAll} className="text-xs font-medium px-3 py-1.5 rounded-lg" style={{ background: T.bgMuted, color: T.danger }}>Clear everything</button>
          </div>
        </div>

        {/* Weekly summary */}
        <div className="rounded-xl p-3" style={{ background: T.bgMuted }}>
          <div className="text-[10px] uppercase font-medium mb-1.5 tracking-wider" style={{ color: T.ink500 }}>Weekly summary · {totalSlots} slot{totalSlots === 1 ? '' : 's'} total</div>
          {DAY_SHORT.map((d, i) => {
            const dayHs = hours[i] || [];
            return (
              <div key={i} className="flex justify-between text-xs py-0.5">
                <span style={{ color: T.ink500 }}>{d}</span>
                <span style={{ color: dayHs.length ? T.ink900 : T.ink300, fontFamily: dayHs.length ? 'monospace' : 'inherit' }}>
                  {dayHs.length === 0 ? 'Closed' : dayHs.length <= 4 ? dayHs.join(', ') : `${dayHs[0]} – ${dayHs[dayHs.length-1]} (${dayHs.length})`}
                </span>
              </div>
            );
          })}
        </div>
      </div>

      <div className="px-6 py-4 flex gap-3 border-t" style={{ borderColor: T.border }}>
        <Btn variant="outline" onClick={onClose} className="flex-1">Cancel</Btn>
        <Btn onClick={() => { onSave(hours); onClose(); }} className="flex-1" leadingIcon={Check}>Save availability</Btn>
      </div>
    </Modal>
  );
};

              <option value="any">Any level</option>

            <label className="text-[10px] uppercase font-medium block mb-0.5" style={{ color:T.ink500 }}>Languages (#18, comma-separated)</label>
            <input value={s.languages.join(', ')} onChange={e => onUpdate('languages', e.target.value.split(',').map(x => x.trim()).filter(Boolean))} placeholder="English, Arabic" className="w-full py-1.5 px-2 rounded text-sm outline-none" style={{ background:T.bgSurface, border:`1px solid ${T.border}` }}/>

            <button type="button" onClick={() => removeQuestion(q.id)} className="w-8 h-8 rounded flex items-center justify-center" style={{ color:T.danger, background:T.bgSurface }}><X size={13}/></button>

      {/* Cancellation policy (#22) */}
      <SectionAccordion title="Cancellation policy (#22)" sub={s.cancellationPolicy}>
        <select value={s.cancellationPolicy} onChange={e => onUpdate('cancellationPolicy', e.target.value)} className="w-full py-2 px-3 rounded text-sm outline-none" style={{ background:T.bgSurface, border:`1px solid ${T.border}` }}>
          <option value="flexible">Flexible — full refund up to 6h before</option>

// Collabs tab — provider can create bundles with other providers
const CollabsTab = ({ me, isOwner }) => {
  const [collabs, setCollabs] = useState([]);
  const [loading, setLoading] = useState(true);
  const [allProviders, setAllProviders] = useState([]);
  const [newOpen, setNewOpen] = useState(false);
  const reload = async () => {
    setLoading(true);
    const list = await fetchCollabsForProvider(me.id);
    setCollabs(list);
    setLoading(false);
  };
  useEffect(() => { reload(); }, [me.id]);
  useEffect(() => {
    sb.from('providers').select('*').eq('status', 'approved').neq('id', me.id).then(({ data }) => {
      setAllProviders((data || []).map(mapProvider));
    });
  }, [me.id]);
  const handleDelete = async (id) => { await deleteCollab(id); reload(); showToast('Collab removed'); };
  return (
    <>
      <NewCollabModal open={newOpen} onClose={() => setNewOpen(false)} me={me} providers={allProviders} onCreated={() => reload()}/>
      {loading ? <div className="text-center py-12 text-sm" style={{ color:T.ink500 }}>Loading collabs…</div>
        : collabs.length === 0 ? (
          <div className="rounded-2xl p-12 text-center" style={{ background:T.bgSurface, border:`1px solid ${T.border}` }}>
            <Sparkles size={28} className="mx-auto mb-3" style={{ color:T.accent }}/>
            <div className="text-sm font-medium mb-1" style={{ color:T.ink900 }}>No collabs yet</div>
            <div className="text-xs mb-4" style={{ color:T.ink500 }}>Team up with another provider to offer a discounted bundle (e.g. trainer + nutritionist).</div>
            {isOwner && <Btn size="sm" variant="secondary" leadingIcon={Plus} onClick={() => setNewOpen(true)}>Create your first collab</Btn>}
          </div>
        ) : (
          <div className="flex flex-col gap-3">
            {collabs.map(c => {
              const partnerId = c.provider_a_id === me.id ? c.provider_b_id : c.provider_a_id;
              const partner = allProviders.find(p => p.id === partnerId);
              const saving = (c.regular_price || 0) - (c.bundle_price || 0);
              return (
                <div key={c.id} className="rounded-2xl p-5" style={{ background:T.bgSurface, border:`1px solid ${T.border}` }}>
                  <div className="flex items-start gap-3 mb-3">
                    <div className="flex items-center">
                      <div className="w-10 h-10 rounded-full flex items-center justify-center text-white font-semibold z-10" style={{ background:T.primary, fontFamily:'Fraunces,serif' }}>{me.name[0]}</div>
                      <div className="w-10 h-10 rounded-full flex items-center justify-center text-white font-semibold -ml-3 ring-2 ring-white" style={{ background:T.accent, fontFamily:'Fraunces,serif' }}>{(partner?.name || '?')[0]}</div>
                    </div>
                    <div className="flex-1"><div className="font-semibold" style={{ color:T.ink900 }}>{me.name} × {partner?.name || 'Partner'}</div><div className="text-xs" style={{ color:T.ink500 }}>{me.specialty}{partner ? ` + ${partner.specialty}` : ''}</div></div>
                    <Pill bg={c.status === 'active' ? '#E0F2E7' : T.bgMuted} color={c.status === 'active' ? T.success : T.ink500}>{c.status}</Pill>
                  </div>
                  <div className="font-medium mb-1" style={{ color:T.ink900 }}>{c.title}</div>
                  <p className="text-xs mb-3" style={{ color:T.ink700 }}>{c.description}</p>
                  <div className="flex items-center justify-between">
                    <div className="flex items-baseline gap-2">
                      <span className="text-xs line-through" style={{ color:T.ink500 }}>QAR {c.regular_price}</span>
                      <span className="text-lg font-semibold" style={{ color:T.ink900 }}>QAR {c.bundle_price}</span>
                      {saving > 0 && <Pill bg={T.success} color="#fff">Save QAR {saving}</Pill>}
                    </div>
                    {isOwner && <Btn size="sm" variant="ghost" onClick={() => handleDelete(c.id)} style={{ color:T.danger }}>Remove</Btn>}
                  </div>
                </div>
              );
            })}
            {isOwner && (
              <button onClick={() => setNewOpen(true)} className="rounded-2xl p-4 flex items-center justify-center gap-2 text-sm font-medium" style={{ border:`2px dashed ${T.primary}`, color:T.primary }}>
                <Plus size={15}/> Create new collab
              </button>
            )}
          </div>
        )}
    </>
  );
};

// Modal to create a new collab with another provider
const NewCollabModal = ({ open, onClose, me, providers, onCreated }) => {
  const [step, setStep] = useState(0);
  const [partnerId, setPartnerId] = useState('');
  const [title, setTitle] = useState('');
  const [description, setDescription] = useState('');
  const [regular, setRegular] = useState('');
  const [bundle, setBundle] = useState('');
  const [submitting, setSubmitting] = useState(false);
  useEffect(() => { if (open) { setStep(0); setPartnerId(''); setTitle(''); setDescription(''); setRegular(''); setBundle(''); } }, [open]);
  const partner = providers.find(p => p.id === partnerId);
  const canStep1 = !!partnerId;
  const canStep2 = title.trim().length >= 3 && Number(regular) > 0 && Number(bundle) > 0 && Number(bundle) < Number(regular);

  const submit = async () => {
    if (!canStep2) return;
    setSubmitting(true);
    try {
      await createCollab({
        providerAId: me.id, providerBId: partnerId,
        title: title.trim(), description: description.trim(),
        regularPrice: Number(regular), bundlePrice: Number(bundle),
        durationText: '2 sessions',
      });
      showToast('Collab created!', 'success');
      onCreated();
      onClose();
    } catch (e) { showToast(e.message, 'error'); }
    setSubmitting(false);
  };

  return (
    <Modal open={open} onClose={onClose} title="Create collab" maxWidth={500}>
      <div className="p-6 flex flex-col gap-4">
        {step === 0 && (
          <>
            <p className="text-sm" style={{ color:T.ink500 }}>Pick a partner provider to team up with. The bundle becomes active immediately and appears in the feed.</p>
            <div className="flex flex-col gap-2 max-h-72 overflow-y-auto">
              {providers.length === 0 && <div className="text-center py-4 text-sm" style={{ color:T.ink500 }}>No other approved providers available yet.</div>}
              {providers.map(p => (
                <button key={p.id} onClick={() => setPartnerId(p.id)} className="flex items-center gap-3 p-3 rounded-xl text-left" style={{ background:T.bgSurface, border:`2px solid ${partnerId===p.id ? T.accent : T.border}` }}>
                  <CoverArt tone={p.cover} className="w-10 h-10 rounded-full flex-shrink-0"/>
                  <div className="flex-1"><div className="text-sm font-semibold" style={{ color:T.ink900 }}>{p.name}</div><div className="text-xs" style={{ color:T.ink500 }}>{p.specialty} · ★ {p.rating || 'new'}</div></div>
                  {partnerId===p.id && <Check size={15} style={{ color:T.accent600 }}/>}
                </button>
              ))}
            </div>
          </>
        )}
        {step === 1 && partner && (
          <>
            <div className="flex items-center gap-3 p-3 rounded-xl" style={{ background:T.bgMuted }}>
              <div className="flex items-center">
                <div className="w-10 h-10 rounded-full flex items-center justify-center text-white font-semibold z-10" style={{ background:T.primary, fontFamily:'Fraunces,serif' }}>{me.name[0]}</div>
                <div className="w-10 h-10 rounded-full flex items-center justify-center text-white font-semibold -ml-3 ring-2 ring-white" style={{ background:T.accent, fontFamily:'Fraunces,serif' }}>{partner.name[0]}</div>
              </div>
              <div className="flex-1"><div className="text-sm font-semibold" style={{ color:T.ink900 }}>{me.name} × {partner.name}</div><div className="text-xs" style={{ color:T.ink500 }}>{me.specialty} + {partner.specialty}</div></div>
            </div>
            <div><label className="text-xs uppercase font-medium block mb-1" style={{ color:T.ink500 }}>Bundle title</label><input value={title} onChange={e => setTitle(e.target.value)} placeholder="e.g. Train + Eat — Joint Coaching" className="w-full py-2.5 px-3.5 rounded-lg text-sm outline-none" style={{ background:T.bgMuted, border:`1px solid ${T.border}` }}/></div>
            <div><label className="text-xs uppercase font-medium block mb-1" style={{ color:T.ink500 }}>What's included</label><textarea value={description} onChange={e => setDescription(e.target.value)} rows={3} placeholder="1 strength session + 1 nutrition consultation. Booked together, paid once." className="w-full py-2.5 px-3.5 rounded-lg text-sm outline-none resize-none" style={{ background:T.bgMuted, border:`1px solid ${T.border}` }}/></div>
            <div className="grid grid-cols-2 gap-3">
              <div><label className="text-xs uppercase font-medium block mb-1" style={{ color:T.ink500 }}>Regular price (QAR)</label><input value={regular} onChange={e => setRegular(e.target.value.replace(/\D/g,''))} placeholder="420" className="w-full py-2.5 px-3.5 rounded-lg text-sm font-mono outline-none" style={{ background:T.bgMuted, border:`1px solid ${T.border}` }}/></div>
              <div><label className="text-xs uppercase font-medium block mb-1" style={{ color:T.ink500 }}>Bundle price (QAR)</label><input value={bundle} onChange={e => setBundle(e.target.value.replace(/\D/g,''))} placeholder="350" className="w-full py-2.5 px-3.5 rounded-lg text-sm font-mono outline-none" style={{ background:T.bgMuted, border:`1px solid ${T.border}` }}/></div>
            </div>
            {Number(regular) > 0 && Number(bundle) > 0 && Number(bundle) < Number(regular) && (
              <div className="rounded-xl p-3 text-sm" style={{ background:'#E0F2E7', color:'#286B3D' }}>Clients save <strong>QAR {Number(regular) - Number(bundle)}</strong> — a {Math.round(((Number(regular) - Number(bundle))/Number(regular))*100)}% discount</div>
            )}
          </>
        )}
      </div>
      <div className="px-6 py-4 flex gap-3 border-t" style={{ borderColor:T.border }}>
        <Btn variant="outline" onClick={step === 0 ? onClose : () => setStep(0)} disabled={submitting}>{step === 0 ? 'Cancel' : 'Back'}</Btn>
        {step === 0
          ? <Btn className="flex-1" disabled={!canStep1} onClick={() => setStep(1)} trailingIcon={ArrowRight}>Choose {partner?.name || 'partner'}</Btn>
          : <Btn className="flex-1" disabled={!canStep2 || submitting} onClick={submit} trailingIcon={Check}>{submitting ? 'Creating…' : 'Create collab'}</Btn>}
      </div>
    </Modal>
  );
};

// Tabs (Services editor + Provider's own posts + Collabs)
const ProviderProfileTabs = ({ me, user, onProviderUpdate, onNavigate }) => {
  const [tab, setTab] = useState('services');
  const [editing, setEditing] = useState(false);
  const [draft, setDraft] = useState((me.services || []).map(normalizeService));
  const [posts, setPosts] = useState([]);
  const [loadingPosts, setLoadingPosts] = useState(false);
  useEffect(() => { setDraft((me.services || []).map(normalizeService)); }, [me?.id]);
  useEffect(() => {
    if (tab !== 'posts' || !me?.id) return;
    setLoadingPosts(true);
    sb.from('posts').select('*').eq('provider_id', me.id).order('created_at', { ascending: false })
      .then(({ data }) => { setPosts((data || []).map(mapPost)); setLoadingPosts(false); });
  }, [tab, me?.id]);

  const isOwner = user?.id === me?.userId;

  const addService = () => setDraft(s => [...s, normalizeService({ title:'New Service', price:100 })]);
  const updateService = (id, field, val) => setDraft(s => s.map(x => x.id === id ? { ...x, [field]: val } : x));
  const removeService = (id) => setDraft(s => s.filter(x => x.id !== id));

  const saveServices = async () => {
    try {
      const cleaned = draft.map(normalizeService);
      const updated = await updateProviderRecord(me.id, { services: cleaned });
      onProviderUpdate(updated);
      setEditing(false);
      showToast('Services updated', 'success');
    } catch (e) { showToast('Failed: ' + e.message, 'error'); }
  };

  return (
    <>
      <div className="flex items-center justify-between mb-3">
        <div className="flex gap-1 p-1 rounded-xl w-fit" style={{ background:T.bgMuted }}>
          {[{id:'services', label:'Services'}, {id:'posts', label:`Posts (${posts.length || 0})`}, {id:'collabs', label:'Collabs'}].map(t => (
            <button key={t.id} onClick={() => setTab(t.id)} className="px-5 py-2 rounded-lg text-sm font-medium" style={{ background: tab===t.id ? T.bgSurface : 'transparent', color: tab===t.id ? T.ink900 : T.ink500 }}>{t.label}</button>
          ))}
        </div>
        {tab === 'services' && isOwner && (
          !editing
            ? <Btn size="sm" variant="outline" onClick={() => setEditing(true)}>Edit services</Btn>
            : <div className="flex gap-2"><Btn size="sm" variant="outline" onClick={() => { setDraft(me.services || []); setEditing(false); }}>Cancel</Btn><Btn size="sm" onClick={saveServices}>Save</Btn></div>
        )}
      </div>

      {tab === 'services' && (
        <div className="rounded-2xl p-5" style={{ background:T.bgSurface, border:`1px solid ${T.border}` }}>
          {!editing ? (
            <div className="flex flex-col gap-2">
              {(me.services || []).length === 0 && <div className="text-center py-6 text-sm" style={{ color:T.ink500 }}>No services listed yet. Click "Edit services" to add some.</div>}
              {(me.services || []).map(s => (
                <div key={s.id} className="rounded-xl p-3 flex items-center justify-between" style={{ background:T.bgMuted }}>
                  <div>
                    <div className="text-sm font-semibold" style={{ color:T.ink900 }}>{s.title}</div>
                    <div className="text-xs" style={{ color:T.ink500 }}>{s.duration} min · {s.locType === 'client_home' ? 'At client\'s place' : s.locType === 'both' ? 'Flexible' : 'At your location'}</div>
                  </div>
                  <div className="text-sm font-semibold" style={{ color:T.ink900 }}>QAR {s.price}</div>
                </div>
              ))}
            </div>
          ) : (
            <div className="flex flex-col gap-3">
              {draft.map(s => <AdvancedServiceCard key={s.id} service={s} onUpdate={(field, val) => updateService(s.id, field, val)} onRemove={() => removeService(s.id)} userId={user?.id}/>)}
              <button onClick={addService} className="rounded-xl py-3 text-sm font-medium flex items-center justify-center gap-2" style={{ background:T.bgSurface, border:`2px dashed ${T.border}`, color:T.primary }}>
                <Plus size={15}/> Add service
              </button>
            </div>
          )}
        </div>
      )}

      {tab === 'collabs' && <CollabsTab me={me} isOwner={isOwner}/>}

      {tab === 'posts' && (
        <div>
          {loadingPosts ? <div className="text-center py-12 text-sm" style={{ color:T.ink500 }}>Loading posts…</div>

              <div className="rounded-2xl p-12 text-center" style={{ background:T.bgSurface, border:`1px solid ${T.border}` }}>
                <Camera size={28} className="mx-auto mb-3" style={{ color:T.ink300 }}/>

              </div>

              <div className="grid sm:grid-cols-2 lg:grid-cols-3 gap-3">
                {posts.map(p => (
                  <div key={p.id} className="rounded-xl overflow-hidden" style={{ background:T.bgSurface, border:`1px solid ${T.border}` }}>
                    {p.imageUrl ? <img src={p.imageUrl} alt="" className="w-full" style={{ aspectRatio:'1', objectFit:'cover' }}/>
                      : <CoverArt tone={p.coverTone} style={{ aspectRatio:'1' }}/>}
                    <div className="p-3">
                      <div className="text-xs line-clamp-3" style={{ color:T.ink700 }}>{p.caption}</div>
                      <div className="text-[10px] mt-2 flex items-center gap-2" style={{ color:T.ink500 }}>

              </div>

        </div>

    </>
  );

// #29 — Admin earnings dashboard (platform fees)
const AdminEarningsTab = () => {
  const [bookings, setBookings] = useState([]);
  const [loading, setLoading] = useState(true);
  useEffect(() => {
    setLoading(true);
    sb.from('bookings').select('*').eq('status', 'completed').then(({ data }) => {
      setBookings((data || []).map(mapBooking)); setLoading(false);
    });
  }, []);
  const platformCut = bookings.reduce((s, b) => s + (Number(b.total) || 0) * 0.12, 0); // 12% fee
  const providerPaid = bookings.reduce((s, b) => s + (Number(b.total) || 0) * 0.88, 0);
  const gross = platformCut + providerPaid;
  const today = new Date();
  // Last 6 months breakdown
  const months = Array.from({ length: 6 }, (_, i) => {
    const d = new Date(today.getFullYear(), today.getMonth() - (5 - i), 1);
    return d;
  });
  const monthData = months.map(m => {
    const inMonth = bookings.filter(b => {
      const d = new Date(b.date);
      return d.getMonth() === m.getMonth() && d.getFullYear() === m.getFullYear();
    });
    return { date: m, fee: inMonth.reduce((s, b) => s + (Number(b.total) || 0) * 0.12, 0) };
  });
  const maxMonth = Math.max(...monthData.map(m => m.fee), 1);
  return (
    <>
      {loading && <div className="p-8 text-center text-sm" style={{ color:T.ink500 }}>Loading…</div>}
      {!loading && (
        <>
          <div className="grid sm:grid-cols-3 gap-3 mb-6">
            <div className="rounded-2xl p-6" style={{ background:T.primary, color:'#fff' }}>
              <div className="text-xs opacity-70">Platform revenue (12%)</div>
              <div className="text-3xl font-semibold mt-1" style={{ fontFamily:'Fraunces,serif' }}>QAR {Math.round(platformCut).toLocaleString()}</div>
              <div className="text-xs opacity-70 mt-2">From {bookings.length} completed bookings</div>
            </div>
            <div className="rounded-2xl p-6" style={{ background:T.bgSurface, border:`1px solid ${T.border}` }}>
              <div className="text-xs" style={{ color:T.ink500 }}>Gross volume</div>
              <div className="text-3xl font-semibold mt-1" style={{ color:T.ink900, fontFamily:'Fraunces,serif' }}>QAR {Math.round(gross).toLocaleString()}</div>
            </div>
            <div className="rounded-2xl p-6" style={{ background:T.bgSurface, border:`1px solid ${T.border}` }}>
              <div className="text-xs" style={{ color:T.ink500 }}>Paid out to providers</div>
              <div className="text-3xl font-semibold mt-1" style={{ color:T.success, fontFamily:'Fraunces,serif' }}>QAR {Math.round(providerPaid).toLocaleString()}</div>
            </div>
          </div>
          <div className="rounded-2xl p-6" style={{ background:T.bgSurface, border:`1px solid ${T.border}` }}>
            <h3 className="text-sm font-semibold mb-4" style={{ color:T.ink900 }}>Last 6 months · platform fees</h3>
            <div className="flex gap-2 h-32 items-end">
              {monthData.map((m, i) => (
                <div key={i} className="flex-1 flex flex-col items-center gap-2">
                  <div className="rounded-t w-full" style={{ background: i===5 ? T.accent : T.primary100, height:`${Math.max((m.fee / maxMonth) * 100, 4)}%` }} title={`QAR ${Math.round(m.fee)}`}/>
                  <div className="text-[10px]" style={{ color:T.ink500 }}>{MONTH_NAMES[m.date.getMonth()].slice(0,3)}</div>
                  <div className="text-[10px] font-mono font-semibold" style={{ color:T.ink900 }}>{Math.round(m.fee)}</div>
                </div>
              ))}
            </div>
          </div>
        </>
      )}
    </>
  );
};

        name: user.name, specialty: specialty.trim(), bio: bio.trim(),
        cat, priceFrom, residency,
        cover: tones[cat] || 'warm-orange',
        avatarUrl, idUrl,
        services: cleanedServices,
        status: 'pending',
      });

      onDone({ providerId: userId, avatarUrl, created });
      onClose();
      setStep(0); setCat(''); setSpecialty(''); setBio(''); setServices([{ id:`s-${Math.random().toString(36).slice(2,8)}`, title:'', duration:60, price:'', locType:'both' }]); setResidency(''); setAgreed(false); setAvatarFile(null); setAvatarPreview(null); setIdFile(null);
      showToast('Provider application submitted — admin will review shortly', 'success');
    } catch (err) { setError(err.message); setSubmitting(false); }
  };

  return (
    <Modal open={open} onClose={onClose} maxWidth={560}>
      <div className="p-6">
        <h2 className="text-xl font-semibold mb-1" style={{ fontFamily:'Fraunces,serif', color:T.ink900 }}>Become a provider</h2>
        <p className="text-sm mb-5" style={{ color:T.ink500 }}>Add provider services to your existing account. Admin will review within 48h.</p>

        <div className="flex items-center gap-1.5 mb-6">
          {stepLabels.map((label, i) => (
            <div key={i} className="flex-1">
              <div className="h-1 rounded-full mb-1.5" style={{ background: i <= step ? T.accent : T.border }}/>
              <div className="text-[9px] uppercase tracking-wider font-medium" style={{ color: i === step ? T.accent600 : T.ink500 }}>{label}</div>
            </div>
          ))}
        </div>

        {step === 0 && (
          <div className="flex flex-col gap-2">
            <p className="text-sm mb-2" style={{ color:T.ink500 }}>What type of services will you offer?</p>
            {cats.map(c => (
              <button key={c.id} onClick={() => setCat(c.id)} className="text-left rounded-xl p-3.5 text-sm font-medium flex items-center justify-between" style={{ background:T.bgSurface, border:`2px solid ${cat===c.id ? T.accent : T.border}`, color: cat===c.id ? T.ink900 : T.ink700 }}>{c.label}{cat===c.id && <Check size={15} style={{ color:T.accent600 }}/>}</button>
            ))}
          </div>
        )}
        {step === 1 && (
          <div className="flex flex-col gap-4">
            <div>
              <label className="text-xs font-medium uppercase tracking-wider mb-1 block" style={{ color:T.ink500 }}>Profile photo (optional)</label>
              <div className="flex items-center gap-3">
                {avatarPreview ? <img src={avatarPreview} alt="" className="w-16 h-16 rounded-full object-cover" style={{ border:`1px solid ${T.border}` }}/>
                  : <div className="w-16 h-16 rounded-full flex items-center justify-center" style={{ background:T.bgMuted, border:`1px dashed ${T.border}`, color:T.ink500 }}><Camera size={20}/></div>}
                <label className="cursor-pointer text-xs font-medium px-3 py-2 rounded-lg" style={{ background:T.primary100, color:T.primary }}>
                  {avatarFile ? 'Change photo' : 'Upload photo'}
                  <input type="file" accept="image/*" className="hidden" onChange={e => handleAvatar(e.target.files?.[0] || null)}/>
                </label>
                {avatarFile && <button onClick={() => handleAvatar(null)} className="text-xs" style={{ color:T.danger }}>Remove</button>}
              </div>
            </div>
            <div><label className="text-xs font-medium uppercase tracking-wider mb-1 block" style={{ color:T.ink500 }}>Specialty headline</label><input value={specialty} onChange={e => setSpecialty(e.target.value)} placeholder="e.g. Mediterranean Private Chef" className="w-full py-2.5 px-3.5 rounded-lg text-sm outline-none" style={{ background:T.bgMuted, border:`1px solid ${T.border}`, color:T.ink900 }}/></div>
            <div>
              <label className="text-xs font-medium uppercase tracking-wider mb-1 block" style={{ color:T.ink500 }}>Bio (min 20 chars)</label>
              <textarea value={bio} onChange={e => setBio(e.target.value)} rows={4} placeholder="Background, experience, what makes your sessions special..." className="w-full py-2.5 px-3.5 rounded-lg text-sm outline-none resize-none" style={{ background:T.bgMuted, border:`1px solid ${T.border}`, color:T.ink900 }}/>
              <div className="text-[10px] mt-1 text-right" style={{ color: bio.length<20 ? T.danger : T.ink500 }}>{bio.length} / 20 min</div>
            </div>
          </div>
        )}
        {step === 2 && (
          <div className="flex flex-col gap-3">
            <p className="text-sm" style={{ color:T.ink500 }}>List the services you offer. Add as many as you want — clients pick one when they book.</p>
            {services.map(s => (
              <div key={s.id} className="rounded-xl p-3 flex flex-col gap-2" style={{ background:T.bgMuted, border:`1px solid ${T.border}` }}>
                <div className="flex items-start gap-2">

                  {services.length > 1 && <button type="button" onClick={() => removeServiceRow(s.id)} className="w-9 h-9 rounded-lg flex items-center justify-center" style={{ color:T.danger, background:T.bgSurface }}><X size={15}/></button>}
                </div>
                <div className="grid grid-cols-3 gap-2">
                  <div>
                    <label className="text-[10px] uppercase font-medium block mb-0.5" style={{ color:T.ink500 }}>Duration (min)</label>
                    <input value={s.duration} onChange={e => updateServiceRow(s.id, 'duration', e.target.value.replace(/\D/g,''))} className="w-full py-1.5 px-2 rounded text-sm outline-none font-mono" style={{ background:T.bgSurface, border:`1px solid ${T.border}` }}/>
                  </div>
                  <div>
                    <label className="text-[10px] uppercase font-medium block mb-0.5" style={{ color:T.ink500 }}>Price (QAR)</label>
                    <input value={s.price} onChange={e => updateServiceRow(s.id, 'price', e.target.value.replace(/\D/g,''))} placeholder="200" className="w-full py-1.5 px-2 rounded text-sm outline-none font-mono" style={{ background:T.bgSurface, border:`1px solid ${T.border}` }}/>
                  </div>
                  <div>
                    <label className="text-[10px] uppercase font-medium block mb-0.5" style={{ color:T.ink500 }}>Where</label>
                    <select value={s.locType} onChange={e => updateServiceRow(s.id, 'locType', e.target.value)} className="w-full py-1.5 px-2 rounded text-sm outline-none" style={{ background:T.bgSurface, border:`1px solid ${T.border}` }}>
                      <option value="client_home">Client's place</option>
                      <option value="provider_location">My location</option>
                      <option value="both">Flexible</option>
                    </select>
                  </div>
                </div>
              </div>
            ))}
            <button type="button" onClick={addServiceRow} className="rounded-xl py-3 text-sm font-medium flex items-center justify-center gap-2" style={{ background:T.bgSurface, border:`2px dashed ${T.border}`, color:T.primary }}>
              <Plus size={15}/> Add another service
            </button>
            {priceFrom > 0 && (
              <div className="rounded-xl p-3 text-xs" style={{ background:T.primary100, color:T.ink700 }}>{validServices.length} service{validServices.length === 1 ? '' : 's'} listed · starts from QAR {priceFrom}. You keep 88% of every booking.</div>
            )}
          </div>
        )}
        {step === 3 && (
          <div className="flex flex-col gap-3">
            <div><label className="text-xs font-medium uppercase tracking-wider mb-2 block" style={{ color:T.ink500 }}>Residency status</label>
              <div className="flex flex-col gap-1.5">
                {['Qatari citizen','Resident (self-sponsored / CR holder)','Resident (sponsored — NOC required)','GCC national'].map(r => (
                  <button key={r} onClick={() => setResidency(r)} className="text-left rounded-xl p-3 text-sm flex items-center justify-between" style={{ background:T.bgSurface, border:`2px solid ${residency===r ? T.primary : T.border}`, color:residency===r ? T.ink900 : T.ink700 }}>{r}{residency===r && <Check size={14} style={{ color:T.primary }}/>}</button>
                ))}
              </div>
            </div>
            <div>
              <label className="text-xs font-medium uppercase tracking-wider mb-1 block" style={{ color:T.ink500 }}>Qatari ID / CR (optional)</label>
              <label className="cursor-pointer flex items-center gap-3 p-3 rounded-xl" style={{ background:T.bgMuted, border:`1px dashed ${T.border}` }}>
                <FileText size={18} style={{ color:T.ink500 }}/>
                <div className="flex-1"><div className="text-sm font-medium" style={{ color:T.ink900 }}>{idFile ? idFile.name : 'Upload ID or CR'}</div><div className="text-[10px]" style={{ color:T.ink500 }}>PDF, JPG, or PNG</div></div>
                {idFile && <button type="button" onClick={(e) => { e.preventDefault(); setIdFile(null); }} className="text-xs" style={{ color:T.danger }}>Remove</button>}
                <input type="file" accept="image/*,application/pdf" className="hidden" onChange={e => setIdFile(e.target.files?.[0] || null)}/>
              </label>
            </div>
          </div>
        )}
        {step === 4 && (
          <div className="flex flex-col gap-4">
            <div className="rounded-2xl p-5" style={{ background:T.bgMuted }}>
              {[['Category',cats.find(c=>c.id===cat)?.label||cat],['Specialty',specialty],['Services',`${validServices.length} · from QAR ${priceFrom}`],['Residency',residency]].map(([k,v]) => (<div key={k} className="flex justify-between text-sm py-1.5"><span style={{ color:T.ink500 }}>{k}</span><span style={{ color:T.ink900, fontWeight:600, textAlign:'right' }}>{v}</span></div>))}
            </div>
            <label className="flex items-start gap-3 cursor-pointer"><input type="checkbox" checked={agreed} onChange={e => setAgreed(e.target.checked)} className="mt-0.5"/><span className="text-sm" style={{ color:T.ink700 }}>I confirm all info is accurate, I agree to the <strong style={{ color:T.primary }}>Provider Terms</strong>, and my account is pending admin approval before becoming bookable.</span></label>
            {error && <div className="rounded-lg p-3 text-xs flex items-start gap-2" style={{ background:'#FBE2E6', color:'#8B2A38' }}><AlertCircle size={13} style={{ marginTop:1, flexShrink:0 }}/><span>{error}</span></div>}
          </div>
        )}
      </div>
      <div className="px-6 py-4 flex gap-3 border-t" style={{ borderColor:T.border }}>
        <Btn variant="outline" onClick={step===0 ? onClose : () => setStep(step-1)} disabled={submitting}>{step===0 ? 'Cancel' : 'Previous'}</Btn>
        <Btn className="flex-1" disabled={!canNext[step] || submitting} onClick={step===4 ? submit : () => setStep(step+1)} trailingIcon={step===4 ? Check : ArrowRight}>
          {step===4 ? (submitting ? 'Submitting…' : 'Submit application') : 'Continue'}
        </Btn>
      </div>
    </Modal>
  );
};

const NewPostModal = ({ open, onClose, user, providers, onPosted }) => {
  const [caption, setCaption] = useState('');
  const [photoFile, setPhotoFile] = useState(null);
  const [photoPreview, setPhotoPreview] = useState(null);
  const [submitting, setSubmitting] = useState(false);
  const handlePhoto = (file) => {
    setPhotoFile(file);
    if (file) {
      const r = new FileReader(); r.onload = () => setPhotoPreview(r.result); r.readAsDataURL(file);
    } else setPhotoPreview(null);
  };
  const submit = async () => {
    if (!caption.trim()) return;
    setSubmitting(true);
    try {
      let imageUrl = null;
      if (photoFile && user?.id && user.id !== 'admin-shortcut') {
        try { imageUrl = await uploadToBucket('work-proof-posts', photoFile, user.id); }
        catch (e) { console.warn('Photo upload failed:', e.message); }
      }
      const me = providers.find(p => p.id === user?.providerId);
      await insertPost({
        providerId: user?.providerId,
        caption: caption.trim(),
        imageUrl,
        coverTone: me?.cover || 'warm-orange',
        proofKind: 'outcome',
        proofBadge: 'Just posted',
      });
      showToast('Post published!', 'success');
      setCaption(''); setPhotoFile(null); setPhotoPreview(null);
      onPosted?.();
      onClose();
    } catch (e) { showToast('Failed to post: ' + e.message, 'error'); }
    setSubmitting(false);
  };
  return (
    <Modal open={open} onClose={onClose} title="New post" maxWidth={480}>
      <div className="p-6 flex flex-col gap-4">
        <label className="cursor-pointer rounded-xl flex flex-col items-center justify-center" style={{ background:T.bgMuted, border:`2px dashed ${T.border}`, aspectRatio:'16/9' }}>
          {photoPreview ? (
            <img src={photoPreview} alt="" className="w-full h-full object-cover rounded-xl"/>
          ) : (
            <>
              <Camera size={28} style={{ color:T.ink300 }}/>
              <div className="text-sm mt-2" style={{ color:T.ink500 }}>Upload work photo</div>
              <div className="text-xs mt-1" style={{ color:T.ink300 }}>Saved to work-proof-posts bucket</div>
            </>
          )}
          <input type="file" accept="image/*" className="hidden" onChange={e => handlePhoto(e.target.files?.[0] || null)}/>
        </label>
        {photoFile && <button onClick={() => handlePhoto(null)} className="text-xs self-start" style={{ color:T.danger }}>Remove photo</button>}
        <div>
          <label className="text-xs font-medium uppercase tracking-wider mb-1 block" style={{ color:T.ink500 }}>Caption</label>
          <textarea value={caption} onChange={e => setCaption(e.target.value.slice(0,280))} rows={4} placeholder="What did you do in this session? What did the client achieve?" className="w-full py-2.5 px-3.5 rounded-lg text-sm outline-none resize-none" style={{ background:T.bgMuted, border:`1px solid ${T.border}`, color:T.ink900 }}/>
          <div className="text-[10px] mt-1 text-right" style={{ color:T.ink500 }}>{caption.length}/280</div>
        </div>
        <div className="flex gap-3">
          <Btn variant="outline" onClick={onClose} className="flex-1">Cancel</Btn>
          <Btn className="flex-1" disabled={!caption.trim() || submitting} onClick={submit}>{submitting ? 'Publishing…' : 'Publish'}</Btn>
        </div>
      </div>
    </Modal>
  );
};

// ============================================================
// APP ROOT
// ============================================================
function App() {
  const [user, setUser] = useState(null);
  const [viewRole, setViewRole] = useState('admin'); // for admin role switching
  const [authLoading, setAuthLoading] = useState(true);
  const [history, setHistory] = useState([{ name:'landing' }]);
  const [providers, setProviders] = useState([]);
  const [posts, setPosts] = useState([]);
  const [bookings, setBookings] = useState([]);
  const [threads, setThreads] = useState({});
  const [bookingModal, setBookingModal] = useState(null);
  const [paymentModal, setPaymentModal] = useState(null);
  const [rescheduleModal, setRescheduleModal] = useState(null);
  const [loading, setLoading] = useState(true);
  const [favorites, setFavorites] = useState([]);
  const [follows, setFollows] = useState([]);
  const [likedPosts, setLikedPosts] = useState([]);

  const currentRoute = history[history.length - 1];
  const isAuthed = !!user;
  const effectiveRole = user?.role === 'admin' ? viewRole : (user?.role || 'client');

  const goto = (name, params = {}) => {
    if (name === -1) { setHistory(h => h.length > 1 ? h.slice(0,-1) : h); return; }
    setHistory(h => [...h, { name, ...params }]);
    window.scrollTo(0, 0);
  };

  // Auth bootstrap (Supabase session + admin shortcut)
  useEffect(() => {
    let active = true;
    (async () => {
      // 1. Admin shortcut takes priority
      if (isAdminShortcut()) {
        if (active) setUser({ id:'admin-shortcut', email:'admin@tobayt.qa', name:'Admin', role:'admin', providerId:null });
        if (active) setAuthLoading(false);
        return;
      }
      // 2. Try restoring Supabase session
      try {
        const { data: { session } } = await sb.auth.getSession();
        if (session && active) setUser(userFromSession(session));
      } catch (e) {}
      if (active) setAuthLoading(false);
    })();

    // 3. React to auth state changes (logout from another tab, token refresh, etc.)
    const { data: { subscription } } = sb.auth.onAuthStateChange((event, session) => {
      if (isAdminShortcut()) return; // admin shortcut wins
      if (event === 'SIGNED_OUT') setUser(null);
      else if (session) setUser(userFromSession(session));
    });
    return () => { active = false; subscription?.unsubscribe(); };
  }, []);

  // Data load — everything from Supabase, no backend dependency
  const refreshData = useCallback(async () => {
    try {
      const role = user?.role === 'admin' ? 'admin' : user?.role || 'client';
      const userId = user?.id && user.id !== 'admin-shortcut' ? user.id : null;

      const [approvedProviders, posts, bookings] = await Promise.all([
        fetchApprovedProvidersFromSupabase(),
        fetchPostsFromSupabase(),
        userId ? fetchBookingsForUser(userId, role) : (role === 'admin' ? fetchBookingsForUser(null, 'admin') : Promise.resolve([])),
      ]);

      // Include the current user's own provider record if it's pending (not in approved list)
      let merged = [...approvedProviders];
      if (userId) {
        try {
          const mine = await fetchProviderByUserId(userId);
          if (mine && !merged.find(x => x.id === mine.id)) merged = [mine, ...merged];
        } catch (e) {}
      }

      setProviders(merged);
      setPosts(posts);
      setBookings(bookings);

      // Load favorites/follows/likes for current user
      if (userId) {
        try {
          const [favs, fols, liked] = await Promise.all([fetchFavorites(userId), fetchFollows(userId), fetchLikedPosts(userId)]);
          setFavorites(favs); setFollows(fols); setLikedPosts(liked);
        } catch (e) {}
      } else {
        setFavorites([]); setFollows([]); setLikedPosts([]);
      }

      // Pull messages for each booking
      const threadEntries = await Promise.all(bookings.map(b =>
        fetchMessagesForBooking(b.id).then(msgs => [b.id, msgs])
      ));
      const threadMap = {};
      threadEntries.forEach(([id, msgs]) => { threadMap[id] = msgs; });
      setThreads(threadMap);
    } catch (e) { console.warn('refreshData failed:', e); }
    setLoading(false);
  }, [user]);

  useEffect(() => { refreshData(); }, [refreshData]);

  // ============================================================
  // LIVE UPDATES — Supabase Realtime subscriptions
  // Pushes new messages and booking status changes into local state
  // without needing a refresh.
  // ============================================================
  useEffect(() => {
    if (!user) return;
    const channel = sb
      .channel(`realtime-${user.id}`)
      // New messages → append to the right thread
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, (payload) => {
        const newMsg = mapMessage(payload.new);
        if (!newMsg?.bookingId) return;
        setThreads(prev => {
          const list = prev[newMsg.bookingId] || [];
          if (list.some(m => m.id === newMsg.id)) return prev; // dedupe sender's own echo
          return { ...prev, [newMsg.bookingId]: [...list, newMsg] };
        });
      })
      // Message read-receipt updates
      .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'messages' }, (payload) => {
        const updated = mapMessage(payload.new);
        if (!updated?.bookingId) return;
        setThreads(prev => {
          const list = prev[updated.bookingId];
          if (!list) return prev;
          return { ...prev, [updated.bookingId]: list.map(m => m.id === updated.id ? updated : m) };
        });
      })
      // New bookings involving me
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'bookings' }, (payload) => {
        const b = mapBooking(payload.new);
        if (!b) return;
        const involvesMe = b.userId === user.id || b.providerId === user.providerId || user.role === 'admin';
        if (!involvesMe) return;
        setBookings(prev => prev.some(x => x.id === b.id) ? prev : [b, ...prev]);
      })
      // Booking status / reschedule updates
      .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'bookings' }, (payload) => {
        const b = mapBooking(payload.new);
        if (!b) return;
        setBookings(prev => prev.map(x => x.id === b.id ? b : x));
      })
      .subscribe();

    return () => { sb.removeChannel(channel); };
  }, [user?.id, user?.providerId, user?.role]);

  // Auth handlers — note new signature: handleAuth(user) only (Supabase manages tokens internally)
  const handleAuth = (u) => {
    setUser(u);
    if (u.role === 'admin') { setViewRole('admin'); goto('admin'); }
    else if (u.role === 'provider') goto('dashboard');
    else goto('feed');
    showToast(`Welcome, ${u.name}!`, 'success');
  };

  const handleLogout = async () => {
    setAdminShortcut(false);
    try { await sb.auth.signOut(); } catch (e) {}
    setUser(null);
    setViewRole('admin');
    setBookings([]);
    setThreads({});
    goto('landing');
    showToast('Signed out');
  };

  // Switch active role on the same Supabase account.
  // For an existing provider switching to client, we just flip the metadata.
  // For a client becoming a provider for the first time, BecomeProviderModal already
  // ran the onboarding + uploads and set providerId — this just flips the role.
  const handleSwitchRole = async (newRole) => {
    if (!user || user.id === 'admin-shortcut') return;
    try {
      const { data, error } = await sb.auth.updateUser({ data: { role: newRole } });
      if (error) throw error;
      // Update local user state immediately (don't wait for the listener)
      const refreshedSession = await sb.auth.getSession();
      const u = userFromSession(refreshedSession.data.session) || { ...user, role: newRole };
      setUser(u);
      if (newRole === 'provider') goto('dashboard');
      else goto('feed');
      showToast(`Switched to ${newRole} mode`, 'success');
    } catch (e) {
      showToast(`Failed to switch: ${e.message}`, 'error');
    }
  };

  const requireAuth = (action) => {
    if (!isAuthed) {
      showToast('Please log in to continue');
      goto('login');
      return false;
    }
    action();
    return true;
  };

  // Booking handlers
  const handleBookProvider = (providerId, serviceId) => {
    requireAuth(() => {
      const p = providers.find(x => x.id === providerId);
      if (p) setBookingModal({ provider: p, serviceId });
    });
  };

  const handleBookComplete = async (data) => {
    const provider = bookingModal.provider;
    const newBooking = {
      userId: user?.id && user.id !== 'admin-shortcut' ? user.id : null,
      clientName: user?.name || null,
      clientEmail: user?.email || null,
      providerId: provider.id,
      providerName: provider.name, providerCover: provider.cover,
      serviceTitle: data.service.title, serviceId: data.service.id,
      date: data.date.toISOString(), slot: data.slot,
      when: `${fmtDateShort(data.date)} · ${data.slot}`,
      locType: data.locType,
      isOnline: !!data.isOnline,
      selectedAddOns: data.selectedAddOns || [],
      intakeAnswers: data.intakeAnswers || {},
      clientNotes: data.clientNotes || null,
      depositAmount: data.depositAmount || 0,
      total: data.total ?? (data.service.price + (data.locType === 'online' ? 0 : 12)),
      status: 'pending',
    };
    try {
      const created = await insertBooking(newBooking);
      setBookings(p => [created, ...p]);
      // Seed system message
      const sysMsg = await insertMessage({ bookingId: created.id, from:'system', system:true, icon:'calendar', text:`Booking request sent to ${created.providerName}` });
      setThreads(p => ({ ...p, [created.id]: sysMsg ? [sysMsg] : [] }));
    } catch (e) { showToast('Booking failed: ' + e.message, 'error'); }
    setBookingModal(null);
    showToast('Booking request sent!', 'success');
    goto('bookings');
  };

  const handlePay = (id) => setPaymentModal(bookings.find(b => b.id === id));
  const handlePaymentSuccess = async (method) => {
    const id = paymentModal?.id;
    try {
      const updated = await updateBooking(id, { status:'confirmed', paymentMethod: method });
      setBookings(p => p.map(b => b.id === id ? updated : b));
    } catch (e) {
      setBookings(p => p.map(b => b.id === id ? { ...b, status:'confirmed' } : b));
    }
    setPaymentModal(null);
    showToast('Payment confirmed!', 'success');
  };

  const handleCancel = async (id, refund) => {
    try {
      const updated = await updateBooking(id, { status:'cancelled' });
      setBookings(p => p.map(b => b.id === id ? updated : b));
    } catch (e) {
      setBookings(p => p.map(b => b.id === id ? { ...b, status:'cancelled' } : b));
    }
    showToast(`Booking cancelled · QAR ${refund} refund initiated`);
  };

  const handleRescheduleComplete = async (id, newDate, newSlot) => {
    const when = `${fmtDateShort(newDate)} · ${newSlot}`;
    try {
      const updated = await updateBooking(id, { date:newDate.toISOString(), slot:newSlot, when });
      setBookings(p => p.map(b => b.id === id ? updated : b));
    } catch (e) {
      setBookings(p => p.map(b => b.id === id ? { ...b, date:newDate.toISOString(), slot:newSlot, when } : b));
    }
    // Drop a system message so the other side sees who rescheduled and when
    try {
      const actor = effectiveRole === 'provider' ? 'Provider' : 'Client';
      const sys = await insertMessage({ bookingId: id, from:'system', system:true, icon:'calendar', text:`${actor} rescheduled to ${when}` });
      setThreads(p => ({ ...p, [id]: [...(p[id] || []), sys] }));
    } catch (e) {}
    setRescheduleModal(null);
    showToast('Booking rescheduled!', 'success');
  };

  const handleSend = async (id, text, imageUrl) => {
    const fromRole = effectiveRole === 'provider' ? 'provider' : 'client';
    try {
      const created = await insertMessage({ bookingId: id, from: fromRole, text, imageUrl });
      setThreads(p => ({ ...p, [id]: [...(p[id]||[]), created] }));
    } catch (e) {
      setThreads(p => ({ ...p, [id]: [...(p[id]||[]), { id: Date.now(), from: fromRole, text, imageUrl, time:'Just now' }] }));
    }
  };

  const handleMarkRead = async (id) => {
    const otherSide = effectiveRole === 'provider' ? 'client' : 'provider';
    try {
      // Generic mark-read: flip "read" on messages from the OTHER side for this booking
      await sb.from('messages').update({ read: true }).eq('booking_id', id).eq('from_user', otherSide);
    } catch (e) {}
    setThreads(p => ({ ...p, [id]: (p[id]||[]).map(m => m.from===otherSide ? {...m, read:true} : m) }));
  };

  // Provider accepts a pending booking → status becomes 'approved' (client can now pay)
  const handleAcceptBooking = async (id) => {
    try {
      const updated = await updateBooking(id, { status: 'approved' });
      setBookings(p => p.map(b => b.id === id ? updated : b));
      // System message in the thread
      try {
        const me = providers.find(p => p.id === user?.providerId);
        const sys = await insertMessage({ bookingId: id, from:'system', system:true, icon:'check', text:`${me?.name || 'Provider'} accepted your booking` });
        setThreads(p => ({ ...p, [id]: [...(p[id] || []), sys] }));
      } catch (e) {}
      showToast('Booking accepted', 'success');
    } catch (e) { showToast('Failed: ' + e.message, 'error'); }
  };

  const handleDeclineBooking = async (id) => {
    try {
      const updated = await updateBooking(id, { status: 'rejected' });
      setBookings(p => p.map(b => b.id === id ? updated : b));
      try {
        const sys = await insertMessage({ bookingId: id, from:'system', system:true, icon:'alert', text:'Booking declined by provider' });
        setThreads(p => ({ ...p, [id]: [...(p[id] || []), sys] }));
      } catch (e) {}
      showToast('Booking declined');
    } catch (e) { showToast('Failed: ' + e.message, 'error'); }
  };

  // Provider marks a confirmed booking as completed (after the session)
  const handleCompleteBooking = async (id) => {
    try {
      const updated = await updateBooking(id, { status: 'completed' });
      setBookings(p => p.map(b => b.id === id ? updated : b));
      try {
        const sys = await insertMessage({ bookingId: id, from:'system', system:true, icon:'check', text:'Session completed' });
        setThreads(p => ({ ...p, [id]: [...(p[id] || []), sys] }));
      } catch (e) {}
      showToast('Marked as completed', 'success');
    } catch (e) { showToast('Failed: ' + e.message, 'error'); }
  };

  const handleProviderInquiry = (prov) => {
    requireAuth(async () => {
      // Look for an existing inquiry-style booking with this provider
      const existing = bookings.find(b => b.providerId === prov.id && b.isInquiry);
      if (existing) { goto('messages', { bookingId: existing.id }); return; }
      try {
        const created = await insertBooking({
          userId: user?.id,
          clientName: user?.name || null,
          clientEmail: user?.email || null,
          providerId: prov.id,
          providerName: prov.name, providerCover: prov.cover,
          serviceTitle: 'Inquiry · no booking yet',
          when: 'Pre-booking',
          isInquiry: true,
          status: 'pending',
        });
        setBookings(p => [created, ...p]);
        setThreads(p => ({ ...p, [created.id]: [] }));
        goto('messages', { bookingId: created.id });
      } catch (e) { showToast('Failed to start inquiry: ' + e.message, 'error'); }
    });
  };

  const handleProviderUpdate = (updated) => {
    setProviders(p => p.map(x => x.id === updated.id ? updated : x));
  };

  // Route resolution (must be before any early return — rules of hooks)
  const provider = useMemo(() => providers.find(p => p.id === currentRoute.providerId), [currentRoute.providerId, providers]);

  // Loading — polished splash with logo + skeleton hint
  if (authLoading || loading) {
    return (
      <div className="fixed inset-0 flex items-center justify-center flex-col gap-3 pop-in" style={{ background:T.bgBase }}>
        <Logo size={36}/>
        <div className="flex gap-1.5 mt-2">
          {[0,1,2].map(i => <div key={i} className="w-2 h-2 rounded-full" style={{ background:T.primary, animation:`pulse 1.1s ${i*0.18}s infinite` }}/>)}
        </div>
        <style>{`@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.3;transform:scale(0.6)} }`}</style>
      </div>
    );
  }

  let page;
  const routeName = currentRoute.name;

  // Auth routes (always accessible)
  if (routeName === 'login') page = <LoginPage onNavigate={goto} onAuth={handleAuth}/>;
  else if (routeName === 'signup') page = <SignupPage onNavigate={goto} onAuth={handleAuth}/>;
  else if (routeName === 'landing') page = <LandingPage onNavigate={goto} isAuthed={isAuthed}/>;
  else if (routeName === 'terms') page = <TermsPage onNavigate={goto}/>;
  else if (routeName === 'feed') page = <FeedPage providers={providers} posts={posts} onNavigate={goto} onBook={handleBookProvider} onBookCollab={p => requireAuth(() => showToast('Bundle booking requested', 'success'))}/>;
  else if (routeName === 'explore') page = <ExplorePage providers={providers} initialCat={currentRoute.cat} onNavigate={goto}/>;
  else if (routeName === 'provider') page = <ProviderPage provider={provider} onNavigate={goto} onBook={(sid) => handleBookProvider(provider.id, sid)} onMessage={handleProviderInquiry}/>;
  // Protected routes
  else if (!isAuthed) {
    page = <div className="pt-8"><AuthGate action={routeName === 'bookings' ? 'manage bookings' : routeName === 'messages' ? 'check messages' : 'continue'} onLogin={() => goto('login')} onSignup={() => goto('signup')}/></div>;
  }
  else if (effectiveRole === 'admin' && routeName === 'admin') page = <AdminPage/>;
  else if (effectiveRole === 'provider') {
    if (routeName === 'prov-book') page = <ProviderBookingsPage bookings={bookings.filter(b => b.providerId === user?.providerId)} onAccept={handleAcceptBooking} onDecline={handleDeclineBooking} onComplete={handleCompleteBooking} onReschedule={b => setRescheduleModal(b)} onNavigate={goto}/>;
    else if (routeName === 'messages') page = <MessagesPage bookings={bookings} threads={threads} onSend={handleSend} onMarkRead={handleMarkRead} initialBookingId={currentRoute.bookingId} me="provider"/>;
    else if (routeName === 'prov-wallet') page = <ProviderWalletPage user={user} bookings={bookings}/>;
    else if (routeName === 'prov-profile') page = <ProviderProfilePage user={user} providers={providers} onProviderUpdate={handleProviderUpdate} onNavigate={goto}/>;
    else if (routeName === 'profile') page = <ProfilePage user={user} onNavigate={goto} onLogout={handleLogout} onSwitchRole={handleSwitchRole} providers={providers} favorites={favorites} follows={follows} onFavoritesChange={async () => setFavorites(await fetchFavorites(user.id))} onFollowsChange={async () => setFollows(await fetchFollows(user.id))} onUserChange={(u) => setUser(u)}/>;
    else page = <ProviderDashboard user={user} providers={providers} bookings={bookings} onRefreshPosts={refreshData} onNavigate={goto}/>;
  }
  else {
    // client
    if (routeName === 'bookings') page = <BookingsPage bookings={bookings} onNavigate={goto} onPay={handlePay} onCancel={handleCancel} onReschedule={b => setRescheduleModal(b)} providers={providers}/>;
    else if (routeName === 'messages') page = <MessagesPage bookings={bookings} threads={threads} onSend={handleSend} onMarkRead={handleMarkRead} initialBookingId={currentRoute.bookingId} me="client"/>;
    else if (routeName === 'profile') page = <ProfilePage user={user} onNavigate={goto} onLogout={handleLogout} onSwitchRole={handleSwitchRole} providers={providers} favorites={favorites} follows={follows} onFavoritesChange={async () => setFavorites(await fetchFavorites(user.id))} onFollowsChange={async () => setFollows(await fetchFollows(user.id))} onUserChange={(u) => setUser(u)}/>;
    else page = <FeedPage providers={providers} posts={posts} onNavigate={goto} onBook={handleBookProvider} onBookCollab={p => requireAuth(() => showToast('Bundle booking requested', 'success'))}/>;
  }

  const showNavbar = !['login','signup'].includes(routeName);

  return (
    <div className="min-h-screen" style={{ background:T.bgBase }}>
      {showNavbar && (
        <Navbar
          currentPage={routeName}
          user={user}
          viewRole={viewRole}
          onSetViewRole={setViewRole}
          onNavigate={goto}
          onLogout={handleLogout}
          bookings={bookings}
          threads={threads}
        />
      )}
      <div className={showNavbar ? 'pt-16' : ''}>
        {page}
      </div>
      {bookingModal && <BookingModal provider={bookingModal.provider} initialServiceId={bookingModal.serviceId} onClose={() => setBookingModal(null)} onComplete={handleBookComplete} userBookings={bookings.filter(b => b.userId === user?.id)} takenSlots={bookings.filter(b => b.providerId === bookingModal.provider?.id && ['pending','approved','confirmed'].includes(b.status) && b.date && b.slot).map(b => ({ slot: `${fmtDateKey(new Date(b.date))}T${b.slot}`, serviceId: b.serviceId }))}/>}
      {paymentModal && <PaymentModal booking={paymentModal} onClose={() => setPaymentModal(null)} onSuccess={handlePaymentSuccess}/>}
      {rescheduleModal && <RescheduleModal booking={rescheduleModal} providers={providers} onClose={() => setRescheduleModal(null)} onComplete={handleRescheduleComplete} takenSlots={bookings.filter(b => b.providerId === rescheduleModal.providerId && b.id !== rescheduleModal.id && ['pending','approved','confirmed'].includes(b.status) && b.date && b.slot).map(b => `${fmtDateKey(new Date(b.date))}T${b.slot}`)} />}
      <ToastHost/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
