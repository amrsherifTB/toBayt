function getLucideIcon(name) {
  if (!window.lucide) return null;
  const pascal = name.split('-').map(w => w[0].toUpperCase() + w.slice(1)).join('');
  return (window.lucide.icons && (window.lucide.icons[pascal] || window.lucide.icons[name]))
    || window.lucide[pascal] || null;
}
function makeIcon(name) {
  return function Icon({ size = 20, color = 'currentColor', fill = 'none', strokeWidth = 2, className = '', style = {}, ...rest }) {
    const data = getLucideIcon(name);
    if (!data) return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth={strokeWidth} className={className} style={style} {...rest} />;
    let children = Array.isArray(data) && Array.isArray(data[0]) ? data
      : Array.isArray(data) && data.length === 3 && Array.isArray(data[2]) ? data[2] : [];
    return (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24"
        fill={fill} stroke={color} strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round"

        {children.map(([tag, attrs], i) => React.createElement(tag, { key: i, ...attrs }))}

  };
}

function getAvailableSlots(providerId, date, takenSlots = []) {
  const av = seedAvailability[providerId];
  if (!av) return [];

const Btn = ({ children, variant = 'primary', size = 'md', onClick, disabled, leadingIcon: LI, trailingIcon: TI, className = '', style = {}, type = 'button' }) => {

const RealCalendar = ({ providerId, selectedDate, onSelect }) => {
  const [offset, setOffset] = useState(0);
  const viewMonth = new Date(TODAY.getFullYear(), TODAY.getMonth() + offset, 1);
  const daysInMonth = new Date(viewMonth.getFullYear(), viewMonth.getMonth() + 1, 0).getDate();
  const firstDayOfWeek = viewMonth.getDay();
  const totalCells = Math.ceil((firstDayOfWeek + daysInMonth) / 7) * 7;
  const windowEnd = addDays(TODAY, 60);
  return (
    <div className="rounded-xl p-4" style={{ background: T.bgSurface, border: `1px solid ${T.border}` }}>
      <div className="flex items-center justify-between mb-3">
        <span className="text-sm font-semibold" style={{ color: T.ink900 }}>{MONTH_NAMES[viewMonth.getMonth()]} {viewMonth.getFullYear()}</span>
        <div className="flex gap-1">
          <button onClick={() => offset > 0 && setOffset(offset - 1)} disabled={offset === 0} className="w-7 h-7 rounded flex items-center justify-center disabled:opacity-30 hover:bg-gray-100"><ArrowLeft size={12}/></button>
          <button onClick={() => setOffset(offset + 1)} disabled={addDays(viewMonth, 32) > windowEnd} className="w-7 h-7 rounded flex items-center justify-center disabled:opacity-30 hover:bg-gray-100"><ArrowRight size={12}/></button>
        </div>
      </div>
      <div className="grid grid-cols-7 gap-1 mb-1">
        {DAY_INITIALS.map((d, i) => <div key={i} className="text-center text-[10px] font-medium py-1" style={{ color: T.ink500 }}>{d}</div>)}
      </div>
      <div className="grid grid-cols-7 gap-1">
        {[...Array(totalCells)].map((_, i) => {
          const dnum = i - firstDayOfWeek + 1;
          if (dnum < 1 || dnum > daysInMonth) return <div key={i}/>;
          const date = new Date(viewMonth.getFullYear(), viewMonth.getMonth(), dnum);
          const isPast = date < TODAY && !isSameDate(date, TODAY);
          const available = !isPast && date <= windowEnd && hasAnyAvailability(providerId, date);
          const selected = isSameDate(selectedDate, date);
          const isToday = isSameDate(date, TODAY);
          return (
            <button key={i} disabled={!available} onClick={() => onSelect(date)}
              className="aspect-square rounded-md text-xs font-medium relative transition-colors"
              style={{ background: selected ? T.primary : isToday ? T.primary100 : 'transparent', color: selected ? '#fff' : !available ? T.ink300 : T.ink900 }}>
              {dnum}
              {available && !selected && <div className="absolute bottom-0.5 left-1/2 -translate-x-1/2 w-1 h-1 rounded-full" style={{ background: T.primary }}/>}
            </button>
          );
        })}
      </div>
    </div>
  );
};

};

            <div className="mt-3 rounded-xl p-3 flex items-start gap-2" style={{ background:T.bgMuted }}>
              <ShieldCheck size={14} style={{ color:T.ink500, marginTop:2, flexShrink:0 }}/>
              <p className="text-xs" style={{ color:T.ink700 }}>{provider.name} is an independent provider. toBayt verifies ID and holds your payment until completion.</p>
            </div>

        )}
      </div>

      {/* Footer */}
      <div className="px-6 py-4 flex gap-3 border-t" style={{ borderColor:T.border }}>
        <Btn variant="outline" onClick={prev}>{step === 0 ? 'Cancel' : 'Back'}</Btn>
        <Btn className="flex-1" onClick={next} disabled={!canContinue} trailingIcon={step===3 ? Check : ArrowRight}>
          {step===3 ? 'Request booking' : 'Continue'}
        </Btn>
      </div>
    </Modal>
  );
};

const PaymentModal = ({ booking, onClose, onSuccess }) => {
  const [method, setMethod] = useState('naps');
  const [processing, setProcessing] = useState(false);
  if (!booking) return null;
  const total = booking.total || 0;
  const methods = [
    { id:'apple_pay', label:'Apple Pay', sub:'One-tap with Face ID', icon:'⎈', bg:'#000' },
    { id:'naps', label:'NaPS', sub:'Qatar national payment · debit', icon:'ن', bg:'#8B1538', recommended:true },
    { id:'qpay', label:'QPAY', sub:'All Qatari banks', icon:'Q', bg:'#1E40AF' },
    { id:'tap', label:'Tap', sub:'KNET, MADA, Benefit', icon:'T', bg:'#1A6BFF' },
    { id:'card', label:'Visa ···· 4521', sub:'Expires 09/28', icon:'VISA', bg:'linear-gradient(135deg,#1a1f71,#2d4ac0)' },
    { id:'cash', label:'Cash on completion', sub:'No refund protection', icon:'﷼', bg:T.accent600 },
  ];
  const handlePay = () => {
    setProcessing(true);
    setTimeout(() => { setProcessing(false); onSuccess(method); }, 900);
  };
  return (
    <Modal open onClose={onClose} title={`Pay QAR ${total}`} maxWidth={480}>
      <div className="p-6">
        <div className="text-center mb-6">
          <div className="text-4xl font-semibold font-mono" style={{ color:T.ink900, fontFamily:'Fraunces,serif' }}>QAR {total}</div>
          <div className="text-sm mt-1" style={{ color:T.ink500 }}>{booking.serviceTitle}</div>
        </div>
        <div className="flex flex-col gap-2 mb-4">
          {methods.map(m => (
            <button key={m.id} onClick={() => setMethod(m.id)}
              className="rounded-xl p-3 flex items-center gap-3 text-left transition-all"
              style={{ background:T.bgSurface, border:`2px solid ${method===m.id ? T.primary : T.border}` }}>
              <div className="w-12 h-8 rounded flex items-center justify-center text-white text-[10px] font-bold flex-shrink-0" style={{ background: m.bg }}>{m.icon}</div>
              <div className="flex-1">
                <div className="text-sm font-semibold flex items-center gap-2" style={{ color:T.ink900 }}>
                  {m.label}
                  {m.recommended && <Pill bg={T.success} color="#fff" className="text-[9px] px-1.5 py-0">Recommended</Pill>}
                </div>
                <div className="text-xs" style={{ color:T.ink500 }}>{m.sub}</div>
              </div>
              {method===m.id ? <div className="w-5 h-5 rounded-full flex items-center justify-center" style={{ background:T.primary }}><Check size={12} color="#fff"/></div> : <div className="w-5 h-5 rounded-full" style={{ border:`1.5px solid ${T.border}` }}/>}
            </button>
          ))}
        </div>
        {method === 'cash' && (
          <div className="rounded-xl p-3 flex items-start gap-2 mb-4" style={{ background:'#FBE2E6' }}>
            <AlertCircle size={14} style={{ color:T.danger, marginTop:2, flexShrink:0 }}/>
            <p className="text-xs" style={{ color:'#8B2A38' }}><strong>Cash payments are not protected</strong> by toBayt's refund policy. Disputes cannot be mediated.</p>
          </div>
        )}
        <Btn size="lg" className="w-full" onClick={handlePay} disabled={processing} leadingIcon={processing ? Clock : ShieldCheck}>
          {processing ? 'Processing…' : method==='cash' ? `Confirm cash · QAR ${total}` : `Pay QAR ${total}`}
        </Btn>
        <p className="mt-2 text-xs text-center" style={{ color:T.ink500 }}>Secured · full refund {">"} 24h before · 50% refund {">"} 2h before</p>
      </div>
    </Modal>
  );
};

const ExplorePage = ({ providers, initialCat, onNavigate, onBook }) => {
  const [cat, setCat] = useState(initialCat || 'all');
  const [query, setQuery] = useState('');
  const [sort, setSort] = useState('recommended');
  const [maxPrice, setMaxPrice] = useState(700);
  const [maxDistance, setMaxDistance] = useState(10);
  const [verifiedOnly, setVerifiedOnly] = useState(false);
  const [minRating, setMinRating] = useState(0);

  const categories = [
    { id:'cooking', label:'Cooking', icon:'🍽️' },
    { id:'fitness', label:'Fitness', icon:'💪' },
    { id:'wellness', label:'Wellness', icon:'🥗' },
    { id:'languages', label:'Languages', icon:'🗣️' },
    { id:'beauty', label:'Beauty', icon:'✨' },
    { id:'tutoring', label:'Tutoring', icon:'📚' },
  ];

  const filtered = providers.filter(p =>
    (cat === 'all' || p.cat === cat) &&
    (query === '' || p.name.toLowerCase().includes(query.toLowerCase()) || p.specialty.toLowerCase().includes(query.toLowerCase())) &&
    p.priceFrom <= maxPrice && p.distance <= maxDistance &&
    (!verifiedOnly || p.verified) && p.rating >= minRating
  ).sort((a, b) => {
    if (sort === 'price_asc') return a.priceFrom - b.priceFrom;
    if (sort === 'price_desc') return b.priceFrom - a.priceFrom;
    if (sort === 'rating') return b.rating - a.rating;
    if (sort === 'distance') return a.distance - b.distance;
    if (sort === 'popular') return b.reviews - a.reviews;
    return 0;
  });

  const activeFilterCount = (sort !== 'recommended' ? 1 : 0) + (maxPrice < 700 ? 1 : 0) + (maxDistance < 10 ? 1 : 0) + (verifiedOnly ? 1 : 0) + (minRating > 0 ? 1 : 0);

            {/* Category */}

              <div className="text-[10px] uppercase tracking-wider font-medium mb-2" style={{ color:T.ink500 }}>Category</div>

// BOOKINGS PAGE
const BookingsPage = ({ bookings, onNavigate, onPay, onCancel, onReschedule, providers }) => {
  const [tab, setTab] = useState('upcoming');
  const [openId, setOpenId] = useState(null);
  const [confirmCancel, setConfirmCancel] = useState(null);

  const filtered = bookings.filter(b => tab==='upcoming'
    ? ['pending','approved','confirmed'].includes(b.status)
    : ['completed','rejected','cancelled'].includes(b.status));

  const getCancellationPolicy = (booking) => {
    if (!booking?.date) return { refundPct:100, label:'Full refund', reason:'No date set.' };
    const dt = new Date(booking.date);
    const [h,m] = (booking.slot||'00:00').split(':').map(Number);
    dt.setHours(h,m,0,0);
    const hrs = (dt - new Date()) / 3600000;
    if (booking.status === 'pending') return { refundPct:100, label:'Full refund', reason:'Nothing charged until provider accepts.' };
    if (hrs >= 24) return { refundPct:100, label:'Full refund', reason:`${Math.floor(hrs)}h until session — full refund within 3 business days.` };
    if (hrs >= 2) return { refundPct:50, label:'50% refund', reason:`Less than 24h away (${Math.floor(hrs)}h). Provider has reserved time.` };
    return { refundPct:0, label:'No refund', reason:'Less than 2 hours away — provider\'s slot cannot be released.' };
  };

  return (
    <div className="max-w-3xl mx-auto px-4 sm:px-6 py-8">
      <h1 className="text-2xl font-semibold mb-6" style={{ fontFamily:'Fraunces,serif', color:T.ink900 }}>Your bookings.</h1>
      <div className="flex gap-1 p-1 rounded-xl w-fit mb-6" style={{ background:T.bgMuted }}>
        {['upcoming','past'].map(t => (
          <button key={t} onClick={() => setTab(t)} className="px-5 py-2 rounded-lg text-sm font-medium capitalize" style={{ background: tab===t ? T.bgSurface : 'transparent', color: tab===t ? T.ink900 : T.ink500 }}>{t}</button>
        ))}
      </div>

      {filtered.length === 0 && (
        <div className="text-center py-24">
          <div className="w-16 h-16 rounded-full mx-auto flex items-center justify-center mb-4" style={{ background:T.bgMuted }}><CalendarIcon size={24} color={T.ink500}/></div>
          <div className="text-base font-medium" style={{ color:T.ink900 }}>Nothing here yet</div>
          <div className="text-sm mt-1 mb-5" style={{ color:T.ink500 }}>Find an expert and start your first session.</div>
          <Btn onClick={() => onNavigate('explore')}>Explore experts</Btn>
        </div>
      )}

      <div className="flex flex-col gap-3">
        {filtered.map(b => {
          const open = openId === b.id;
          const policy = getCancellationPolicy(b);
          const refundAmount = Math.round((b.total * policy.refundPct) / 100);
          return (
            <div key={b.id} className="rounded-2xl overflow-hidden" style={{ background:T.bgSurface, border:`1px solid ${T.border}` }}>
              <button onClick={() => setOpenId(open ? null : b.id)} className="w-full text-left p-5">
                <div className="flex items-start gap-4">
                  <CoverArt tone={b.providerCover} className="w-14 h-14 rounded-xl flex-shrink-0"/>
                  <div className="flex-1">
                    <div className="flex items-start justify-between gap-4">
                      <div>
                        <div className="font-semibold" style={{ color:T.ink900 }}>{b.providerName}</div>
                        <div className="text-sm" style={{ color:T.ink500 }}>{b.serviceTitle}</div>
                      </div>
                      <div className="text-right flex-shrink-0">
                        <div className="font-mono font-semibold" style={{ color:T.ink900 }}>QAR {b.total}</div>
                        <StatusBadge status={b.status}/>
                      </div>
                    </div>
                    <div className="flex items-center gap-3 mt-2 text-sm" style={{ color:T.ink500 }}>
                      <span className="flex items-center gap-1"><CalendarIcon size={13}/> {b.when}</span>
                    </div>
                  </div>
                  <ChevronDown size={16} style={{ color:T.ink500, flexShrink:0, transform: open ? 'rotate(180deg)' : 'none', transition:'transform 0.2s' }}/>
                </div>
              </button>

              {open && (
                <div className="px-5 pb-5 border-t" style={{ borderColor:T.border }}>
                  <div className="pt-4 flex flex-col gap-3">
                    {[['Where', b.locType==='client_home'?'Your home · The Pearl':b.locType==='online'?'Online · video call':`${b.providerName}'s location`]].map(([k,v]) => (
                      <div key={k} className="flex justify-between text-sm"><span style={{ color:T.ink500 }}>{k}</span><span style={{ color:T.ink900 }}>{v}</span></div>
                    ))}
                  </div>
                  <div className="mt-4 flex flex-wrap gap-2">
                    {b.status === 'approved' && <Btn size="sm" onClick={() => onPay(b.id)}>Pay now</Btn>}
                    {['confirmed','pending'].includes(b.status) && <Btn size="sm" variant="outline" leadingIcon={CalendarIcon} onClick={() => onReschedule(b)}>Reschedule</Btn>}
                    {['pending','approved','confirmed'].includes(b.status) && (
                      <button onClick={() => setConfirmCancel(b)} className="text-sm font-medium px-3 py-1.5 rounded-lg" style={{ color:T.danger, background:'#FBE2E6' }}>Cancel</button>
                    )}
                    <Btn size="sm" variant="ghost" leadingIcon={MessageSquare} onClick={() => onNavigate('messages', { bookingId: b.id })}>Message</Btn>
                  </div>
                  {['pending','approved','confirmed'].includes(b.status) && (
                    <div className="mt-3 rounded-xl p-3 text-xs" style={{ background:T.bgMuted }}>
                      <span className="font-medium" style={{ color:T.ink900 }}>Cancellation: </span>
                      <span style={{ color:T.ink700 }}>{policy.label} — QAR {refundAmount} back. {policy.reason}</span>
                    </div>
                  )}
                </div>
              )}
            </div>
          );
        })}
      </div>

      {/* Cancel confirmation modal */}
      {confirmCancel && (() => {
        const policy = getCancellationPolicy(confirmCancel);
        const refundAmount = Math.round((confirmCancel.total * policy.refundPct) / 100);
        return (
          <Modal open onClose={() => setConfirmCancel(null)} title="Cancel booking?">
            <div className="p-6">
              <p className="text-sm" style={{ color:T.ink700 }}>
                You'll receive <strong className="font-mono" style={{ color:T.ink900 }}>QAR {refundAmount}</strong> back ({policy.label.toLowerCase()}).
              </p>
              <p className="mt-2 text-xs p-3 rounded-lg" style={{ background:T.bgMuted, color:T.ink700 }}>{policy.reason}</p>
              <div className="mt-4 flex gap-3">
                <Btn variant="outline" className="flex-1" onClick={() => setConfirmCancel(null)}>Keep it</Btn>
                <Btn variant="danger" className="flex-1" onClick={() => { onCancel(confirmCancel.id, refundAmount); setConfirmCancel(null); }}>Yes, cancel</Btn>
              </div>
            </div>
          </Modal>
        );
      })()}
    </div>
  );
};

// MESSAGES PAGE (split pane)
const MessagesPage = ({ bookings, threads, providers, onSend, onMarkRead, initialBookingId }) => {
  const [activeId, setActiveId] = useState(initialBookingId || null);
  const [draft, setDraft] = useState('');
  const [callOpen, setCallOpen] = useState(false);
  const messagesEndRef = useRef(null);

  const eligible = bookings.filter(b => !b.isCollab && b.providerId && (b.isInquiry || ['pending','approved','confirmed','completed'].includes(b.status)));
  const activeBooking = eligible.find(b => b.id === activeId);
  const activeThread = activeId ? (threads[activeId] || []) : [];

  useEffect(() => {
    messagesEndRef.current?.scrollIntoView({ behavior:'smooth' });
  }, [activeThread.length, activeId]);

  useEffect(() => {
    if (activeId) onMarkRead(activeId);
  }, [activeId]);

  const send = async () => {
    if (!draft.trim() || !activeId) return;
    onSend(activeId, draft.trim());
    setDraft('');
  };

  const getUnread = (bookingId) => (threads[bookingId] || []).filter(m => m.from === 'provider' && !m.read).length;

  return (
    <div className="max-w-6xl mx-auto px-4 sm:px-6 py-8">
      <CallModal open={callOpen} onClose={() => setCallOpen(false)} booking={activeBooking}/>
      <h1 className="text-2xl font-semibold mb-6" style={{ fontFamily:'Fraunces,serif', color:T.ink900 }}>Inbox.</h1>
      <div className="grid lg:grid-cols-[320px_1fr] gap-4" style={{ height:'calc(100vh - 220px)', minHeight:500 }}>
        {/* Thread list */}
        <div className="rounded-2xl overflow-hidden flex flex-col" style={{ background:T.bgSurface, border:`1px solid ${T.border}` }}>
          <div className="p-4 border-b" style={{ borderColor:T.border }}>
            <div className="text-xs uppercase tracking-wider font-medium" style={{ color:T.ink500 }}>Conversations</div>
          </div>
          <div className="flex-1 overflow-y-auto">
            {eligible.length === 0 && <div className="p-8 text-center text-sm" style={{ color:T.ink500 }}>No conversations yet. Book a session to start messaging.</div>}
            {eligible.map(b => {
              const thread = threads[b.id] || [];
              const last = thread[thread.length - 1];
              const unread = getUnread(b.id);
              return (
                <button key={b.id} onClick={() => setActiveId(b.id)} className="w-full flex items-center gap-3 p-4 text-left border-b transition-colors" style={{ borderColor:T.border, background: activeId===b.id ? T.primary100 : 'transparent' }}>
                  <CoverArt tone={b.providerCover} className="w-11 h-11 rounded-full flex-shrink-0"/>
                  <div className="flex-1 min-w-0">
                    <div className="flex items-center justify-between gap-2">
                      <span className="text-sm font-semibold truncate" style={{ color: activeId===b.id ? T.primary : T.ink900 }}>{b.providerName}</span>
                      <span className="text-[10px] flex-shrink-0" style={{ color:T.ink500 }}>{last?.time || ''}</span>
                    </div>
                    <div className="text-[10px] truncate" style={{ color:T.accent600 }}>{b.serviceTitle}</div>
                    <div className="text-xs mt-0.5 truncate" style={{ color: unread ? T.ink900 : T.ink500, fontWeight: unread ? 500 : 400 }}>
                      {last?.system ? last.text : last ? `${last.from==='client'?'You: ':''}${last.text}` : 'No messages yet'}
                    </div>
                  </div>
                  {unread > 0 && <div className="w-5 h-5 rounded-full flex items-center justify-center text-[10px] font-bold text-white flex-shrink-0" style={{ background:T.accent }}>{unread}</div>}
                </button>
              );
            })}
          </div>
        </div>

        {/* Chat pane */}
        <div className="rounded-2xl overflow-hidden flex flex-col" style={{ background:T.bgSurface, border:`1px solid ${T.border}` }}>
          {!activeBooking ? (
            <div className="flex-1 flex items-center justify-center flex-col gap-3" style={{ color:T.ink500 }}>
              <MessageSquare size={32} style={{ color:T.ink300 }}/>
              <p className="text-sm">Select a conversation</p>
            </div>
          ) : (
            <>
              {/* Chat header */}
              <div className="flex items-center gap-3 p-4 border-b" style={{ borderColor:T.border }}>
                <CoverArt tone={activeBooking.providerCover} className="w-9 h-9 rounded-full flex-shrink-0"/>
                <div className="flex-1">
                  <div className="text-sm font-semibold" style={{ color:T.ink900 }}>{activeBooking.providerName}</div>
                  <div className="text-xs" style={{ color:T.ink500 }}>{activeBooking.serviceTitle} · {activeBooking.when}</div>
                </div>
                <button onClick={() => setCallOpen(true)} className="w-8 h-8 rounded-full flex items-center justify-center hover:opacity-80" style={{ background:T.bgMuted }}><Phone size={14}/></button>
              </div>

              {/* Messages */}
              <div className="flex-1 overflow-y-auto p-4 flex flex-col gap-3">
                {activeThread.length === 0 && <div className="text-center text-xs py-4" style={{ color:T.ink500 }}>No messages yet. Say hello!</div>}
                {activeThread.map((m, i) => {
                  if (m.system) return (
                    <div key={i} className="self-center text-center">
                      <div className="rounded-full px-3 py-1.5 text-xs inline-block" style={{ background:T.bgMuted, color:T.ink700 }}>
                        {m.icon==='calendar'&&'📅 '}{m.icon==='check'&&'✓ '}{m.icon==='alert'&&'⚠ '}{m.text}
                      </div>
                    </div>
                  );
                  const mine = m.from === 'client';
                  return (
                    <div key={i} className={`flex flex-col ${mine ? 'items-end' : 'items-start'}`}>
                      <div className="max-w-[70%] px-3.5 py-2 rounded-2xl text-sm" style={{ background: mine ? T.primary : T.bgMuted, color: mine ? '#fff' : T.ink900, borderBottomRightRadius: mine ? 4 : 16, borderBottomLeftRadius: mine ? 16 : 4 }}>{m.text}</div>
                      <div className="text-[10px] mt-0.5 px-1" style={{ color:T.ink500 }}>{m.time}</div>
                    </div>
                  );
                })}
                <div ref={messagesEndRef}/>
              </div>

              {/* Composer */}
              <div className="flex items-end gap-2 p-3 border-t" style={{ borderColor:T.border }}>
                <div className="flex gap-2 flex-shrink-0">
                  <button onClick={() => { onSend(activeId, '📅 Can we reschedule?'); }} className="px-2.5 py-1.5 rounded-lg text-[11px] font-medium" style={{ background:T.primary100, color:T.primary }}>Reschedule?</button>
                  <button onClick={() => { onSend(activeId, '⚠ I need to report an issue.'); }} className="px-2.5 py-1.5 rounded-lg text-[11px] font-medium" style={{ background:'#FBE2E6', color:'#8B2A38' }}>Report issue</button>
                </div>
                <textarea value={draft} onChange={e => setDraft(e.target.value)}
                  onKeyDown={e => { if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); send(); } }}
                  placeholder="Type a message…" rows={1}
                  className="flex-1 py-2 px-3 rounded-xl text-sm outline-none resize-none"
                  style={{ background:T.bgMuted, color:T.ink900, maxHeight:100 }}/>
                <button onClick={send} disabled={!draft.trim()} className="w-9 h-9 rounded-xl flex items-center justify-center flex-shrink-0 disabled:opacity-30" style={{ background:T.primary }}>
                  <Send size={15} color="#fff"/>
                </button>
              </div>
            </>
          )}
        </div>
      </div>
    </div>
  );
};

const WithdrawModal = ({ open, onClose, balance = 2640 }) => {

  };
  const amt = Number(amount);
  const valid = amt >= 50 && amt <= balance;
  return (
    <Modal open={open} onClose={onClose} title="Withdraw funds" maxWidth={440}>

          <div className="flex gap-2 mt-2">
            {[500,1000,2000].map(v => <button key={v} onClick={() => setAmount(String(Math.min(v,balance)))} className="flex-1 py-1.5 rounded-lg text-xs font-medium" style={{ background:T.primary100, color:T.primary }}>QAR {v}</button>)}
            <button onClick={() => setAmount(String(balance))} className="flex-1 py-1.5 rounded-lg text-xs font-medium" style={{ background:T.bgMuted, color:T.ink700 }}>All</button>

        <div>

          <div className="flex flex-col gap-1.5">
            {banks.map(b => (
              <button key={b.id} onClick={() => setBank(b.id)} className="text-left rounded-xl p-3 flex items-center gap-3" style={{ background:T.bgMuted, border:`2px solid ${bank===b.id ? T.primary : 'transparent'}` }}>
                <div className="w-10 h-7 rounded flex items-center justify-center text-white text-[10px] font-bold flex-shrink-0" style={{ background:T.primary }}>{b.id.toUpperCase()}</div>
                <div className="flex-1"><div className="text-sm font-medium" style={{ color:T.ink900 }}>{b.label}</div><div className="text-xs" style={{ color:T.ink500 }}>{b.sub}</div></div>
                {bank===b.id && <Check size={14} style={{ color:T.primary }}/>}
              </button>
            ))}
          </div>
        </div>
        {amount && !valid && <p className="text-xs" style={{ color:T.danger }}>{amt < 50 ? 'Minimum withdrawal is QAR 50' : `Exceeds available balance (QAR ${balance})`}</p>}
        <Btn size="lg" className="w-full" disabled={!valid || processing} onClick={handleWithdraw}>
          {processing ? 'Processing…' : valid ? `Withdraw QAR ${amt}` : 'Enter amount'}

      </div>
    </Modal>
  );
};

                <div className="w-10 h-10 rounded-full flex items-center justify-center text-white font-semibold" style={{ background:T.primary, fontFamily:'Fraunces,serif' }}>{provider.name[0]}</div>
                {partner && <><span style={{ color:T.ink500 }}>×</span><div className="w-10 h-10 rounded-full flex items-center justify-center text-white font-semibold" style={{ background:T.accent, fontFamily:'Fraunces,serif' }}>{partner.name[0]}</div></>}
                <div><div className="font-semibold" style={{ color:T.ink900 }}>{provider.name}{partner?` × ${partner.name}`:''}</div><div className="text-xs" style={{ color:T.ink500 }}>{provider.specialty}{partner?` + ${partner.specialty}`:''}</div></div>
              </div>
              <div className="font-semibold mb-1" style={{ color:T.ink900 }}>{collab.title}</div>
              <p className="text-xs mb-4" style={{ color:T.ink700 }}>{collab.description}</p>
              <div className="flex items-center justify-between">
                <div className="flex items-baseline gap-2"><span className="text-xs font-mono line-through" style={{ color:T.ink500 }}>QAR {collab.regularPrice}</span><span className="text-2xl font-semibold font-mono" style={{ color:T.ink900 }}>QAR {collab.bundlePrice}</span></div>
                <Pill bg={T.success} color="#fff">Save QAR {collab.regularPrice - collab.bundlePrice}</Pill>
              </div>
            </div>
            <div className="rounded-xl p-4" style={{ background:T.bgMuted }}>
              <div className="text-xs font-semibold uppercase tracking-wider mb-2" style={{ color:T.ink500 }}>What's included</div>
              {[provider, partner].filter(Boolean).map((p,i) => <div key={i} className="flex items-center gap-2 text-sm py-1"><Check size={13} style={{ color:T.success }}/><span style={{ color:T.ink900 }}><strong>{p.name}</strong> — {p.services?.[0]?.title||p.specialty}</span></div>)}
            </div>
          </div>
        )}
        {step === 1 && (
          <div>
            <h3 className="text-lg font-semibold mb-4" style={{ fontFamily:'Fraunces,serif', color:T.ink900 }}>Where should we meet?</h3>
            <div className="flex flex-col gap-2">
              {[{id:'client_home',icon:Home,label:'At my home',sub:"Sara's apartment · The Pearl"},{id:'online',icon:MessageSquare,label:'Online',sub:'Video call for each session'},{id:'custom_address',icon:MapPin,label:'Custom address',sub:'Specify a location for both sessions'}].map(o => {
                const Icon = o.icon;
                return (<button key={o.id} onClick={() => setLocType(o.id)} className="text-left rounded-xl p-4 flex items-center gap-3" style={{ background:T.bgSurface, border:`2px solid ${locType===o.id?T.primary:T.border}` }}><Icon size={18} style={{ color:locType===o.id?T.primary:T.ink500 }}/><div className="flex-1"><div className="text-sm font-semibold" style={{ color:T.ink900 }}>{o.label}</div><div className="text-xs" style={{ color:T.ink500 }}>{o.sub}</div></div>{locType===o.id && <Check size={16} style={{ color:T.primary }}/>}</button>);
              })}
            </div>
          </div>
        )}
        {step === 2 && (
          <div>
            <h3 className="text-lg font-semibold mb-4" style={{ fontFamily:'Fraunces,serif', color:T.ink900 }}>Confirm bundle</h3>
            <div className="rounded-xl p-5" style={{ background:T.bgSurface, border:`1px solid ${T.border}` }}>
              <div className="flex flex-col gap-3 pb-4 border-b mb-4" style={{ borderColor:T.border }}>
                <div className="flex justify-between text-sm"><span style={{ color:T.ink500 }}>Bundle</span><span style={{ color:T.ink900, fontWeight:600 }}>{collab.title}</span></div>
                <div className="flex justify-between text-sm"><span style={{ color:T.ink500 }}>Sessions</span><span style={{ color:T.ink900 }}>{collab.duration}</span></div>
                <div className="flex justify-between text-sm"><span style={{ color:T.ink500 }}>Where</span><span style={{ color:T.ink900 }}>{locType==='client_home'?'Your home':locType==='online'?'Online':'Custom address'}</span></div>
                <div className="flex justify-between text-sm"><span style={{ color:T.ink500 }}>Scheduling</span><span style={{ color:T.ink900 }}>Providers will contact you to arrange times</span></div>
              </div>
              <div className="flex flex-col gap-2">
                <div className="flex justify-between text-sm"><span style={{ color:T.ink500 }}>Regular price</span><span className="font-mono line-through" style={{ color:T.ink500 }}>QAR {collab.regularPrice}</span></div>
                <div className="flex justify-between text-sm"><span style={{ color:T.ink500 }}>Bundle discount</span><span className="font-mono" style={{ color:T.success }}>−QAR {collab.regularPrice - collab.bundlePrice}</span></div>
                <div className="flex justify-between text-sm"><span style={{ color:T.ink500 }}>Service fee</span><span className="font-mono" style={{ color:T.ink900 }}>QAR 12</span></div>
                <div className="flex justify-between text-sm font-semibold pt-2 border-t" style={{ borderColor:T.border }}><span style={{ color:T.ink900 }}>Total</span><span className="font-mono" style={{ color:T.ink900 }}>QAR {collab.bundlePrice + 12}</span></div>
              </div>
            </div>
            <p className="mt-3 text-xs text-center" style={{ color:T.ink500 }}>Both providers must accept before payment is taken.</p>
          </div>
        )}
      </div>
      <div className="px-6 py-4 flex gap-3 border-t" style={{ borderColor:T.border }}>
        <Btn variant="outline" onClick={step===0 ? onClose : () => setStep(step-1)}>{step===0 ? 'Cancel' : 'Back'}</Btn>
        <Btn className="flex-1" onClick={step===2 ? onComplete : () => setStep(step+1)} trailingIcon={step===2 ? Check : ArrowRight}>
          {step===2 ? 'Request bundle' : 'Continue'}
        </Btn>
      </div>
    </Modal>
  );
};

// =====================================================================
// CALL MODAL
// =====================================================================
const CallModal = ({ open, onClose, booking }) => {
  if (!booking) return null;
  const unlocked = booking.date && (new Date(booking.date) - Date.now() <= 2 * 3600 * 1000);
  return (
    <Modal open={open} onClose={onClose} title={`Contact ${booking.providerName}`} maxWidth={380}>
      <div className="p-6 flex flex-col gap-3">
        <p className="text-sm" style={{ color:T.ink500 }}>For safety, direct contact details are shared 2 hours before your session.</p>
        {unlocked ? (
          <div className="flex flex-col gap-2">
            <a href="tel:+97455443322" className="flex items-center gap-3 p-4 rounded-xl" style={{ background:T.bgMuted }}>
              <div className="w-10 h-10 rounded-full flex items-center justify-center" style={{ background:T.success }}><Phone size={18} color="#fff"/></div>
              <div><div className="text-sm font-semibold" style={{ color:T.ink900 }}>{booking.providerName}</div><div className="text-xs" style={{ color:T.ink500 }}>+974 5544 3322 · Tap to call</div></div>
            </a>
            <button onClick={() => { showToast('Opening WhatsApp…'); onClose(); }} className="flex items-center gap-3 p-4 rounded-xl" style={{ background:'#E7F9EF' }}>
              <div className="w-10 h-10 rounded-full flex items-center justify-center" style={{ background:'#25D366' }}><MessageSquare size={18} color="#fff"/></div>
              <div><div className="text-sm font-semibold" style={{ color:T.ink900 }}>WhatsApp</div><div className="text-xs" style={{ color:T.ink500 }}>Open WhatsApp chat</div></div>
            </button>
          </div>
        ) : (
          <div className="rounded-xl p-4 text-center" style={{ background:T.bgMuted }}>
            <Clock size={24} className="mx-auto mb-2" style={{ color:T.ink300 }}/>
            <div className="text-sm font-medium" style={{ color:T.ink900 }}>Not yet available</div>
            <div className="text-xs mt-1" style={{ color:T.ink500 }}>Contact details unlock 2 hours before your session: <strong>{booking.when}</strong></div>
          </div>
        )}
        <Btn variant="outline" onClick={onClose} className="w-full">Close</Btn>
      </div>
    </Modal>
  );
};

// RESCHEDULE MODAL
const RescheduleModal = ({ booking, providers, onClose, onComplete }) => {
  const provider = providers.find(p => p.id === booking?.providerId);
  const [selectedDate, setSelectedDate] = useState(null);
  const [slot, setSlot] = useState(null);
  const slotsForDay = selectedDate && provider ? getAvailableSlots(provider.id, selectedDate) : [];
  if (!booking || !provider) return null;
  return (
    <Modal open onClose={onClose} title="Reschedule booking" maxWidth={520}>
      <div className="p-6">
        <div className="rounded-xl p-3 flex items-center gap-2 mb-4" style={{ background:T.bgMuted }}>
          <Clock size={14} style={{ color:T.ink500 }}/>
          <span className="text-sm" style={{ color:T.ink700 }}>Currently: <strong style={{ color:T.ink900 }}>{booking.when}</strong></span>
        </div>
        <p className="text-sm mb-4" style={{ color:T.ink500 }}>Rescheduling has no cancellation fee — it replaces your existing booking.</p>
        <RealCalendar providerId={provider.id} selectedDate={selectedDate} onSelect={d => { setSelectedDate(d); setSlot(null); }}/>
        {selectedDate && (
          <div className="mt-4">
            <div className="text-xs font-medium uppercase tracking-wider mb-2" style={{ color:T.ink500 }}>Available times · {fmtDateLong(selectedDate)}</div>
            {slotsForDay.length === 0 ? <p className="text-sm" style={{ color:T.ink500 }}>No times available.</p> : (
              <div className="grid grid-cols-4 gap-2">
                {slotsForDay.map(t => <button key={t} onClick={() => setSlot(t)} className="py-2 rounded-lg text-sm font-medium font-mono" style={{ background: slot===t ? T.primary : T.bgSurface, color: slot===t ? '#fff' : T.ink900, border:`1px solid ${slot===t ? T.primary : T.border}` }}>{t}</button>)}
              </div>
            )}
          </div>
        )}
      </div>
      <div className="px-6 py-4 flex gap-3 border-t" style={{ borderColor:T.border }}>
        <Btn variant="outline" onClick={onClose}>Cancel</Btn>
        <Btn className="flex-1" disabled={!selectedDate || !slot} onClick={() => onComplete(booking.id, selectedDate, slot)}>Confirm new time</Btn>
      </div>
    </Modal>
  );
};

// =====================================================================
// APP ROOT
// =====================================================================
function App() {
  const [role, setRole] = useState('client');
  const [history, setHistory] = useState([{ name:'landing' }]);
  const [providers, setProviders] = useState([]);
  const [posts, setPosts] = useState([]);
  const [bookings, setBookings] = useState([]);
  const [threads, setThreads] = useState({});
  const [bookingModal, setBookingModal] = useState(null);
  const [paymentModal, setPaymentModal] = useState(null);
  const [rescheduleModal, setRescheduleModal] = useState(null);
  const [collabBookingPost, setCollabBookingPost] = useState(null);
  const [loading, setLoading] = useState(true);

  const currentRoute = history[history.length - 1];

  // Load data from backend
  useEffect(() => {
    Promise.all([
      fetch('/api/providers').then(r => r.json()),
      fetch('/api/posts').then(r => r.json()),
      fetch('/api/bookings').then(r => r.json()),
    ]).then(([p, po, b]) => {
      setProviders(p);
      setPosts(po);
      setBookings(b);
      // Load threads for each booking
      const threadPromises = b.map(booking =>
        fetch(`/api/threads/${booking.id}`).then(r => r.json()).then(msgs => [booking.id, msgs])
      );
      return Promise.all(threadPromises);
    }).then(threadEntries => {
      const threadMap = {};
      threadEntries.forEach(([id, msgs]) => { threadMap[id] = msgs; });
      setThreads(threadMap);
    }).catch(() => {}).finally(() => setLoading(false));
  }, []);

  const goto = (name, params = {}) => {
    if (name === -1) { setHistory(h => h.length > 1 ? h.slice(0,-1) : h); return; }
    setHistory(h => [...h, { name, ...params }]);
    window.scrollTo(0, 0);
  };

  const provider = useMemo(() => providers.find(p => p.id === currentRoute.providerId), [currentRoute.providerId, providers]);

  const handleBook = async (data) => {
    const newBooking = {
      providerId: provider.id,
      providerName: provider.name, providerCover: provider.cover,
      serviceTitle: data.service.title, serviceId: data.service.id,
      isCustomService: !!data.isCustom,
      date: data.date.toISOString(), slot: data.slot,
      when: `${fmtDateShort(data.date)} · ${data.slot}`,
      locType: data.locType,
      total: data.service.price + (data.locType === 'online' ? 0 : 12),
      status: 'pending',
    };
    try {
      const res = await fetch('/api/bookings', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(newBooking) });
      const created = await res.json();
      setBookings(p => [created, ...p]);
      // Load the seeded thread
      const threadRes = await fetch(`/api/threads/${created.id}`);
      const msgs = await threadRes.json();
      setThreads(p => ({ ...p, [created.id]: msgs }));
    } catch(e) {
      const created = { id: `local-${Date.now()}`, ...newBooking };
      setBookings(p => [created, ...p]);
      setThreads(p => ({ ...p, [created.id]: [] }));
    }
    setBookingModal(null);
    showToast('Booking request sent!', 'success');
    goto('bookings');
  };

  const handlePay = (bookingId) => {
    const b = bookings.find(x => x.id === bookingId);
    setPaymentModal(b);
  };

  const handlePaymentSuccess = async (method) => {
    const bookingId = paymentModal?.id;
    try {
      await fetch(`/api/bookings/${bookingId}`, { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ status:'confirmed', paymentMethod:method }) });
    } catch(e) {}
    setBookings(p => p.map(b => b.id === bookingId ? { ...b, status:'confirmed', paymentMethod:method } : b));
    setPaymentModal(null);
    showToast('Payment confirmed!', 'success');
  };

  const handleCancel = async (id, refundAmount) => {
    try {
      await fetch(`/api/bookings/${id}`, { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ status:'cancelled', refundedAmount:refundAmount }) });
    } catch(e) {}
    setBookings(p => p.map(b => b.id === id ? { ...b, status:'cancelled', refundedAmount:refundAmount } : b));
    showToast(`Booking cancelled · QAR ${refundAmount} refund initiated`);
  };

  const handleRescheduleComplete = async (id, newDate, newSlot) => {
    const when = `${fmtDateShort(newDate)} · ${newSlot}`;
    try {
      await fetch(`/api/bookings/${id}`, { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ date:newDate.toISOString(), slot:newSlot, when }) });
    } catch(e) {}
    setBookings(p => p.map(b => b.id === id ? { ...b, date:newDate.toISOString(), slot:newSlot, when } : b));
    setRescheduleModal(null);
    showToast('Booking rescheduled!', 'success');
  };

  const handleSend = async (bookingId, text) => {
    const msg = { from:'client', text, time:'Just now' };
    try {
      const res = await fetch(`/api/threads/${bookingId}`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(msg) });
      const created = await res.json();
      setThreads(p => ({ ...p, [bookingId]: [...(p[bookingId]||[]), created] }));
    } catch(e) {
      setThreads(p => ({ ...p, [bookingId]: [...(p[bookingId]||[]), { ...msg, id: Date.now() }] }));
    }
  };

  const handleMarkRead = async (bookingId) => {
    try { await fetch(`/api/threads/${bookingId}/read`, { method:'POST' }); } catch(e) {}
    setThreads(p => ({ ...p, [bookingId]: (p[bookingId]||[]).map(m => m.from==='provider' ? { ...m, read:true } : m) }));
  };

  const handleProviderInquiry = (prov) => {
    const iid = `inquiry-${prov.id}`;
    if (!bookings.find(b => b.id === iid)) {
      const inq = { id:iid, providerId:prov.id, providerName:prov.name, providerCover:prov.cover, serviceTitle:'Inquiry · no booking yet', when:'Pre-booking message', isInquiry:true };
      setBookings(p => [inq, ...p]);
      setThreads(p => ({ ...p, [iid]: [{ id:`sys-${Date.now()}`, system:true, icon:'alert', text:`New inquiry — ${prov.name} hasn't been booked yet`, time:'Just now' }] }));
    }
    goto('messages', { bookingId: iid });
  };

  const isAuth = !['landing'].includes(currentRoute.name);
  const showNavbar = isAuth;

  if (loading) {
    return (
      <div className="fixed inset-0 flex items-center justify-center flex-col gap-3" style={{ background:T.bgBase }}>
        <Logo size={32}/>
        <div className="flex gap-1.5 mt-2">
          {[0,1,2].map(i => <div key={i} className="w-2 h-2 rounded-full" style={{ background:T.primary, animation:`pulse 1s ${i*0.2}s infinite` }}/>)}
        </div>
        <style>{`@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.3;transform:scale(0.6)} }`}</style>
      </div>
    );
  }

  let page;
  if (role === 'admin') {
    page = <AdminPage/>;
  } else if (role === 'provider') {
    const pn = currentRoute.name;
    if (pn === 'prov-book') page = <ProviderBookingsPage/>;
    else if (pn === 'prov-wallet') page = <ProviderWalletPage/>;
    else if (pn === 'prov-profile') page = <ProviderProfilePage providers={providers}/>;
    else page = <ProviderDashboard/>;
  } else {
    switch (currentRoute.name) {
      case 'landing': page = <LandingPage onNavigate={goto}/>; break;
      case 'feed': page = <FeedPage providers={providers} posts={posts} onNavigate={goto} onBook={(pid, sid) => { const p = providers.find(x=>x.id===pid); setBookingModal({ provider:p, serviceId:sid }); }} onBookCollab={post => setCollabBookingPost(post)}/>; break;
      case 'explore': page = <ExplorePage providers={providers} initialCat={currentRoute.cat} onNavigate={goto} onBook={() => {}}/>; break;
      case 'provider':
        page = <ProviderPage provider={provider} onNavigate={goto}
          onBook={(sid) => setBookingModal({ provider, serviceId: sid || null })}
          onMessage={handleProviderInquiry}/>; break;
      case 'bookings': page = <BookingsPage bookings={bookings} onNavigate={goto} onPay={handlePay} onCancel={handleCancel} onReschedule={b => setRescheduleModal(b)} providers={providers}/>; break;
      case 'messages': page = <MessagesPage bookings={bookings} threads={threads} providers={providers} onSend={handleSend} onMarkRead={handleMarkRead} initialBookingId={currentRoute.bookingId}/>; break;
      case 'profile': page = <ProfilePage onNavigate={goto} providers={providers}/>; break;
      case 'terms': page = <TermsPage onNavigate={goto}/>; break;
      default: page = <FeedPage providers={providers} posts={posts} onNavigate={goto} onBook={(pid,sid) => { const p = providers.find(x=>x.id===pid); setBookingModal({provider:p, serviceId:sid}); }} onBookCollab={post => setCollabBookingPost(post)}/>; break;
    }
  }

  return (
    <div className="min-h-screen" style={{ background:T.bgBase }}>
      {showNavbar && (
        <Navbar currentPage={currentRoute.name} role={role} onRoleChange={r => { setRole(r); goto(r==='client'?'feed':r==='provider'?'dashboard':'admin'); }} onNavigate={goto} bookings={bookings} threads={threads}/>
      )}
      <div className={showNavbar ? 'pt-16' : ''}>
        {page}
      </div>

      {/* Booking modal */}
      {bookingModal && (
        <BookingModal provider={bookingModal.provider} initialServiceId={bookingModal.serviceId}
          onClose={() => setBookingModal(null)} onComplete={handleBook}/>
      )}

      {/* Payment modal */}
      {paymentModal && (
        <PaymentModal booking={paymentModal} onClose={() => setPaymentModal(null)} onSuccess={handlePaymentSuccess}/>
      )}

      {/* Reschedule modal */}
      {rescheduleModal && (
        <RescheduleModal booking={rescheduleModal} providers={providers}
          onClose={() => setRescheduleModal(null)} onComplete={handleRescheduleComplete}/>
      )}

      {/* Collab booking modal */}
      <CollabBookingModal
        post={collabBookingPost} providers={providers}
        open={!!collabBookingPost}
        onClose={() => setCollabBookingPost(null)}
        onComplete={() => { setCollabBookingPost(null); showToast('Bundle booking requested!', 'success'); goto('bookings'); }}
      />

      <ToastHost/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
