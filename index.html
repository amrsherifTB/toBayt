function getLucideIcon(name) {
  if (!window.lucide) return null;
  const pascal = name.split('-').map(w => w[0].toUpperCase() + w.slice(1)).join('');
  return (window.lucide.icons && (window.lucide.icons[pascal] || window.lucide.icons[name]))
    || window.lucide[pascal] || null;
}
function makeIcon(name) {
  return function Icon({ size = 20, color = 'currentColor', fill = 'none', strokeWidth = 2, className = '', style = {}, ...rest }) {
    const data = getLucideIcon(name);
    if (!data) return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth={strokeWidth} className={className} style={style} {...rest} />;
    let children = Array.isArray(data) && Array.isArray(data[0]) ? data
      : Array.isArray(data) && data.length === 3 && Array.isArray(data[2]) ? data[2] : [];
    return (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24"
        fill={fill} stroke={color} strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round"
        className={className} style={style} {...rest}>
        {children.map(([tag, attrs], i) => React.createElement(tag, { key: i, ...attrs }))}
      </svg>
    );
  };
}

const TODAY = new Date();
const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAY_INITIALS = ['S','M','T','W','T','F','S'];
const DAY_NAMES = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

const seedAvailability = {
  default: { hours: { 0:['10:00','12:00','14:00','16:00','18:00'],1:['10:00','12:00','14:00','16:00','18:00'],2:['10:00','12:00','14:00','16:00','18:00'],3:['10:00','12:00','14:00','16:00','18:00'],4:['10:00','12:00','14:00','16:00','18:00'],5:['10:00','12:00','14:00'],6:['10:00','12:00','14:00','16:00','18:00','20:00'] }, blackouts:[] },
};
const fmtDateKey = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const fmtDateShort = d => `${DAY_NAMES[d.getDay()].slice(0,3)} ${MONTH_NAMES[d.getMonth()].slice(0,3)} ${d.getDate()}`;
const fmtDateLong = d => `${DAY_NAMES[d.getDay()]}, ${MONTH_NAMES[d.getMonth()]} ${d.getDate()}`;
const addDays = (d, n) => { const x = new Date(d); x.setDate(x.getDate()+n); return x; };
const isSameDate = (a, b) => a && b && a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate();
function getAvailableSlots(providerId, date) {
  const av = seedAvailability[providerId] || seedAvailability.default;
  const key = fmtDateKey(date);
  if (av.blackouts.includes(key)) return [];
  const hours = av.hours[date.getDay()] || [];
  const isToday = isSameDate(date, TODAY);
  const nowHHMM = `${String(TODAY.getHours()).padStart(2,'0')}:${String(TODAY.getMinutes()).padStart(2,'0')}`;
  return hours.filter(h => !isToday || h > nowHHMM);
}
function hasAnyAvailability(providerId, date) { return getAvailableSlots(providerId, date).length > 0; }

// Storage helpers
async function uploadToBucket(bucket, file, folder = '') {
  if (!file) return null;
  const ext = (file.name.split('.').pop() || 'bin').toLowerCase();
  const safeName = `${Date.now()}-${Math.random().toString(36).slice(2,8)}.${ext}`;
  const path = folder ? `${folder}/${safeName}` : safeName;
  const { error } = await sb.storage.from(bucket).upload(path, file, { upsert: false, contentType: file.type || undefined });
  if (error) throw error;
  const { data } = sb.storage.from(bucket).getPublicUrl(path);
  return data?.publicUrl || null;
}

// Auth-aware fetch — includes Supabase access token (or admin marker) so backend can identify caller
const apiFetch = async (url, opts = {}) => {
  let auth = {};
  if (isAdminShortcut()) {
    auth = { 'X-Admin-Shortcut': '1' };
  } else {
    try {
      const { data: { session } } = await sb.auth.getSession();
      if (session) auth = { Authorization: `Bearer ${session.access_token}` };
    } catch (e) {}
  }
  const headers = { 'Content-Type':'application/json', ...auth, ...(opts.headers || {}) };
  return fetch(url, { ...opts, headers });
};

function humanTime(iso) {
  const diff = (Date.now() - new Date(iso).getTime()) / 1000;
  if (diff < 60) return 'Just now';
  if (diff < 3600) return `${Math.floor(diff/60)}m`;
  if (diff < 86400) return `${Math.floor(diff/3600)}h`;
  if (diff < 86400*7) return `${Math.floor(diff/86400)}d`;
  return new Date(iso).toLocaleDateString();
}

  const { data: existing } = await sb.from('follows').select('user_id').eq('user_id', userId).eq('provider_id', providerId).maybeSingle();
  if (existing) { await sb.from('follows').delete().eq('user_id', userId).eq('provider_id', providerId); return false; }
  await sb.from('follows').insert({ user_id: userId, provider_id: providerId });
  return true;
}

async function toggleLike(userId, postId) {

  if (existing) {

  return true;
}

async function updateProviderRecord(providerId, updates) {
  const r = {};
  const map = {
    name:'name', specialty:'specialty', bio:'bio', city:'city',
    priceFrom:'price_from', cat:'cat', cover:'cover',
    avatarUrl:'avatar_url', idUrl:'id_url',
    services:'services', status:'status',
  };
  for (const [k, col] of Object.entries(map)) if (k in updates) r[col] = updates[k];
  if (updates.status === 'approved') r.verified = true;
  const { data, error } = await sb.from('providers').update(r).eq('id', providerId).select().single();
  if (error) throw error;
  return mapProvider(data);
}

const _toastListeners = new Set();
const showToast = (text, kind = 'info') => _toastListeners.forEach(fn => fn({ id: Date.now() + Math.random(), text, kind }));
const ToastHost = () => {
  const [toasts, setToasts] = useState([]);
  useEffect(() => {
    const on = toast => {
      setToasts(p => [...p, toast]);
      setTimeout(() => setToasts(p => p.filter(t => t.id !== toast.id)), 2800);
    };
    _toastListeners.add(on);
    return () => _toastListeners.delete(on);
  }, []);
  if (!toasts.length) return null;
  return (
    <div className="fixed top-20 right-6 z-[100] flex flex-col gap-2 pointer-events-none" style={{ minWidth: 280, maxWidth: 360 }}>
      {toasts.map(t => {
        const p = t.kind === 'success' ? { bg: T.success, fg: '#fff' } : t.kind === 'error' ? { bg: T.danger, fg: '#fff' } : { bg: T.ink900, fg: '#fff' };
        return (
          <div key={t.id} className="rounded-xl px-4 py-3 text-sm font-medium flex items-center gap-2 shadow-lg pointer-events-auto" style={{ background: p.bg, color: p.fg, animation: 'toastIn 0.28s cubic-bezier(0.34, 1.56, 0.64, 1)' }}>
            {t.kind === 'success' && <Check size={14} />}
            {t.kind === 'error' && <AlertCircle size={14} />}
            <span>{t.text}</span>
          </div>
        );
      })}
    </div>
  );
};

const RealCalendar = ({ providerId, selectedDate, onSelect }) => {
  const [offset, setOffset] = useState(0);
  const viewMonth = new Date(TODAY.getFullYear(), TODAY.getMonth() + offset, 1);
  const daysInMonth = new Date(viewMonth.getFullYear(), viewMonth.getMonth() + 1, 0).getDate();
  const firstDayOfWeek = viewMonth.getDay();
  const totalCells = Math.ceil((firstDayOfWeek + daysInMonth) / 7) * 7;
  const windowEnd = addDays(TODAY, 60);
  return (
    <div className="rounded-xl p-4" style={{ background: T.bgSurface, border: `1px solid ${T.border}` }}>
      <div className="flex items-center justify-between mb-3">
        <span className="text-sm font-semibold" style={{ color: T.ink900 }}>{MONTH_NAMES[viewMonth.getMonth()]} {viewMonth.getFullYear()}</span>
        <div className="flex gap-1">
          <button onClick={() => offset > 0 && setOffset(offset - 1)} disabled={offset === 0} className="w-7 h-7 rounded flex items-center justify-center disabled:opacity-30 hover:bg-gray-100"><ArrowLeft size={12}/></button>
          <button onClick={() => setOffset(offset + 1)} disabled={addDays(viewMonth, 32) > windowEnd} className="w-7 h-7 rounded flex items-center justify-center disabled:opacity-30 hover:bg-gray-100"><ArrowRight size={12}/></button>
        </div>
      </div>
      <div className="grid grid-cols-7 gap-1 mb-1">
        {DAY_INITIALS.map((d, i) => <div key={i} className="text-center text-[10px] font-medium py-1" style={{ color: T.ink500 }}>{d}</div>)}
      </div>
      <div className="grid grid-cols-7 gap-1">
        {[...Array(totalCells)].map((_, i) => {
          const dnum = i - firstDayOfWeek + 1;
          if (dnum < 1 || dnum > daysInMonth) return <div key={i}/>;
          const date = new Date(viewMonth.getFullYear(), viewMonth.getMonth(), dnum);
          const isPast = date < TODAY && !isSameDate(date, TODAY);
          const available = !isPast && date <= windowEnd && hasAnyAvailability(providerId, date);
          const selected = isSameDate(selectedDate, date);
          const isToday = isSameDate(date, TODAY);
          return (
            <button key={i} disabled={!available} onClick={() => onSelect(date)}
              className="aspect-square rounded-md text-xs font-medium relative transition-colors"
              style={{ background: selected ? T.primary : isToday ? T.primary100 : 'transparent', color: selected ? '#fff' : !available ? T.ink300 : T.ink900 }}>
              {dnum}
              {available && !selected && <div className="absolute bottom-0.5 left-1/2 -translate-x-1/2 w-1 h-1 rounded-full" style={{ background: T.primary }}/>}
            </button>
          );
        })}
      </div>
    </div>
  );
};

const LoginPage = ({ onNavigate, onAuth }) => {
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [submitting, setSubmitting] = useState(false);
  const [error, setError] = useState('');

  const submit = async (e) => {
    e?.preventDefault();
    if (!email.trim() || !password) return;
    setError(''); setSubmitting(true);

    // === Admin shortcut (bypasses Supabase) ===
    if (email.trim() === '1234' && password === '1234') {
      setAdminShortcut(true);
      onAuth({ id:'admin-shortcut', email:'admin@tobayt.qa', name:'Admin', role:'admin', providerId:null });
      return;
    }

    try {
      const { data, error } = await sb.auth.signInWithPassword({ email: email.trim(), password });
      if (error) throw error;
      if (!data.session) throw new Error('Login failed — please confirm your email first.');
      const u = userFromSession(data.session);
      onAuth(u);
    } catch (err) {
      setError(err.message || 'Login failed');
      setSubmitting(false);
    }
  };

  return (
    <div className="min-h-screen flex items-center justify-center px-4 py-16" style={{ background: `radial-gradient(at 20% 30%, ${T.primary100} 0%, transparent 50%), radial-gradient(at 80% 70%, ${T.accent100} 0%, transparent 50%), ${T.bgBase}` }}>

        <h1 className="text-2xl font-semibold text-center mb-2" style={{ fontFamily:'Fraunces,serif', color:T.ink900 }}>Welcome back</h1>
        <p className="text-sm text-center mb-6" style={{ color:T.ink500 }}>Log in to book, message, and track sessions.</p>
        <form onSubmit={submit} className="flex flex-col gap-4">
          <div>
            <label className="text-xs font-medium uppercase tracking-wider mb-1 block" style={{ color:T.ink500 }}>Email</label>
            <div className="relative">
              <Mail size={15} className="absolute left-3 top-1/2 -translate-y-1/2" style={{ color:T.ink500 }}/>
              <input value={email} onChange={e => setEmail(e.target.value)} type="text" autoComplete="username" placeholder="you@example.com" className="w-full pl-9 py-2.5 pr-3.5 rounded-lg text-sm outline-none" style={{ background:T.bgMuted, border:`1px solid ${T.border}`, color:T.ink900 }}/>
            </div>
          </div>
          <div>
            <label className="text-xs font-medium uppercase tracking-wider mb-1 block" style={{ color:T.ink500 }}>Password</label>
            <div className="relative">
              <Lock size={15} className="absolute left-3 top-1/2 -translate-y-1/2" style={{ color:T.ink500 }}/>
              <input value={password} onChange={e => setPassword(e.target.value)} type="password" autoComplete="current-password" placeholder="••••" className="w-full pl-9 py-2.5 pr-3.5 rounded-lg text-sm outline-none" style={{ background:T.bgMuted, border:`1px solid ${T.border}`, color:T.ink900 }}/>
            </div>
          </div>
          {error && <div className="rounded-lg p-3 text-xs flex items-start gap-2" style={{ background:'#FBE2E6', color:'#8B2A38' }}><AlertCircle size={13} style={{ marginTop:1, flexShrink:0 }}/><span>{error}</span></div>}

};

const ClientSignupForm = ({ onAuth, onNavigate, onBack }) => {
  const [name, setName] = useState('');
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [submitting, setSubmitting] = useState(false);
  const [error, setError] = useState('');
  const valid = name.trim().length >= 2 && email.trim().includes('@') && password.length >= 4;

  const submit = async (e) => {
    e.preventDefault();
    if (!valid) return;
    setError(''); setSubmitting(true);
    try {
      const { data, error } = await sb.auth.signUp({
        email: email.trim(),
        password,
        options: { data: { name: name.trim(), role: 'client' } }
      });
      if (error) throw error;
      if (!data.session) {
        setError('Account created — check your email to confirm, then log in.');
        setSubmitting(false);
        return;
      }
      onAuth(userFromSession(data.session));
    } catch (err) { setError(err.message); setSubmitting(false); }
  };

  return (
    <div className="min-h-screen flex items-center justify-center px-4 py-16" style={{ background: `radial-gradient(at 20% 30%, ${T.primary100} 0%, transparent 50%), radial-gradient(at 80% 70%, ${T.accent100} 0%, transparent 50%), ${T.bgBase}` }}>
      <div className="w-full max-w-md rounded-2xl p-8 shadow-lg" style={{ background:T.bgSurface, border:`1px solid ${T.border}` }}>
        <button onClick={onBack} className="flex items-center gap-1.5 text-xs mb-4" style={{ color:T.ink500 }}><ArrowLeft size={13}/> Choose role</button>
        <div className="flex justify-center mb-4"><Logo size={26}/></div>
        <h1 className="text-2xl font-semibold text-center mb-1" style={{ fontFamily:'Fraunces,serif', color:T.ink900 }}>Create a client account</h1>
        <p className="text-sm text-center mb-6" style={{ color:T.ink500 }}>Takes 30 seconds.</p>
        <form onSubmit={submit} className="flex flex-col gap-4">
          {[
            {label:'Full name',val:name,set:setName,placeholder:'Sara Al-Mansouri',type:'text'},
            {label:'Email',val:email,set:setEmail,placeholder:'sara@example.com',type:'email'},
            {label:'Password (min 4 chars)',val:password,set:setPassword,placeholder:'••••',type:'password'},
          ].map(f => (
            <div key={f.label}>
              <label className="text-xs font-medium uppercase tracking-wider mb-1 block" style={{ color:T.ink500 }}>{f.label}</label>
              <input value={f.val} onChange={e => f.set(e.target.value)} type={f.type} placeholder={f.placeholder} className="w-full py-2.5 px-3.5 rounded-lg text-sm outline-none" style={{ background:T.bgMuted, border:`1px solid ${T.border}`, color:T.ink900 }}/>
            </div>
          ))}
          {error && <div className="rounded-lg p-3 text-xs flex items-start gap-2" style={{ background:'#FBE2E6', color:'#8B2A38' }}><AlertCircle size={13} style={{ marginTop:1, flexShrink:0 }}/><span>{error}</span></div>}
          <Btn size="lg" type="submit" className="w-full" disabled={submitting || !valid}>{submitting ? 'Creating account…' : 'Create account'}</Btn>
        </form>
        <div className="mt-5 text-center text-sm" style={{ color:T.ink500 }}>
          Already have an account? <button onClick={() => onNavigate('login')} className="font-medium" style={{ color:T.primary }}>Log in</button>
        </div>
      </div>
    </div>
  );
};

const ProviderSignupForm = ({ onAuth, onNavigate, onBack }) => {
  const [step, setStep] = useState(0);
  const [name, setName] = useState('');
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [cat, setCat] = useState('');
  const [specialty, setSpecialty] = useState('');
  const [bio, setBio] = useState('');
  const [avatarFile, setAvatarFile] = useState(null);
  const [avatarPreview, setAvatarPreview] = useState(null);
  const [services, setServices] = useState([
    { id:`s-${Math.random().toString(36).slice(2,8)}`, title:'', duration:60, price:'', locType:'both' }
  ]);
  const [residency, setResidency] = useState('');
  const [idFile, setIdFile] = useState(null);
  const [agreed, setAgreed] = useState(false);
  const [submitting, setSubmitting] = useState(false);
  const [error, setError] = useState('');

  const addServiceRow = () => setServices(s => [...s, { id:`s-${Math.random().toString(36).slice(2,8)}`, title:'', duration:60, price:'', locType:'both' }]);
  const updateServiceRow = (id, field, val) => setServices(s => s.map(x => x.id === id ? { ...x, [field]: val } : x));
  const removeServiceRow = (id) => setServices(s => s.length > 1 ? s.filter(x => x.id !== id) : s);
  const validServices = services.filter(s => s.title.trim().length >= 3 && Number(s.price) > 0);
  const priceFrom = validServices.length ? Math.min(...validServices.map(s => Number(s.price))) : 0;

  const handleAvatar = (file) => {
    setAvatarFile(file);
    if (file) {
      const reader = new FileReader();
      reader.onload = () => setAvatarPreview(reader.result);
      reader.readAsDataURL(file);
    } else { setAvatarPreview(null); }
  };

  const cats = [{id:'cooking',label:'🍽️ Private Chef / Cooking'},{id:'fitness',label:'💪 Fitness & Personal Training'},{id:'wellness',label:'🥗 Nutrition & Wellness'},{id:'languages',label:'🗣️ Languages & Tutoring'},{id:'beauty',label:'✨ Beauty & Skincare'},{id:'tutoring',label:'📚 Academic Tutoring'}];

  const stepLabels = ['Account','Category','Profile','Services','Compliance','Submit'];
  const canNext = [
    name.trim().length >= 2 && email.trim().includes('@') && password.length >= 4,
    !!cat,
    specialty.trim().length >= 2 && bio.trim().length >= 20,
    validServices.length >= 1,
    !!residency,
    agreed,
  ];

  const submit = async () => {
    if (!canNext.every(Boolean)) return;
    setError(''); setSubmitting(true);
    try {
      const tones = {cooking:'warm-orange',fitness:'deep-teal',wellness:'soft-saffron',languages:'soft-saffron',beauty:'blush',tutoring:'deep-teal'};

      // 1. Create Supabase auth user
      const { data, error } = await sb.auth.signUp({
        email: email.trim(),
        password,
        options: { data: { name: name.trim(), role: 'provider' } }
      });
      if (error) throw error;
      if (!data.user?.id) throw new Error('Signup failed — no user returned');
      const userId = data.user.id;
      const hasSession = !!data.session;

      // 2. Upload avatar (requires auth session for storage policies)
      let avatarUrl = null;
      if (avatarFile && hasSession) {
        try { avatarUrl = await uploadToBucket('provider-avatars', avatarFile, userId); }
        catch (e) { console.warn('Avatar upload failed:', e.message); }
      }

      // 3. Upload ID doc (requires auth session)
      let idUrl = null;
      if (idFile && hasSession) {
        try { idUrl = await uploadToBucket('id-verification', idFile, userId); }
        catch (e) { console.warn('ID upload failed:', e.message); }
      }

      // 4. Stash providerId + avatarUrl in user_metadata (only possible with session)
      if (hasSession) {
        try { await sb.auth.updateUser({ data: { providerId: userId, avatarUrl } }); } catch (e) {}
      }

      // 5. ALWAYS create provider record in Supabase so admin sees the pending application,
      //    even if email confirmation is on and the user has no session yet.
      try {
        const cleanedServices = validServices.map(s => ({
          id: s.id, title: s.title.trim(), duration: Number(s.duration) || 60, price: Number(s.price), locType: s.locType || 'both',
        }));
        await upsertProviderRecord({
          userId, email: email.trim(),
          name: name.trim(),
          specialty: specialty.trim(),
          bio: bio.trim(),
          cat,
          priceFrom: priceFrom,
          residency,
          cover: tones[cat] || 'warm-orange',
          avatarUrl, idUrl,
          services: cleanedServices,
          status: 'pending',
        });
      } catch (e) {
        console.warn('Failed to create provider record:', e);
        setError(`Couldn't save provider profile: ${e.message}. Check that the Supabase 'providers' table exists.`);
        setSubmitting(false);
        return;
      }

      if (!hasSession) {
        setError('Application submitted! Check your email to confirm, then log in.');
        setSubmitting(false);
        return;
      }

      // 6. Logged in — return user
      const u = userFromSession(data.session);
      onAuth({ ...u, providerId: userId, avatarUrl });
    } catch (err) { setError(err.message); setSubmitting(false); }
  };

  return (
    <div className="min-h-screen flex items-center justify-center px-4 py-16" style={{ background: `radial-gradient(at 20% 30%, ${T.primary100} 0%, transparent 50%), radial-gradient(at 80% 70%, ${T.accent100} 0%, transparent 50%), ${T.bgBase}` }}>
      <div className="w-full max-w-lg rounded-2xl p-8 shadow-lg" style={{ background:T.bgSurface, border:`1px solid ${T.border}` }}>
        <button onClick={onBack} className="flex items-center gap-1.5 text-xs mb-4" style={{ color:T.ink500 }}><ArrowLeft size={13}/> Choose role</button>
        <div className="flex justify-center mb-4"><Logo size={26}/></div>
        <h1 className="text-xl font-semibold text-center mb-1" style={{ fontFamily:'Fraunces,serif', color:T.ink900 }}>Become a provider</h1>
        <p className="text-sm text-center mb-5" style={{ color:T.ink500 }}>Applications are reviewed within 48h.</p>

        <div className="flex items-center gap-1.5 mb-6">
          {stepLabels.map((label, i) => (
            <div key={i} className="flex-1">
              <div className="h-1 rounded-full mb-1.5" style={{ background: i <= step ? T.accent : T.border }}/>
              <div className="text-[9px] uppercase tracking-wider font-medium" style={{ color: i === step ? T.accent600 : T.ink500 }}>{label}</div>
            </div>
          ))}
        </div>

        {step === 0 && (
          <div className="flex flex-col gap-4">
            {[{label:'Full name',val:name,set:setName,placeholder:'Khalid Al-Thani',type:'text'},{label:'Email',val:email,set:setEmail,placeholder:'khalid@example.com',type:'email'},{label:'Password (min 4 chars)',val:password,set:setPassword,placeholder:'••••',type:'password'}].map(f => (
              <div key={f.label}><label className="text-xs font-medium uppercase tracking-wider mb-1 block" style={{ color:T.ink500 }}>{f.label}</label><input value={f.val} onChange={e => f.set(e.target.value)} type={f.type} placeholder={f.placeholder} className="w-full py-2.5 px-3.5 rounded-lg text-sm outline-none" style={{ background:T.bgMuted, border:`1px solid ${T.border}`, color:T.ink900 }}/></div>
            ))}
          </div>
        )}
        {step === 1 && (
          <div className="flex flex-col gap-2">
            <p className="text-sm mb-2" style={{ color:T.ink500 }}>What type of services will you offer?</p>
            {cats.map(c => (
              <button key={c.id} onClick={() => setCat(c.id)} className="text-left rounded-xl p-3.5 text-sm font-medium flex items-center justify-between" style={{ background:T.bgSurface, border:`2px solid ${cat===c.id ? T.accent : T.border}`, color: cat===c.id ? T.ink900 : T.ink700 }}>{c.label}{cat===c.id && <Check size={15} style={{ color:T.accent600 }}/>}</button>
            ))}
          </div>
        )}
        {step === 2 && (
          <div className="flex flex-col gap-4">
            <div>
              <label className="text-xs font-medium uppercase tracking-wider mb-1 block" style={{ color:T.ink500 }}>Profile photo (optional)</label>
              <div className="flex items-center gap-3">
                {avatarPreview ? (
                  <img src={avatarPreview} alt="" className="w-16 h-16 rounded-full object-cover" style={{ border:`1px solid ${T.border}` }}/>
                ) : (
                  <div className="w-16 h-16 rounded-full flex items-center justify-center" style={{ background:T.bgMuted, border:`1px dashed ${T.border}`, color:T.ink500 }}><Camera size={20}/></div>
                )}
                <label className="cursor-pointer text-xs font-medium px-3 py-2 rounded-lg" style={{ background:T.primary100, color:T.primary }}>
                  {avatarFile ? 'Change photo' : 'Upload photo'}
                  <input type="file" accept="image/*" className="hidden" onChange={e => handleAvatar(e.target.files?.[0] || null)}/>
                </label>
                {avatarFile && <button onClick={() => handleAvatar(null)} className="text-xs" style={{ color:T.danger }}>Remove</button>}
              </div>
            </div>
            <div><label className="text-xs font-medium uppercase tracking-wider mb-1 block" style={{ color:T.ink500 }}>Specialty headline</label><input value={specialty} onChange={e => setSpecialty(e.target.value)} placeholder="e.g. Mediterranean Private Chef" className="w-full py-2.5 px-3.5 rounded-lg text-sm outline-none" style={{ background:T.bgMuted, border:`1px solid ${T.border}`, color:T.ink900 }}/></div>
            <div>
              <label className="text-xs font-medium uppercase tracking-wider mb-1 block" style={{ color:T.ink500 }}>Bio (min 20 chars)</label>
              <textarea value={bio} onChange={e => setBio(e.target.value)} rows={4} placeholder="Tell clients about your background, experience, and what makes your sessions special..." className="w-full py-2.5 px-3.5 rounded-lg text-sm outline-none resize-none" style={{ background:T.bgMuted, border:`1px solid ${T.border}`, color:T.ink900 }}/>
              <div className="text-[10px] mt-1 text-right" style={{ color: bio.length<20 ? T.danger : T.ink500 }}>{bio.length} / 20 min</div>
            </div>
          </div>
        )}
        {step === 3 && (
          <div className="flex flex-col gap-3">
            <p className="text-sm" style={{ color:T.ink500 }}>List the services you offer. Add as many as you want — clients pick one when they book.</p>
            {services.map((s, idx) => (
              <div key={s.id} className="rounded-xl p-3 flex flex-col gap-2" style={{ background:T.bgMuted, border:`1px solid ${T.border}` }}>
                <div className="flex items-start gap-2">
                  <input value={s.title} onChange={e => updateServiceRow(s.id, 'title', e.target.value)} placeholder="Service name (e.g. 1-on-1 Strength Session)" className="flex-1 py-2 px-3 rounded-lg text-sm outline-none font-semibold" style={{ background:T.bgSurface, border:`1px solid ${T.border}`, color:T.ink900 }}/>
                  {services.length > 1 && <button type="button" onClick={() => removeServiceRow(s.id)} className="w-9 h-9 rounded-lg flex items-center justify-center" style={{ color:T.danger, background:T.bgSurface }}><X size={15}/></button>}
                </div>
                <div className="grid grid-cols-3 gap-2">
                  <div>
                    <label className="text-[10px] uppercase font-medium block mb-0.5" style={{ color:T.ink500 }}>Duration (min)</label>
                    <input value={s.duration} onChange={e => updateServiceRow(s.id, 'duration', e.target.value.replace(/\D/g,''))} className="w-full py-1.5 px-2 rounded text-sm outline-none font-mono" style={{ background:T.bgSurface, border:`1px solid ${T.border}`, color:T.ink900 }}/>
                  </div>
                  <div>
                    <label className="text-[10px] uppercase font-medium block mb-0.5" style={{ color:T.ink500 }}>Price (QAR)</label>
                    <input value={s.price} onChange={e => updateServiceRow(s.id, 'price', e.target.value.replace(/\D/g,''))} placeholder="200" className="w-full py-1.5 px-2 rounded text-sm outline-none font-mono" style={{ background:T.bgSurface, border:`1px solid ${T.border}`, color:T.ink900 }}/>
                  </div>
                  <div>
                    <label className="text-[10px] uppercase font-medium block mb-0.5" style={{ color:T.ink500 }}>Where</label>
                    <select value={s.locType} onChange={e => updateServiceRow(s.id, 'locType', e.target.value)} className="w-full py-1.5 px-2 rounded text-sm outline-none" style={{ background:T.bgSurface, border:`1px solid ${T.border}`, color:T.ink900 }}>
                      <option value="client_home">Client's place</option>
                      <option value="provider_location">My location</option>
                      <option value="both">Flexible</option>
                    </select>
                  </div>
                </div>
              </div>
            ))}
            <button type="button" onClick={addServiceRow} className="rounded-xl py-3 text-sm font-medium flex items-center justify-center gap-2" style={{ background:T.bgSurface, border:`2px dashed ${T.border}`, color:T.primary }}>
              <Plus size={15}/> Add another service
            </button>
            {priceFrom > 0 && (
              <div className="rounded-xl p-4" style={{ background:T.primary100 }}>
                <div className="text-sm font-medium mb-1" style={{ color:T.ink900 }}>{validServices.length} valid service{validServices.length === 1 ? '' : 's'} · starts from QAR {priceFrom}</div>
                <div className="text-xs" style={{ color:T.ink700 }}>toBayt takes a 12% fee — you keep 88% of every booking.</div>
              </div>
            )}
          </div>
        )}
        {step === 4 && (
          <div className="flex flex-col gap-3">
            <p className="text-sm" style={{ color:T.ink500 }}>Qatar law requires independent contractors to hold proper documentation.</p>
            <div><label className="text-xs font-medium uppercase tracking-wider mb-2 block" style={{ color:T.ink500 }}>Residency status</label>
              <div className="flex flex-col gap-1.5">
                {['Qatari citizen','Resident (self-sponsored / CR holder)','Resident (sponsored — NOC required)','GCC national'].map(r => (
                  <button key={r} onClick={() => setResidency(r)} className="text-left rounded-xl p-3 text-sm flex items-center justify-between" style={{ background:T.bgSurface, border:`2px solid ${residency===r ? T.primary : T.border}`, color:residency===r ? T.ink900 : T.ink700 }}>{r}{residency===r && <Check size={14} style={{ color:T.primary }}/>}</button>
                ))}
              </div>
            </div>
            <div>
              <label className="text-xs font-medium uppercase tracking-wider mb-1 block" style={{ color:T.ink500 }}>Qatari ID / CR document (optional, for verification)</label>
              <label className="cursor-pointer flex items-center gap-3 p-3 rounded-xl" style={{ background:T.bgMuted, border:`1px dashed ${T.border}` }}>
                <FileText size={18} style={{ color:T.ink500 }}/>
                <div className="flex-1">
                  <div className="text-sm font-medium" style={{ color:T.ink900 }}>{idFile ? idFile.name : 'Upload ID or CR'}</div>
                  <div className="text-[10px]" style={{ color:T.ink500 }}>PDF, JPG, or PNG · stored securely</div>
                </div>
                {idFile && <button type="button" onClick={(e) => { e.preventDefault(); setIdFile(null); }} className="text-xs" style={{ color:T.danger }}>Remove</button>}
                <input type="file" accept="image/*,application/pdf" className="hidden" onChange={e => setIdFile(e.target.files?.[0] || null)}/>
              </label>
            </div>
            <div className="rounded-xl p-3" style={{ background:'#FBE2E6' }}><p className="text-xs" style={{ color:'#8B2A38' }}>Sponsored residents must hold a valid NOC. Applications without proper documentation will not be approved.</p></div>
          </div>
        )}
        {step === 5 && (
          <div className="flex flex-col gap-4">
            <div className="rounded-2xl p-5" style={{ background:T.bgMuted }}>
              {[['Account',`${name} · ${email}`],['Category',cats.find(c=>c.id===cat)?.label||cat],['Specialty',specialty],['Services',`${validServices.length} listed · from QAR ${priceFrom}`],['Residency',residency]].map(([k,v]) => (<div key={k} className="flex justify-between text-sm py-1.5"><span style={{ color:T.ink500 }}>{k}</span><span style={{ color:T.ink900, fontWeight:600, textAlign:'right' }}>{v}</span></div>))}
            </div>
            <label className="flex items-start gap-3 cursor-pointer"><input type="checkbox" checked={agreed} onChange={e => setAgreed(e.target.checked)} className="mt-0.5"/><span className="text-sm" style={{ color:T.ink700 }}>I confirm all information is accurate, I agree to the <strong style={{ color:T.primary }}>Provider Terms</strong>, and I understand my account is pending admin approval before it becomes bookable.</span></label>
            {error && <div className="rounded-lg p-3 text-xs flex items-start gap-2" style={{ background:'#FBE2E6', color:'#8B2A38' }}><AlertCircle size={13} style={{ marginTop:1, flexShrink:0 }}/><span>{error}</span></div>}
          </div>
        )}

        <div className="mt-6 flex gap-3">
          <Btn variant="outline" onClick={step===0 ? onBack : () => setStep(step-1)} disabled={submitting}>{step===0 ? 'Back' : 'Previous'}</Btn>
          <Btn className="flex-1" disabled={!canNext[step] || submitting} onClick={step===5 ? submit : () => setStep(step+1)} trailingIcon={step===5 ? Check : ArrowRight}>
            {step===5 ? (submitting ? 'Submitting…' : 'Submit application') : 'Continue'}
          </Btn>
        </div>
        <div className="mt-5 text-center text-sm" style={{ color:T.ink500 }}>
          Already have an account? <button onClick={() => onNavigate('login')} className="font-medium" style={{ color:T.primary }}>Log in</button>
        </div>
      </div>
    </div>
  );
};

const BookingModal = ({ provider, initialServiceId, onClose, onComplete, takenSlots = [], userBookings = [] }) => {
  const [step, setStep] = useState(0);
  const [serviceId, setServiceId] = useState(initialServiceId || provider?.services?.[0]?.id);
  const [isCustom, setIsCustom] = useState(false);
  const [customTitle, setCustomTitle] = useState('');
  const [customDesc, setCustomDesc] = useState('');
  const [customPrice, setCustomPrice] = useState('');
  const [customDuration, setCustomDuration] = useState('60');
  const [locType, setLocType] = useState('client_home');
  const [selectedDate, setSelectedDate] = useState(null);
  const [slot, setSlot] = useState(null);
  const [selectedAddOns, setSelectedAddOns] = useState([]);
  const [intakeAnswers, setIntakeAnswers] = useState({});
  const [clientNotes, setClientNotes] = useState('');
  if (!provider) return null;
  const customValid = customTitle.trim().length >= 3 && customDesc.trim().length >= 10 && customPrice && Number(customPrice) > 0;
  const rawService = isCustom
    ? { id:'custom', title: customTitle.trim() || 'Custom request', duration: Number(customDuration) || 60, price: Number(customPrice) || 0, description: customDesc.trim(), isCustom: true, locType:'both' }
    : provider.services?.find(s => s.id === serviceId);
  const service = rawService ? normalizeService(rawService) : null;

  // ----- Pricing (#10) -----
  const priorCount = service ? userBookings.filter(b => b.providerId === provider.id && b.serviceId === service.id && ['completed','confirmed','approved'].includes(b.status)).length : 0;
  const isWeekend = selectedDate ? [5,6].includes(selectedDate.getDay()) : false;
  let effectivePrice = service?.price || 0;
  let pricingNote = null;
  if (service?.introPrice && priorCount < (service.introCount || 0)) {
    effectivePrice = service.introPrice;
    pricingNote = `Intro rate (session ${priorCount+1} of ${service.introCount})`;
  } else if (service?.weekendPrice && isWeekend) {
    effectivePrice = service.weekendPrice;
    pricingNote = 'Weekend rate (Fri/Sat)';
  } else if (service?.freeConsultation && priorCount === 0) {
    effectivePrice = 0;
    pricingNote = 'Free initial consultation';
  }
  const addOnTotal = (service?.addOns || []).filter(a => selectedAddOns.includes(a.id)).reduce((s, a) => s + Number(a.price || 0), 0);
  const subtotal = effectivePrice + addOnTotal;
  const serviceFee = locType === 'online' ? 0 : 12;
  const total = subtotal + serviceFee;
  const depositAmount = service?.depositPercent ? Math.round(total * service.depositPercent / 100) : 0;

  // ----- Slot / calendar (#1, #3, #5, #6) -----
  const dayKey = selectedDate ? fmtDateKey(selectedDate) : null;
  let baseSlotsForDay = [];
  if (selectedDate && service) {
    // Custom hours override provider default
    if (service.customHours) {
      baseSlotsForDay = (service.customHours[selectedDate.getDay()] || []).slice();
    } else {
      baseSlotsForDay = getAvailableSlots(provider.id, selectedDate);
    }
    // Min advance hours
    if (service.minAdvanceHours > 0) {
      const cutoff = new Date(Date.now() + service.minAdvanceHours * 3600 * 1000);
      baseSlotsForDay = baseSlotsForDay.filter(t => {
        const [h,m] = t.split(':').map(Number);
        const slotDt = new Date(selectedDate); slotDt.setHours(h, m, 0, 0);
        return slotDt > cutoff;
      });
    }
  }
  // Slot filter: same-service group capacity check
  const slotsForDay = baseSlotsForDay.filter(t => {
    const conflicts = takenSlots.filter(ts => ts.slot === `${dayKey}T${t}`);
    if (conflicts.length === 0) return true;
    if (!service) return false;
    // All conflicts must be the same service AND under capacity for group bookings
    const sameSvc = conflicts.every(c => c.serviceId === service.id);
    if (sameSvc && service.groupCapacity > 1 && conflicts.length < service.groupCapacity) return true;
    return false;
  });
  // Max advance days — disable dates outside window
  const maxAdvanceDate = service ? addDays(TODAY, service.maxAdvanceDays || 60) : addDays(TODAY, 60);

  // ----- Step plumbing — dynamic step count based on add-ons / intake -----
  const hasAddOns = (service?.addOns || []).length > 0;
  const hasIntake = (service?.intakeQuestions || []).length > 0;
  const dynamicSteps = ['Service', service?.allowOnline || locType ? 'Location' : null, 'Time', hasAddOns ? 'Add-ons' : null, hasIntake ? 'Intake' : null, 'Review'].filter(Boolean);
  const stepLabels = dynamicSteps;
  const currentLabel = stepLabels[step];
  const intakeValid = !hasIntake || (service?.intakeQuestions || []).every(q => !q.required || (intakeAnswers[q.id] || '').toString().trim().length > 0);
  const canContinue = currentLabel === 'Service' ? (isCustom ? customValid : !!serviceId)
    : currentLabel === 'Location' ? !!locType
    : currentLabel === 'Time' ? (selectedDate && slot)
    : currentLabel === 'Add-ons' ? true
    : currentLabel === 'Intake' ? intakeValid
    : true;

  const next = () => {
    if (currentLabel === 'Review') {
      onComplete({
        service: { ...service, price: effectivePrice }, // pass effective price
        locType, date: selectedDate, slot, isCustom,
        selectedAddOns: (service?.addOns || []).filter(a => selectedAddOns.includes(a.id)),
        intakeAnswers, clientNotes,
        depositAmount,
        total,
        isOnline: locType === 'online',
      });
    } else {
      setStep(step + 1);
    }
  };
  const prev = () => step > 0 ? setStep(step-1) : onClose();
  return (
    <Modal open onClose={onClose} maxWidth={600}>
      <div className="p-6">
        <div className="flex items-center gap-2 mb-6">
          {stepLabels.map((label, i) => (
            <div key={i} className="flex-1">
              <div className="h-1 rounded-full mb-1.5" style={{ background: i <= step ? T.primary : T.border }}/>
              <div className="text-[10px] uppercase tracking-wider font-medium" style={{ color: i === step ? T.primary : T.ink500 }}>{label}</div>
            </div>
          ))}
        </div>
        <div className="flex items-center gap-3 mb-5 p-3 rounded-xl" style={{ background: T.bgMuted }}>
          <div className="w-10 h-10 rounded-full flex items-center justify-center text-white font-semibold" style={{ background: T.primary, fontFamily:'Fraunces,serif' }}>{provider.name[0]}</div>
          <div><div className="text-sm font-semibold" style={{ color: T.ink900 }}>{provider.name}</div><div className="text-xs" style={{ color: T.ink500 }}>{provider.specialty}</div></div>
        </div>

        {currentLabel === 'Service' && (
          <div>
            <h3 className="text-lg font-semibold mb-4" style={{ fontFamily:'Fraunces,serif', color:T.ink900 }}>Choose a service</h3>
            <div className="flex flex-col gap-2">
              {provider.services?.map(rs => {
                const n = normalizeService(rs);
                const selected = !isCustom && serviceId === n.id;
                return (
                  <button key={n.id} onClick={() => { setIsCustom(false); setServiceId(n.id); }} className="text-left rounded-xl p-4" style={{ background:T.bgSurface, border:`2px solid ${selected ? T.primary : T.border}` }}>
                    <div className="flex items-start gap-3">
                      {n.thumbnailUrl ? <img src={n.thumbnailUrl} alt="" className="w-14 h-14 rounded-lg object-cover flex-shrink-0" style={{ border:`1px solid ${T.border}` }}/> : null}
                      <div className="flex-1 min-w-0">
                        <div className="text-sm font-semibold" style={{ color:T.ink900 }}>{n.title}</div>
                        {n.description && <div className="text-xs mt-0.5 line-clamp-2" style={{ color:T.ink700 }}>{n.description}</div>}
                        <div className="text-xs mt-1 flex flex-wrap items-center gap-1.5" style={{ color:T.ink500 }}>
                          <span>{n.duration} min</span>
                          <span>·</span>
                          <span>{n.locType === 'client_home' ? "At your place" : n.locType === 'both' ? 'Flexible' : 'At studio'}</span>
                          {n.groupCapacity > 1 && <><span>·</span><Pill bg={T.accent100} color={T.accent600}>Group up to {n.groupCapacity}</Pill></>}
                          {n.allowOnline && <><span>·</span><Pill bg={T.primary100} color={T.primary}>Online OK</Pill></>}
                          {n.skillLevel !== 'any' && <Pill bg={T.bgMuted} color={T.ink700}>{n.skillLevel}</Pill>}
                          {n.languages.length > 0 && <Pill bg={T.bgMuted} color={T.ink700}>{n.languages.join('/')}</Pill>}
                          {n.freeConsultation && <Pill bg={T.success} color="#fff">Free 1st session</Pill>}
                        </div>
                      </div>
                      <div className="text-right flex-shrink-0">
                        <div className="text-base font-semibold" style={{ color:T.ink900 }}>QAR {n.price}</div>
                        {n.introPrice && <div className="text-[10px]" style={{ color:T.accent600 }}>Intro QAR {n.introPrice}</div>}
                        {n.weekendPrice && <div className="text-[10px]" style={{ color:T.ink500 }}>Weekend QAR {n.weekendPrice}</div>}
                      </div>
                    </div>
                  </button>
                );
              })}
              <button onClick={() => setIsCustom(true)} className="text-left rounded-xl p-4 flex items-center gap-3" style={{ background: isCustom ? T.bgSurface : 'transparent', border:`2px ${isCustom ? 'solid' : 'dashed'} ${isCustom ? T.accent : T.border}` }}>
                <div className="w-9 h-9 rounded-lg flex items-center justify-center" style={{ background: isCustom ? T.accent100 : T.bgMuted }}>
                  <Sparkles size={16} style={{ color: isCustom ? T.accent600 : T.ink500 }}/>
                </div>
                <div><div className="text-sm font-semibold" style={{ color: isCustom ? T.ink900 : T.ink700 }}>Custom request</div><div className="text-xs" style={{ color:T.ink500 }}>Describe what you need and propose a price.</div></div>

              {isCustom && (

const PaymentModal = ({ booking, onClose, onSuccess }) => {
  const [method, setMethod] = useState('naps');
  const [processing, setProcessing] = useState(false);
  if (!booking) return null;
  const total = booking.total || 0;
  const methods = [
    { id:'apple_pay', label:'Apple Pay', sub:'One-tap with Face ID', icon:'⎈', bg:'#000' },
    { id:'naps', label:'NaPS', sub:'Qatar national payment · debit', icon:'ن', bg:'#8B1538', recommended:true },
    { id:'qpay', label:'QPAY', sub:'All Qatari banks', icon:'Q', bg:'#1E40AF' },
    { id:'card', label:'Visa ···· 4521', sub:'Expires 09/28', icon:'VISA', bg:'#1a1f71' },
    { id:'cash', label:'Cash on completion', sub:'No refund protection', icon:'﷼', bg:T.accent600 },
  ];
  const handlePay = () => { setProcessing(true); setTimeout(() => { setProcessing(false); onSuccess(method); }, 900); };
  return (
    <Modal open onClose={onClose} title={`Pay QAR ${total}`} maxWidth={480}>
      <div className="p-6">
        <div className="text-center mb-6">

          <div className="text-sm mt-1" style={{ color:T.ink500 }}>{booking.serviceTitle}</div>
        </div>
        <div className="flex flex-col gap-2 mb-4">
          {methods.map(m => (
            <button key={m.id} onClick={() => setMethod(m.id)} className="rounded-xl p-3 flex items-center gap-3 text-left" style={{ background:T.bgSurface, border:`2px solid ${method===m.id ? T.primary : T.border}` }}>
              <div className="w-12 h-8 rounded flex items-center justify-center text-white text-[10px] font-bold flex-shrink-0" style={{ background: m.bg }}>{m.icon}</div>
              <div className="flex-1">

                </div>
                <div className="text-xs" style={{ color:T.ink500 }}>{m.sub}</div>
              </div>
              {method===m.id ? <div className="w-5 h-5 rounded-full flex items-center justify-center" style={{ background:T.primary }}><Check size={12} color="#fff"/></div> : <div className="w-5 h-5 rounded-full" style={{ border:`1.5px solid ${T.border}` }}/>}
            </button>

        <Btn size="lg" className="w-full" onClick={handlePay} disabled={processing} leadingIcon={processing ? Clock : ShieldCheck}>

        <p className="mt-2 text-xs text-center" style={{ color:T.ink500 }}>Secured · full refund &gt; 24h before</p>
      </div>
    </Modal>
  );
};

const RescheduleModal = ({ booking, providers, onClose, onComplete, takenSlots = [] }) => {
  const provider = providers.find(p => p.id === booking?.providerId);
  const [selectedDate, setSelectedDate] = useState(null);
  const [slot, setSlot] = useState(null);
  const dayKey = selectedDate ? fmtDateKey(selectedDate) : null;
  const takenForDay = dayKey ? takenSlots.filter(t => t.startsWith(dayKey + 'T')).map(t => t.split('T')[1]) : [];
  const slotsForDay = (selectedDate && provider ? getAvailableSlots(provider.id, selectedDate) : []).filter(t => !takenForDay.includes(t));
  if (!booking || !provider) return null;
  return (
    <Modal open onClose={onClose} title="Reschedule booking" maxWidth={520}>
      <div className="p-6">
        <div className="rounded-xl p-3 flex items-center gap-2 mb-4" style={{ background:T.bgMuted }}>
          <Clock size={14} style={{ color:T.ink500 }}/>
          <span className="text-sm" style={{ color:T.ink700 }}>Currently: <strong style={{ color:T.ink900 }}>{booking.when}</strong></span>
        </div>
        <RealCalendar providerId={provider.id} selectedDate={selectedDate} onSelect={d => { setSelectedDate(d); setSlot(null); }}/>
        {selectedDate && (
          <div className="mt-4">
            <div className="text-xs font-medium uppercase tracking-wider mb-2" style={{ color:T.ink500 }}>Available times · {fmtDateLong(selectedDate)}</div>
            {slotsForDay.length === 0 ? <p className="text-sm" style={{ color:T.ink500 }}>No times available.</p> : (
              <div className="grid grid-cols-4 gap-2">
                {slotsForDay.map(t => <button key={t} onClick={() => setSlot(t)} className="py-2 rounded-lg text-sm font-medium" style={{ background: slot===t ? T.primary : T.bgSurface, color: slot===t ? '#fff' : T.ink900, border:`1px solid ${slot===t ? T.primary : T.border}` }}>{t}</button>)}
              </div>
            )}
          </div>
        )}
      </div>
      <div className="px-6 py-4 flex gap-3 border-t" style={{ borderColor:T.border }}>
        <Btn variant="outline" onClick={onClose}>Cancel</Btn>
        <Btn className="flex-1" disabled={!selectedDate || !slot} onClick={() => onComplete(booking.id, selectedDate, slot)}>Confirm new time</Btn>
      </div>
    </Modal>
  );
};

const ExplorePage = ({ providers, initialCat, onNavigate }) => {
  const [cat, setCat] = useState(initialCat || 'all');
  const [query, setQuery] = useState('');
  const [sort, setSort] = useState('recommended');
  const [maxPrice, setMaxPrice] = useState(700);
  const [verifiedOnly, setVerifiedOnly] = useState(false);
  const categories = [
    { id:'cooking', label:'Cooking', icon:'🍽️' }, { id:'fitness', label:'Fitness', icon:'💪' },
    { id:'wellness', label:'Wellness', icon:'🥗' }, { id:'languages', label:'Languages', icon:'🗣️' },
    { id:'beauty', label:'Beauty', icon:'✨' }, { id:'tutoring', label:'Tutoring', icon:'📚' },
  ];
  const filtered = providers.filter(p =>
    (cat === 'all' || p.cat === cat) &&
    (query === '' || p.name.toLowerCase().includes(query.toLowerCase()) || p.specialty.toLowerCase().includes(query.toLowerCase())) &&
    p.priceFrom <= maxPrice && (!verifiedOnly || p.verified)
  ).sort((a, b) => {
    if (sort === 'price_asc') return a.priceFrom - b.priceFrom;
    if (sort === 'price_desc') return b.priceFrom - a.priceFrom;
    if (sort === 'rating') return b.rating - a.rating;
    if (sort === 'distance') return a.distance - b.distance;
    return 0;
  });
  return (
    <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">

const MessagesPage = ({ bookings, threads, onSend, onMarkRead, initialBookingId, me = 'client' }) => {
  const [activeId, setActiveId] = useState(initialBookingId || null);
  const [draft, setDraft] = useState('');
  const messagesEndRef = useRef(null);
  const eligible = bookings.filter(b => !b.isCollab && b.providerId);
  const activeBooking = eligible.find(b => b.id === activeId);
  const activeThread = activeId ? (threads[activeId] || []) : [];
  useEffect(() => { messagesEndRef.current?.scrollIntoView({ behavior:'smooth' }); }, [activeThread.length, activeId]);
  useEffect(() => { if (activeId) onMarkRead(activeId); }, [activeId]);
  const [pendingImage, setPendingImage] = useState(null);
  const [uploadingImage, setUploadingImage] = useState(false);
  const send = async () => {
    if ((!draft.trim() && !pendingImage) || !activeId) return;
    let imageUrl = null;
    if (pendingImage) {
      setUploadingImage(true);
      try { imageUrl = await uploadToBucket('chat-attachments', pendingImage, activeId); }
      catch (e) { showToast('Image upload failed', 'error'); setUploadingImage(false); return; }
      setUploadingImage(false);
    }
    onSend(activeId, draft.trim(), imageUrl);
    setDraft(''); setPendingImage(null);
  };
  // Unread = messages from the OTHER side that I haven't read
  const otherSide = me === 'provider' ? 'client' : 'provider';
  const getUnread = (id) => (threads[id] || []).filter(m => m.from === otherSide && !m.read).length;
  // Header info — for client: show provider; for provider: show client
  const peerName = (b) => me === 'provider' ? (b.clientName || 'Client') : b.providerName;
  const peerCover = (b) => me === 'provider' ? 'deep-teal' : b.providerCover;
  return (
    <div className="max-w-6xl mx-auto px-4 sm:px-6 py-8">
      <h1 className="text-2xl font-semibold mb-6" style={{ fontFamily:'Fraunces,serif', color:T.ink900 }}>Inbox</h1>
      <div className="grid lg:grid-cols-[320px_1fr] gap-4" style={{ height:'calc(100vh - 220px)', minHeight:500 }}>
        <div className="rounded-2xl overflow-hidden flex flex-col" style={{ background:T.bgSurface, border:`1px solid ${T.border}` }}>
          <div className="p-4 border-b" style={{ borderColor:T.border }}>
            <div className="text-xs uppercase tracking-wider font-medium" style={{ color:T.ink500 }}>Conversations</div>
          </div>
          <div className="flex-1 overflow-y-auto">
            {eligible.length === 0 && <div className="p-8 text-center text-sm" style={{ color:T.ink500 }}>No conversations yet.</div>}
            {eligible.map(b => {
              const thread = threads[b.id] || [];
              const last = thread[thread.length - 1];
              const unread = getUnread(b.id);
              return (
                <button key={b.id} onClick={() => setActiveId(b.id)} className="w-full flex items-center gap-3 p-4 text-left border-b" style={{ borderColor:T.border, background: activeId===b.id ? T.primary100 : 'transparent' }}>
                  <CoverArt tone={peerCover(b)} className="w-11 h-11 rounded-full flex-shrink-0"/>
                  <div className="flex-1 min-w-0">
                    <div className="flex items-center justify-between gap-2">
                      <span className="text-sm font-semibold truncate" style={{ color: activeId===b.id ? T.primary : T.ink900 }}>{peerName(b)}</span>
                      <span className="text-[10px] flex-shrink-0" style={{ color:T.ink500 }}>{last?.time || ''}</span>
                    </div>
                    <div className="text-[10px] truncate" style={{ color:T.accent600 }}>{b.serviceTitle}</div>
                    <div className="text-xs mt-0.5 truncate" style={{ color: unread ? T.ink900 : T.ink500, fontWeight: unread ? 500 : 400 }}>
                      {last?.system ? last.text : last ? `${last.from===me?'You: ':''}${last.text}` : 'No messages yet'}
                    </div>
                  </div>
                  {unread > 0 && <div className="w-5 h-5 rounded-full flex items-center justify-center text-[10px] font-bold text-white flex-shrink-0" style={{ background:T.accent }}>{unread}</div>}
                </button>
              );
            })}
          </div>
        </div>

        <div className="rounded-2xl overflow-hidden flex flex-col" style={{ background:T.bgSurface, border:`1px solid ${T.border}` }}>
          {!activeBooking ? (
            <div className="flex-1 flex items-center justify-center flex-col gap-3" style={{ color:T.ink500 }}>
              <MessageSquare size={32} style={{ color:T.ink300 }}/>
              <p className="text-sm">Select a conversation</p>
            </div>
          ) : (
            <>
              <div className="flex items-center gap-3 p-4 border-b" style={{ borderColor:T.border }}>
                <CoverArt tone={peerCover(activeBooking)} className="w-9 h-9 rounded-full flex-shrink-0"/>
                <div className="flex-1">
                  <div className="text-sm font-semibold" style={{ color:T.ink900 }}>{peerName(activeBooking)}</div>
                  <div className="text-xs" style={{ color:T.ink500 }}>{activeBooking.serviceTitle} · {activeBooking.when}</div>
                </div>
                <ContactButton booking={activeBooking}/>
              </div>
              <div className="flex-1 overflow-y-auto p-4 flex flex-col gap-3">
                {activeThread.length === 0 && <div className="text-center text-xs py-4" style={{ color:T.ink500 }}>No messages yet. Say hello!</div>}
                {activeThread.map((m, i) => {
                  if (m.system) return (
                    <div key={i} className="self-center text-center">
                      <div className="rounded-full px-3 py-1.5 text-xs inline-block" style={{ background:T.bgMuted, color:T.ink700 }}>
                        {m.icon==='calendar'&&'📅 '}{m.icon==='check'&&'✓ '}{m.text}
                      </div>
                    </div>
                  );
                  const mine = m.from === me;
                  return (
                    <div key={i} className={`flex flex-col ${mine ? 'items-end' : 'items-start'}`}>
                      {m.imageUrl && (
                        <a href={m.imageUrl} target="_blank" rel="noopener noreferrer" className="max-w-[70%] mb-1 rounded-2xl overflow-hidden" style={{ border:`1px solid ${T.border}` }}>
                          <img src={m.imageUrl} alt="" style={{ maxWidth:'100%', display:'block' }}/>
                        </a>
                      )}
                      {m.text && (
                        <div className="max-w-[70%] px-3.5 py-2 rounded-2xl text-sm" style={{ background: mine ? T.primary : T.bgMuted, color: mine ? '#fff' : T.ink900 }}>{m.text}</div>
                      )}
                      <div className="text-[10px] mt-0.5 px-1 flex items-center gap-1" style={{ color:T.ink500 }}>
                        {m.time}
                        {mine && (m.read ? <span className="flex items-center gap-0.5" style={{ color:T.primary }}><Check size={9}/><Check size={9} style={{ marginLeft:-5 }}/> Read</span> : <span>Delivered</span>)}
                      </div>
                    </div>
                  );
                })}
                <div ref={messagesEndRef}/>
              </div>
              {/* Quick-action chips */}
              <div className="px-3 pt-2 pb-1 flex gap-2 flex-wrap border-t" style={{ borderColor:T.border }}>
                {[
                  { label: '📅  Can we reschedule?', text: 'Hi — would it be possible to reschedule our session? Let me know what times work for you.' },
                  { label: '⚠️  Report an issue', text: "I need to report an issue with this booking. Could you get back to me about it?" },
                  { label: '✅  See you soon', text: 'Looking forward to it — see you then!' },
                  { label: '📍  Address?', text: 'Could you confirm the address / parking details before the session?' },
                ].map((chip, i) => (
                  <button
                    key={i}
                    onClick={() => onSend(activeId, chip.text)}
                    className="text-[11px] font-medium px-2.5 py-1.5 rounded-full transition-colors hover:opacity-90"
                    style={{ background: T.bgMuted, color: T.ink700, border: `1px solid ${T.border}` }}
                  >
                    {chip.label}
                  </button>
                ))}
              </div>
              {pendingImage && (
                <div className="p-3 border-t flex items-center gap-3" style={{ borderColor:T.border, background:T.bgMuted }}>
                  <img src={URL.createObjectURL(pendingImage)} alt="" className="w-12 h-12 rounded-lg object-cover"/>
                  <div className="flex-1 text-xs" style={{ color:T.ink700 }}>{pendingImage.name}</div>
                  <button onClick={() => setPendingImage(null)} className="w-7 h-7 rounded-full flex items-center justify-center" style={{ background:T.bgSurface, color:T.danger }}><X size={13}/></button>
                </div>
              )}
              <div className="flex items-end gap-2 p-3 border-t" style={{ borderColor:T.border }}>
                <label className="w-9 h-9 rounded-xl flex items-center justify-center flex-shrink-0 cursor-pointer" style={{ background:T.bgMuted, color:T.ink700 }} title="Attach image">
                  <Camera size={15}/>
                  <input type="file" accept="image/*" className="hidden" onChange={e => setPendingImage(e.target.files?.[0] || null)}/>
                </label>
                <textarea value={draft} onChange={e => setDraft(e.target.value)} onKeyDown={e => { if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); send(); } }} placeholder="Type a message…" rows={1} className="flex-1 py-2 px-3 rounded-xl text-sm outline-none resize-none" style={{ background:T.bgMuted, color:T.ink900 }}/>
                <button onClick={send} disabled={(!draft.trim() && !pendingImage) || uploadingImage} className="w-9 h-9 rounded-xl flex items-center justify-center flex-shrink-0 disabled:opacity-30" style={{ background:T.primary }}>
                  {uploadingImage ? <Clock size={15} color="#fff"/> : <Send size={15} color="#fff"/>}
                </button>
              </div>
            </>
          )}
        </div>
      </div>
    </div>
  );
};

    try { await onSwitchRole(newRole); }

    {label:'Wallet',icon:Wallet,action:()=>onNavigate('prov-wallet')},
    {label:'My provider profile',icon:User,action:()=>onNavigate('prov-profile')},

  const actions = isProvider ? providerQuickActions : clientQuickActions;

  const sideItems = isProvider
    ? [
        {icon:LayoutDashboard,label:'Dashboard',onClick:()=>onNavigate('dashboard')},
        {icon:CalendarIcon,label:'My bookings',onClick:()=>onNavigate('prov-book')},
        {icon:User,label:'Provider profile',onClick:()=>onNavigate('prov-profile')},
        {icon:FileText,label:'Terms',onClick:()=>onNavigate('terms')},
        {icon:LogOut,label:'Sign out',danger:true,onClick:onLogout},
      ]
    : [
        {icon:CalendarIcon,label:'My bookings',onClick:()=>onNavigate('bookings')},
        {icon:MessageSquare,label:'Messages',onClick:()=>onNavigate('messages')},
        {icon:FileText,label:'Terms',onClick:()=>onNavigate('terms')},

      <FollowingModal open={followingOpen} onClose={() => setFollowingOpen(false)} user={user} providers={providers} onNavigate={onNavigate} follows={follows} onFollowsChange={onFollowsChange}/>

const ProviderDashboard = ({ user, providers, bookings, onRefreshPosts, onNavigate }) => {
  const me = providers.find(p => p.id === user?.providerId);
  const isPending = me?.status === 'pending';
  const [postOpen, setPostOpen] = useState(false);

  // Real stats derived from bookings
  const myBookings = bookings.filter(b => b.providerId === user?.providerId);
  const isSameDay = (a, b) => a && b && new Date(a).toDateString() === new Date(b).toDateString();
  const today = new Date();
  const todayBookings = myBookings.filter(b => isSameDay(b.date, today));
  const pendingRequests = myBookings.filter(b => b.status === 'pending');
  const completedThisMonth = myBookings.filter(b => {
    const d = new Date(b.date);
    return d.getMonth() === today.getMonth() && d.getFullYear() === today.getFullYear() && b.status === 'completed';
  });
  const monthRevenue = completedThisMonth.reduce((s, b) => s + (Number(b.total) || 0) * 0.88, 0);

  // Last 7 days for the bar chart
  const last7 = Array.from({ length: 7 }, (_, i) => {
    const d = new Date(today); d.setDate(d.getDate() - (6 - i)); return d;
  });
  const weekData = last7.map(d => ({
    date: d,
    earnings: myBookings.filter(b => isSameDay(b.date, d) && b.status === 'completed').reduce((s, b) => s + (Number(b.total) || 0) * 0.88, 0),
  }));
  const weekTotal = weekData.reduce((s, w) => s + w.earnings, 0);
  const maxBar = Math.max(...weekData.map(w => w.earnings), 1);

  const todayUpcoming = todayBookings
    .filter(b => ['approved', 'confirmed'].includes(b.status))
    .sort((a, b) => (a.slot || '').localeCompare(b.slot || ''));

  return (
    <div className="max-w-6xl mx-auto px-4 sm:px-6 py-8">
      <NewPostModal open={postOpen} onClose={() => setPostOpen(false)} user={user} providers={providers} onPosted={onRefreshPosts}/>
      <div className="flex items-center justify-between mb-2">
        <h1 className="text-2xl font-semibold" style={{ fontFamily:'Fraunces,serif', color:T.ink900 }}>Hi, {me?.name || user?.name}.</h1>
        <Btn leadingIcon={Plus} onClick={() => setPostOpen(true)} disabled={isPending}>New post</Btn>
      </div>
      {isPending && (
        <div className="rounded-xl p-4 mb-6 flex items-start gap-3" style={{ background:T.accent100, border:`1px solid ${T.accent+'33'}` }}>
          <Clock size={18} style={{ color:T.accent600, marginTop:2, flexShrink:0 }}/>
          <div>
            <div className="text-sm font-semibold" style={{ color:T.ink900 }}>Application under review</div>
            <div className="text-xs mt-1" style={{ color:T.ink700 }}>Your provider profile is pending admin approval. You'll appear in the explore page and be bookable once approved (usually within 48h).</div>
          </div>
        </div>
      )}
      <div className="grid sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
        {[
          { label:"Today's bookings", value: todayBookings.length, icon: CalendarIcon, tone:'primary' },
          { label:'Pending requests', value: pendingRequests.length, icon: Zap, tone:'accent' },
          { label:'This month', value: `QAR ${Math.round(monthRevenue).toLocaleString()}`, icon: Wallet, tone:'primary' },
          { label:'Rating', value: me?.rating > 0 ? `${me.rating.toFixed(1)} ★` : 'New', icon: Star, tone:'accent' },
        ].map((k,i) => (
          <div key={i} className="rounded-2xl p-5" style={{ background:T.bgSurface, border:`1px solid ${T.border}` }}>
            <div className="w-10 h-10 rounded-xl flex items-center justify-center mb-3" style={{ background: k.tone==='primary' ? T.primary100 : T.accent100 }}>
              <k.icon size={18} style={{ color: k.tone==='primary' ? T.primary : T.accent600 }}/>
            </div>
            <div className="text-xs" style={{ color:T.ink500 }}>{k.label}</div>
            <div className="text-xl font-semibold mt-0.5" style={{ color:T.ink900 }}>{k.value}</div>
          </div>
        ))}
      </div>

      <div className="grid lg:grid-cols-2 gap-6">
        {/* Weekly earnings chart */}
        <div>
          <h2 className="text-base font-semibold mb-4" style={{ color:T.ink900 }}>This week's earnings</h2>
          <div className="rounded-2xl p-6" style={{ background:T.primary, color:'#fff' }}>
            <div className="flex items-baseline gap-1.5">
              <span className="text-sm opacity-70">QAR</span>
              <span className="text-4xl font-semibold" style={{ fontFamily:'Fraunces,serif' }}>{Math.round(weekTotal).toLocaleString()}</span>
            </div>
            <div className="text-sm mt-1 opacity-80">{completedThisMonth.length} sessions completed this month</div>
            <div className="mt-5 flex gap-1 h-20 items-end">
              {weekData.map((d, i) => (
                <div key={i} className="flex-1 rounded-t" style={{ background: i===6 ? T.accent : 'rgba(255,255,255,0.3)', height:`${Math.max((d.earnings / maxBar) * 100, 4)}%` }} title={`${DAY_NAMES[d.date.getDay()]}: QAR ${Math.round(d.earnings)}`}/>
              ))}
            </div>
            <div className="mt-2 grid grid-cols-7 gap-1">
              {weekData.map((d, i) => <div key={i} className="text-center text-[10px] opacity-60">{DAY_NAMES[d.date.getDay()][0]}</div>)}
            </div>
          </div>
          {pendingRequests.length > 0 && (
            <button onClick={() => onNavigate('prov-book')} className="w-full mt-4 rounded-2xl p-4 text-left flex items-center gap-3 hover:shadow-md transition-shadow" style={{ background:T.accent100, border:`1px solid ${T.accent+'33'}` }}>
              <Zap size={18} style={{ color:T.accent600 }}/>
              <div className="flex-1">
                <div className="text-sm font-semibold" style={{ color:T.ink900 }}>{pendingRequests.length} pending request{pendingRequests.length === 1 ? '' : 's'}</div>
                <div className="text-xs" style={{ color:T.ink700 }}>Tap to review and accept</div>
              </div>
              <ChevronRight size={16} style={{ color:T.accent600 }}/>
            </button>
          )}
        </div>

        {/* Today's upcoming */}
        <div>
          <h2 className="text-base font-semibold mb-4" style={{ color:T.ink900 }}>Upcoming today</h2>
          <div className="rounded-2xl p-4" style={{ background:T.bgSurface, border:`1px solid ${T.border}` }}>
            {todayUpcoming.length === 0 ? (
              <div className="text-center py-8 text-sm" style={{ color:T.ink500 }}>No sessions today. Enjoy the break.</div>
            ) : todayUpcoming.map((b, i, arr) => (
              <div key={b.id} className="flex items-center gap-3 py-3" style={{ borderBottom: i<arr.length-1 ? `1px solid ${T.border}` : 'none' }}>
                <div className="w-9 h-9 rounded-full flex items-center justify-center text-white text-sm font-semibold" style={{ background:T.accent, fontFamily:'Fraunces,serif' }}>{(b.clientName || 'C')[0].toUpperCase()}</div>
                <div className="flex-1"><div className="text-sm font-semibold" style={{ color:T.ink900 }}>{b.clientName || 'Client'}</div><div className="text-xs" style={{ color:T.ink500 }}>{b.serviceTitle}</div></div>
                <div className="font-mono text-sm font-semibold" style={{ color:T.ink900 }}>{b.slot}</div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
};

const WithdrawModal = ({ open, onClose, balance, onWithdraw }) => {
  const [amount, setAmount] = useState('');
  const [bank, setBank] = useState('qnb');
  const [processing, setProcessing] = useState(false);
  const banks = [
    {id:'qnb', label:'QNB ···· 4521', sub:'Qatar National Bank'},
    {id:'cbq', label:'CBQ ···· 8833', sub:'Commercial Bank of Qatar'},
    {id:'doha', label:'Doha Bank ···· 2210', sub:'Doha Bank'},
  ];
  const amt = Number(amount);
  const valid = amt >= 50 && amt <= balance;
  const submit = async () => {
    if (!valid) return;
    setProcessing(true);
    try {
      await onWithdraw(amt, banks.find(b => b.id===bank)?.label);
      setAmount('');
      onClose();
    } catch (e) { showToast('Withdrawal failed: ' + e.message, 'error'); }
    setProcessing(false);
  };
  return (
    <Modal open={open} onClose={onClose} title="Withdraw funds" maxWidth={440}>
      <div className="p-6 flex flex-col gap-4">
        <div className="rounded-xl p-4 text-center" style={{ background:T.primary }}>
          <div className="text-xs opacity-70 mb-1 text-white">Available balance</div>
          <div className="text-3xl font-semibold text-white font-mono">QAR {balance.toLocaleString()}</div>
        </div>
        <div>
          <label className="text-xs font-medium uppercase tracking-wider mb-1 block" style={{ color:T.ink500 }}>Amount (min QAR 50)</label>
          <input value={amount} onChange={e => setAmount(e.target.value.replace(/\D/g,''))} placeholder="Enter amount" className="w-full py-3 px-4 rounded-xl text-lg font-mono outline-none text-center" style={{ background:T.bgMuted, border:`2px solid ${amount && !valid ? T.danger : amount && valid ? T.success : T.border}`, color:T.ink900 }}/>
          <div className="flex gap-2 mt-2">
            {[500,1000,2000].map(v => <button key={v} onClick={() => setAmount(String(Math.min(v,balance)))} className="flex-1 py-1.5 rounded-lg text-xs font-medium" style={{ background:T.primary100, color:T.primary }} disabled={v > balance}>QAR {v}</button>)}
            <button onClick={() => setAmount(String(balance))} className="flex-1 py-1.5 rounded-lg text-xs font-medium" style={{ background:T.bgMuted, color:T.ink700 }}>All</button>
          </div>
        </div>
        <div>
          <label className="text-xs font-medium uppercase tracking-wider mb-2 block" style={{ color:T.ink500 }}>To bank account</label>
          <div className="flex flex-col gap-1.5">
            {banks.map(b => (
              <button key={b.id} onClick={() => setBank(b.id)} className="text-left rounded-xl p-3 flex items-center gap-3" style={{ background:T.bgMuted, border:`2px solid ${bank===b.id ? T.primary : 'transparent'}` }}>
                <div className="w-10 h-7 rounded flex items-center justify-center text-white text-[10px] font-bold flex-shrink-0" style={{ background:T.primary }}>{b.id.toUpperCase()}</div>
                <div className="flex-1"><div className="text-sm font-medium" style={{ color:T.ink900 }}>{b.label}</div><div className="text-xs" style={{ color:T.ink500 }}>{b.sub}</div></div>
                {bank===b.id && <Check size={14} style={{ color:T.primary }}/>}
              </button>
            ))}
          </div>
        </div>
        {amount && !valid && <p className="text-xs" style={{ color:T.danger }}>{amt < 50 ? 'Minimum is QAR 50' : 'Exceeds available balance'}</p>}
        <Btn size="lg" className="w-full" disabled={!valid || processing} onClick={submit}>{processing ? 'Processing…' : valid ? `Withdraw QAR ${amt}` : 'Enter amount'}</Btn>
      </div>
    </Modal>
  );
};

const ProviderWalletPage = ({ user, bookings }) => {
  const [txns, setTxns] = useState([]);
  const [withdrawOpen, setWithdrawOpen] = useState(false);
  const [loading, setLoading] = useState(true);
  const providerId = user?.providerId;

  const reload = async () => {
    if (!providerId) { setLoading(false); return; }
    setLoading(true);
    setTxns(await fetchTransactions(providerId));
    setLoading(false);
  };
  useEffect(() => { reload(); }, [providerId]);

  // Compute balance: completed booking earnings (88% net) minus withdrawals
  const completedBookings = bookings.filter(b => b.providerId === providerId && b.status === 'completed');
  const totalEarned = completedBookings.reduce((s, b) => s + (Number(b.total) || 0) * 0.88, 0);
  const totalWithdrawn = txns.filter(t => t.kind === 'withdrawal').reduce((s, t) => s + Number(t.amount), 0);
  const balance = Math.max(0, totalEarned - totalWithdrawn);

  // This-month + pending stats
  const today = new Date();
  const thisMonth = completedBookings.filter(b => {
    const d = new Date(b.date);
    return d.getMonth() === today.getMonth() && d.getFullYear() === today.getFullYear();
  }).reduce((s, b) => s + (Number(b.total) || 0) * 0.88, 0);
  const pending = bookings.filter(b => b.providerId === providerId && ['approved','confirmed'].includes(b.status)).reduce((s, b) => s + (Number(b.total) || 0) * 0.88, 0);

  const handleWithdraw = async (amt, bankLabel) => {
    await addTransaction(providerId, 'withdrawal', amt, `Withdrawal to ${bankLabel}`);
    reload();
    showToast(`QAR ${amt} withdrawal initiated`, 'success');
  };

  return (
    <div className="max-w-3xl mx-auto px-4 sm:px-6 py-8">
      <WithdrawModal open={withdrawOpen} onClose={() => setWithdrawOpen(false)} balance={Math.round(balance)} onWithdraw={handleWithdraw}/>
      <h1 className="text-2xl font-semibold mb-6" style={{ fontFamily:'Fraunces,serif', color:T.ink900 }}>Wallet</h1>
      <div className="rounded-2xl p-8 mb-6" style={{ background:T.primary, color:'#fff' }}>
        <div className="text-sm opacity-70 mb-2">Available balance</div>
        <div className="text-5xl font-semibold mb-1" style={{ fontFamily:'Fraunces,serif' }}>{Math.round(balance).toLocaleString()}</div>
        <div className="text-sm opacity-70 mb-6">QAR</div>
        <div className="flex gap-3">
          <button onClick={() => balance >= 50 ? setWithdrawOpen(true) : showToast('Min withdrawal is QAR 50')} className="px-5 py-2.5 rounded-lg text-sm font-medium" style={{ background:T.bgSurface, color:T.primary, opacity: balance >= 50 ? 1 : 0.6 }}>Withdraw</button>
        </div>
      </div>
      <div className="grid grid-cols-3 gap-3 mb-6">
        {[
          {label:'This month', value:`QAR ${Math.round(thisMonth).toLocaleString()}`, color:T.ink900},
          {label:'Pending (in upcoming bookings)', value:`QAR ${Math.round(pending).toLocaleString()}`, color:T.accent600},
          {label:'Withdrawn (lifetime)', value:`QAR ${Math.round(totalWithdrawn).toLocaleString()}`, color:T.ink500},
        ].map((s, i) => (
